  zh: "显示 Vix 的版本和致谢信息。"
  ja: "Vix のバージョンとクレジットを表示します。"
menu.item.vix.website.help:
  en: "Open the Vix website in your browser."
  es: "Abre el sitio web de Vix en tu navegador."
