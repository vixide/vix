menu.item.file.new.help:
  en: "Create a new empty file in a fresh tab."
  es: "Crea un archivo nuevo y vacío en una pestaña nueva."
  fr: "Crée un nouveau fichier vide dans un nouvel onglet."
  de: "Erstellt eine neue leere Datei in einem neuen Tab."
  cy: "Creu ffeil newydd wag mewn tab newydd."
  ga: "Cruthaigh comhad folamh nua i gcluaisín nua."
  gd: "Cruthaich faidhle falamh ùr ann an taba ùr."
  pl: "Tworzy nowy pusty plik w nowej karcie."
  pt: "Cria um novo arquivo vazio em uma nova aba."
  ru: "Создаёт новый пустой файл в новой вкладке."
  ar: "أنشئ ملفًا فارغًا جديدًا في علامة تبويب جديدة."
  hi: "नई टैब में एक नई खाली फ़ाइल बनाएँ।"
  bn: "একটি নতুন ট্যাবে নতুন খালি ফাইল তৈরি করুন।"
  zh: "在新标签页中创建一个新的空文件。"
  ja: "新しいタブに空のファイルを新規作成します。"
menu.file.help:
  en: "Open file, project, and workspace commands."
  es: "Abre comandos de archivo, proyecto y espacio de trabajo."
  fr: "Ouvre les commandes de fichier, projet et espace de travail."
  de: "Öffnet Befehle für Datei, Projekt und Arbeitsbereich."
  cy: "Agor gorchmynion ffeil, prosiect a gweithle."
  ga: "Oscail orduithe comhaid, tionscadail agus spáis oibre."
  gd: "Fosgail àitheantan faidhle, pròiseact agus rùm-obrach."
  pl: "Otwiera polecenia pliku, projektu i obszaru roboczego."
  pt: "Abre comandos de arquivo, projeto e espaço de trabalho."
  ru: "Открывает команды файла, проекта и рабочей области."
  ar: "افتح أوامر الملف والمشروع ومساحة العمل."
  hi: "फ़ाइल, प्रोजेक्ट और वर्कस्पेस कमांड खोलें।"
  bn: "ফাইল, প্রজেক্ট ও ওয়ার্কস্পেস কমান্ড খোলে।"
  zh: "打开文件、项目和工作区命令。"
  ja: "ファイル、プロジェクト、ワークスペースのコマンドを開きます。"
menu.item.file.scratch.help:
  en: "Open a temporary scratch buffer for quick notes."
  es: "Abre un búfer temporal para notas rápidas."
  fr: "Ouvre un tampon temporaire pour des notes rapides."
  de: "Öffnet einen temporären Notizpuffer für schnelle Notizen."
  cy: "Agor byffer dros dro ar gyfer nodiadau cyflym."
  ga: "Oscail maolán sealadach do nótaí tapa."
  gd: "Fosgail bufair sealach airson notaichean luatha."
  pl: "Otwiera tymczasowy bufor na szybkie notatki."
  pt: "Abre um buffer temporário para anotações rápidas."
  ru: "Открывает временный буфер для быстрых заметок."
  ar: "افتح مخزنًا مؤقتًا للملاحظات السريعة."
  hi: "त्वरित नोट्स के लिए एक अस्थायी स्क्रैच बफ़र खोलें।"
  bn: "দ্রুত নোটের জন্য একটি অস্থায়ী স্ক্র্যাচ বাফার খোলে।"
  zh: "打开一个临时草稿缓冲区用于快速记录。"
  ja: "簡単なメモ用の一時スクラッチバッファを開きます。"
menu.item.file.open.help:
  en: "Browse for a file and open it in a new tab."
  es: "Busca un archivo y ábrelo en una pestaña nueva."
  fr: "Parcourt et ouvre un fichier dans un nouvel onglet."
  de: "Sucht eine Datei und öffnet sie in einem neuen Tab."
  cy: "Pori am ffeil a'i hagor mewn tab newydd."
  ga: "Brabhsáil comhad agus oscail é i gcluaisín nua."
  gd: "Rùraich airson faidhle is fosgail e ann an taba ùr."
  pl: "Wyszukuje plik i otwiera go w nowej karcie."
  pt: "Procura um arquivo e o abre em uma nova aba."
  ru: "Находит файл и открывает его в новой вкладке."
  ar: "استعرض ملفًا وافتحه في علامة تبويب جديدة."
  hi: "किसी फ़ाइल को ब्राउज़ करें और उसे नई टैब में खोलें।"
  bn: "একটি ফাইল ব্রাউজ করে নতুন ট্যাবে খোলে।"
  zh: "浏览并在新标签页中打开文件。"
  ja: "ファイルを選んで新しいタブで開きます。"
menu.item.file.open_recent.help:
  en: "Reopen a file from the recently opened list."
  es: "Vuelve a abrir un archivo de la lista de recientes."
  fr: "Rouvre un fichier depuis la liste des récents."
  de: "Öffnet eine Datei aus der Liste der zuletzt geöffneten erneut."
  cy: "Ailagor ffeil o'r rhestr o rai diweddar."
  ga: "Athoscail comhad ón liosta a osclaíodh le déanaí."
  gd: "Ath-fhosgail faidhle on liosta o chionn ghoirid."
  pl: "Ponownie otwiera plik z listy ostatnio otwieranych."
  pt: "Reabre um arquivo da lista de recentes."
  ru: "Повторно открывает файл из списка недавних."
  ar: "أعد فتح ملف من قائمة الملفات الأخيرة."
  hi: "हाल ही में खोली गई सूची से कोई फ़ाइल फिर से खोलें।"
  bn: "সম্প্রতি খোলা তালিকা থেকে একটি ফাইল পুনরায় খোলে।"
  zh: "从最近打开列表中重新打开文件。"
  ja: "最近開いた一覧からファイルを再度開きます。"
menu.item.file.switch_project.help:
  en: "Switch the editor to a different project folder."
  es: "Cambia el editor a otra carpeta de proyecto."
  fr: "Bascule l'éditeur vers un autre dossier de projet."
  de: "Wechselt den Editor zu einem anderen Projektordner."
  cy: "Newid y golygydd i ffolder prosiect gwahanol."
  ga: "Athraigh an t-eagarthóir go fillteán tionscadail eile."
  gd: "Atharraich an deasaiche gu pasgan pròiseact eile."
  pl: "Przełącza edytor na inny folder projektu."
  pt: "Alterna o editor para outra pasta de projeto."
  ru: "Переключает редактор на другую папку проекта."
  ar: "بدّل المحرر إلى مجلد مشروع آخر."
  hi: "एडिटर को किसी अन्य प्रोजेक्ट फ़ोल्डर पर स्विच करें।"
  bn: "এডিটরকে অন্য প্রজেক্ট ফোল্ডারে পরিবর্তন করে।"
  zh: "将编辑器切换到其他项目文件夹。"
  ja: "エディタを別のプロジェクトフォルダに切り替えます。"
menu.item.file.workspace_open.help:
  en: "Load a saved workspace from a file."
  es: "Carga un espacio de trabajo guardado desde un archivo."
  fr: "Charge un espace de travail enregistré depuis un fichier."
  de: "Lädt einen gespeicherten Arbeitsbereich aus einer Datei."
  cy: "Llwytho gweithle wedi'i gadw o ffeil."
  ga: "Luchtaigh spás oibre sábháilte ó chomhad."
  gd: "Luchdaich rùm-obrach a chaidh a shàbhaladh à faidhle."
  pl: "Wczytuje zapisany obszar roboczy z pliku."
  pt: "Carrega um espaço de trabalho salvo de um arquivo."
  ru: "Загружает сохранённую рабочую область из файла."
  ar: "حمّل مساحة عمل محفوظة من ملف."
  hi: "किसी फ़ाइल से सहेजा गया वर्कस्पेस लोड करें।"
  bn: "একটি ফাইল থেকে সংরক্ষিত ওয়ার্কস্পেস লোড করে।"
  zh: "从文件加载已保存的工作区。"
  ja: "保存済みのワークスペースをファイルから読み込みます。"
menu.item.file.workspace_save.help:
  en: "Save the current workspace layout to a file."
  es: "Guarda el diseño del espacio de trabajo actual en un archivo."
  fr: "Enregistre la disposition de l'espace de travail actuel dans un fichier."
  de: "Speichert das aktuelle Arbeitsbereichs-Layout in einer Datei."
  cy: "Cadw cynllun y gweithle presennol i ffeil."
  ga: "Sábháil leagan amach an spáis oibre reatha i gcomhad."
  gd: "Sàbhail co-dhealbhachd an rùm-obrach làithreach gu faidhle."
  pl: "Zapisuje układ bieżącego obszaru roboczego do pliku."
  pt: "Salva o layout do espaço de trabalho atual em um arquivo."
  ru: "Сохраняет текущую компоновку рабочей области в файл."
  ar: "احفظ تخطيط مساحة العمل الحالية في ملف."
  hi: "वर्तमान वर्कस्पेस लेआउट को किसी फ़ाइल में सहेजें।"
  bn: "বর্তমান ওয়ার্কস্পেস লেআউট একটি ফাইলে সংরক্ষণ করে।"
  zh: "将当前工作区布局保存到文件。"
  ja: "現在のワークスペースの構成をファイルに保存します。"
menu.item.file.workspace_add_folder.help:
  en: "Add another folder to the current workspace."
  es: "Añade otra carpeta al espacio de trabajo actual."
  fr: "Ajoute un autre dossier à l'espace de travail actuel."
  de: "Fügt dem aktuellen Arbeitsbereich einen weiteren Ordner hinzu."
  cy: "Ychwanegu ffolder arall at y gweithle presennol."
  ga: "Cuir fillteán eile leis an spás oibre reatha."
  gd: "Cuir pasgan eile ris an rùm-obrach làithreach."
  pl: "Dodaje kolejny folder do bieżącego obszaru roboczego."
  pt: "Adiciona outra pasta ao espaço de trabalho atual."
  ru: "Добавляет ещё одну папку в текущую рабочую область."
  ar: "أضف مجلدًا آخر إلى مساحة العمل الحالية."
  hi: "वर्तमान वर्कस्पेस में एक और फ़ोल्डर जोड़ें।"
  bn: "বর্তমান ওয়ার্কস্পেসে আরেকটি ফোল্ডার যোগ করে।"
  zh: "向当前工作区添加另一个文件夹。"
  ja: "現在のワークスペースに別のフォルダを追加します。"
menu.item.file.save.help:
  en: "Save the current file to disk."
  es: "Guarda el archivo actual en el disco."
  fr: "Enregistre le fichier actuel sur le disque."
  de: "Speichert die aktuelle Datei auf dem Datenträger."
  cy: "Cadw'r ffeil bresennol i'r ddisg."
  ga: "Sábháil an comhad reatha ar an diosca."
  gd: "Sàbhail am faidhle làithreach dhan diosga."
  pl: "Zapisuje bieżący plik na dysku."
  pt: "Salva o arquivo atual no disco."
  ru: "Сохраняет текущий файл на диск."
  ar: "احفظ الملف الحالي على القرص."
  hi: "वर्तमान फ़ाइल को डिस्क पर सहेजें।"
  bn: "বর্তমান ফাইলটি ডিস্কে সংরক্ষণ করে।"
  zh: "将当前文件保存到磁盘。"
  ja: "現在のファイルをディスクに保存します。"
menu.item.file.save_as.help:
  en: "Save the current file under a new name."
  es: "Guarda el archivo actual con un nombre nuevo."
  fr: "Enregistre le fichier actuel sous un nouveau nom."
  de: "Speichert die aktuelle Datei unter einem neuen Namen."
  cy: "Cadw'r ffeil bresennol dan enw newydd."
  ga: "Sábháil an comhad reatha faoi ainm nua."
  gd: "Sàbhail am faidhle làithreach fo ainm ùr."
  pl: "Zapisuje bieżący plik pod nową nazwą."
  pt: "Salva o arquivo atual com um novo nome."
  ru: "Сохраняет текущий файл под новым именем."
  ar: "احفظ الملف الحالي باسم جديد."
  hi: "वर्तमान फ़ाइल को नए नाम से सहेजें।"
  bn: "বর্তমান ফাইলটি নতুন নামে সংরক্ষণ করে।"
  zh: "以新名称保存当前文件。"
  ja: "現在のファイルを新しい名前で保存します。"
menu.item.file.rename.help:
  en: "Rename the current file on disk."
  es: "Cambia el nombre del archivo actual en el disco."
  fr: "Renomme le fichier actuel sur le disque."
  de: "Benennt die aktuelle Datei auf dem Datenträger um."
  cy: "Ailenwi'r ffeil bresennol ar y ddisg."
  ga: "Athainmnigh an comhad reatha ar an diosca."
  gd: "Ath-ainmich am faidhle làithreach air an diosga."
  pl: "Zmienia nazwę bieżącego pliku na dysku."
  pt: "Renomeia o arquivo atual no disco."
  ru: "Переименовывает текущий файл на диске."
  ar: "أعد تسمية الملف الحالي على القرص."
  hi: "डिस्क पर वर्तमान फ़ाइल का नाम बदलें।"
  bn: "ডিস্কে বর্তমান ফাইলের নাম পরিবর্তন করে।"
  zh: "重命名磁盘上的当前文件。"
  ja: "ディスク上の現在のファイル名を変更します。"
menu.item.file.close.help:
  en: "Close the current tab."
  es: "Cierra la pestaña actual."
  fr: "Ferme l'onglet actuel."
  de: "Schließt den aktuellen Tab."
  cy: "Cau'r tab presennol."
  ga: "Dún an cluaisín reatha."
  gd: "Dùin an taba làithreach."
  pl: "Zamyka bieżącą kartę."
  pt: "Fecha a aba atual."
  ru: "Закрывает текущую вкладку."
  ar: "أغلق علامة التبويب الحالية."
  hi: "वर्तमान टैब बंद करें।"
  bn: "বর্তমান ট্যাব বন্ধ করে।"
  zh: "关闭当前标签页。"
  ja: "現在のタブを閉じます。"
menu.item.file.close_all.help:
  en: "Close every open tab."
  es: "Cierra todas las pestañas abiertas."
  fr: "Ferme tous les onglets ouverts."
  de: "Schließt alle geöffneten Tabs."
  cy: "Cau pob tab agored."
  ga: "Dún gach cluaisín oscailte."
  gd: "Dùin a h-uile taba fosgailte."
  pl: "Zamyka wszystkie otwarte karty."
  pt: "Fecha todas as abas abertas."
  ru: "Закрывает все открытые вкладки."
  ar: "أغلق كل علامات التبويب المفتوحة."
  hi: "सभी खुली टैब बंद करें।"
  bn: "সমস্ত খোলা ট্যাব বন্ধ করে।"
  zh: "关闭所有打开的标签页。"
  ja: "開いているすべてのタブを閉じます。"
menu.item.file.reopen_closed.help:
  en: "Reopen the most recently closed tab."
  es: "Vuelve a abrir la última pestaña cerrada."
  fr: "Rouvre le dernier onglet fermé."
  de: "Öffnet den zuletzt geschlossenen Tab erneut."
  cy: "Ailagor y tab a gaewyd ddiwethaf."
  ga: "Athoscail an cluaisín a dúnadh is déanaí."
  gd: "Ath-fhosgail an taba mu dheireadh a chaidh a dhùnadh."
  pl: "Ponownie otwiera ostatnio zamkniętą kartę."
  pt: "Reabre a última aba fechada."
  ru: "Повторно открывает последнюю закрытую вкладку."
  ar: "أعد فتح آخر علامة تبويب مغلقة."
  hi: "सबसे हाल में बंद की गई टैब फिर से खोलें।"
  bn: "সদ্য বন্ধ করা ট্যাবটি পুনরায় খোলে।"
  zh: "重新打开最近关闭的标签页。"
  ja: "最後に閉じたタブを再度開きます。"
menu.item.edit.find.help:
  en: "Search for text in the current file."
  es: "Busca texto en el archivo actual."
  fr: "Recherche du texte dans le fichier actuel."
  de: "Sucht nach Text in der aktuellen Datei."
  cy: "Chwilio am destun yn y ffeil bresennol."
  ga: "Cuardaigh téacs sa chomhad reatha."
  gd: "Lorg teacsa san fhaidhle làithreach."
  pl: "Wyszukuje tekst w bieżącym pliku."
  pt: "Pesquisa texto no arquivo atual."
  ru: "Ищет текст в текущем файле."
  ar: "ابحث عن نص في الملف الحالي."
  hi: "वर्तमान फ़ाइल में टेक्स्ट खोजें।"
  bn: "বর্তমান ফাইলে টেক্সট অনুসন্ধান করে।"
  zh: "在当前文件中搜索文本。"
  ja: "現在のファイル内でテキストを検索します。"
menu.item.edit.find_next.help:
  en: "Jump to the next search match."
  es: "Salta a la siguiente coincidencia de búsqueda."
  fr: "Passe à la correspondance de recherche suivante."
  de: "Springt zum nächsten Suchtreffer."
  cy: "Neidio i'r canlyniad chwilio nesaf."
  ga: "Léim go dtí an chéad toradh cuardaigh eile."
  gd: "Leum gun ath thoradh luirg."
  pl: "Przechodzi do następnego wyniku wyszukiwania."
  pt: "Vai para a próxima correspondência da busca."
  ru: "Переходит к следующему совпадению поиска."
  ar: "انتقل إلى نتيجة البحث التالية."
  hi: "अगले खोज मिलान पर जाएँ।"
  bn: "পরবর্তী অনুসন্ধান মিলে যাওয়া স্থানে যায়।"
  zh: "跳转到下一个搜索匹配项。"
  ja: "次の検索結果へ移動します。"
menu.item.edit.find_prev.help:
  en: "Jump to the previous search match."
  es: "Salta a la coincidencia de búsqueda anterior."
  fr: "Passe à la correspondance de recherche précédente."
  de: "Springt zum vorherigen Suchtreffer."
  cy: "Neidio i'r canlyniad chwilio blaenorol."
  ga: "Léim go dtí an toradh cuardaigh roimhe seo."
  gd: "Leum gun toradh luirg roimhe."
  pl: "Przechodzi do poprzedniego wyniku wyszukiwania."
  pt: "Vai para a correspondência anterior da busca."
  ru: "Переходит к предыдущему совпадению поиска."
  ar: "انتقل إلى نتيجة البحث السابقة."
  hi: "पिछले खोज मिलान पर जाएँ।"
  bn: "পূর্ববর্তী অনুসন্ধান মিলে যাওয়া স্থানে যায়।"
  zh: "跳转到上一个搜索匹配项。"
  ja: "前の検索結果へ移動します。"
menu.item.edit.find_selection.help:
  en: "Search for the next occurrence of the selected text."
  es: "Busca la siguiente aparición del texto seleccionado."
  fr: "Recherche l'occurrence suivante du texte sélectionné."
  de: "Sucht das nächste Vorkommen des ausgewählten Textes."
  cy: "Chwilio am ymddangosiad nesaf y testun a ddewiswyd."
  ga: "Cuardaigh an chéad láithreas eile den téacs roghnaithe."
  gd: "Lorg an ath thachartas dhen teacsa a thaghadh."
  pl: "Wyszukuje następne wystąpienie zaznaczonego tekstu."
  pt: "Busca a próxima ocorrência do texto selecionado."
  ru: "Ищет следующее вхождение выделенного текста."
  ar: "ابحث عن الظهور التالي للنص المحدد."
  hi: "चयनित टेक्स्ट की अगली उपस्थिति खोजें।"
  bn: "নির্বাচিত টেক্সটের পরবর্তী উপস্থিতি অনুসন্ধান করে।"
  zh: "查找所选文本的下一处出现。"
  ja: "選択したテキストの次の出現箇所を検索します。"
menu.item.edit.toggle_highlight.help:
  en: "Show or hide highlighting of search matches."
  es: "Muestra u oculta el resaltado de las coincidencias de búsqueda."
  fr: "Affiche ou masque la surbrillance des résultats de recherche."
  de: "Zeigt oder verbirgt die Hervorhebung von Suchtreffern."
  cy: "Dangos neu guddio amlygu canlyniadau chwilio."
  ga: "Taispeáin nó folaigh aibhsiú na dtorthaí cuardaigh."
  gd: "Seall no falaich soillseachadh nan toraidhean luirg."
  pl: "Pokazuje lub ukrywa podświetlenie wyników wyszukiwania."
  pt: "Mostra ou oculta o destaque das correspondências da busca."
  ru: "Показывает или скрывает подсветку совпадений поиска."
  ar: "أظهر أو أخفِ تمييز نتائج البحث."
  hi: "खोज मिलानों की हाइलाइटिंग दिखाएँ या छिपाएँ।"
  bn: "অনুসন্ধান মিলগুলির হাইলাইট দেখায় বা লুকায়।"
  zh: "显示或隐藏搜索匹配项的高亮。"
  ja: "検索結果のハイライト表示を切り替えます。"
menu.item.edit.find_in_files.help:
  en: "Search for text across all files in the workspace."
  es: "Busca texto en todos los archivos del espacio de trabajo."
  fr: "Recherche du texte dans tous les fichiers de l'espace de travail."
  de: "Sucht nach Text in allen Dateien des Arbeitsbereichs."
  cy: "Chwilio am destun ym mhob ffeil yn y gweithle."
  ga: "Cuardaigh téacs i ngach comhad sa spás oibre."
  gd: "Lorg teacsa anns a h-uile faidhle san rùm-obrach."
  pl: "Wyszukuje tekst we wszystkich plikach obszaru roboczego."
  pt: "Pesquisa texto em todos os arquivos do espaço de trabalho."
  ru: "Ищет текст во всех файлах рабочей области."
  ar: "ابحث عن نص في جميع ملفات مساحة العمل."
  hi: "वर्कस्पेस की सभी फ़ाइलों में टेक्स्ट खोजें।"
  bn: "ওয়ার্কস্পেসের সব ফাইলে টেক্সট অনুসন্ধান করে।"
  zh: "在工作区的所有文件中搜索文本。"
  ja: "ワークスペース内のすべてのファイルからテキストを検索します。"
menu.item.edit.replace_in_files.help:
  en: "Find and replace text across all files in the workspace."
  es: "Busca y reemplaza texto en todos los archivos del espacio de trabajo."
  fr: "Recherche et remplace du texte dans tous les fichiers de l'espace de travail."
  de: "Sucht und ersetzt Text in allen Dateien des Arbeitsbereichs."
  cy: "Chwilio ac amnewid testun ym mhob ffeil yn y gweithle."
  ga: "Aimsigh agus ionadaigh téacs i ngach comhad sa spás oibre."
  gd: "Lorg is cuir teacsa an àite ann an gach faidhle san rùm-obrach."
  pl: "Wyszukuje i zamienia tekst we wszystkich plikach obszaru roboczego."
  pt: "Localiza e substitui texto em todos os arquivos do espaço de trabalho."
  ru: "Находит и заменяет текст во всех файлах рабочей области."
  ar: "ابحث واستبدل النص في جميع ملفات مساحة العمل."
  hi: "वर्कस्पेस की सभी फ़ाइलों में टेक्स्ट खोजें और बदलें।"
  bn: "ওয়ার্কস্পেসের সব ফাইলে টেক্সট খুঁজে প্রতিস্থাপন করে।"
  zh: "在工作区的所有文件中查找并替换文本。"
  ja: "ワークスペース内のすべてのファイルでテキストを検索して置換します。"
menu.item.edit.search_workspace_dock.help:
  en: "Search the workspace in a docked results panel."
  es: "Busca en el espacio de trabajo con un panel de resultados acoplado."
  fr: "Recherche dans l'espace de travail via un panneau de résultats ancré."
  de: "Durchsucht den Arbeitsbereich in einem angedockten Ergebnisbereich."
  cy: "Chwilio'r gweithle mewn panel canlyniadau wedi'i angori."
  ga: "Cuardaigh an spás oibre i bpainéal torthaí ancaire."
  gd: "Lorg an rùm-obrach ann am panail thoraidhean acraichte."
  pl: "Przeszukuje obszar roboczy w zadokowanym panelu wyników."
  pt: "Pesquisa no espaço de trabalho em um painel de resultados acoplado."
  ru: "Ищет в рабочей области с закреплённой панелью результатов."
  ar: "ابحث في مساحة العمل ضمن لوحة نتائج مرسّاة."
  hi: "डॉक किए गए परिणाम पैनल में वर्कस्पेस खोजें।"
  bn: "একটি ডক করা ফলাফল প্যানেলে ওয়ার্কস্পেস অনুসন্ধান করে।"
  zh: "在停靠的结果面板中搜索工作区。"
  ja: "ドッキングした結果パネルでワークスペースを検索します。"
menu.item.edit.align.equals.help:
  en: "Align selected lines on their equals signs."
  es: "Alinea las líneas seleccionadas por sus signos de igual."
  fr: "Aligne les lignes sélectionnées sur leurs signes égal."
  de: "Richtet ausgewählte Zeilen an ihren Gleichheitszeichen aus."
  cy: "Alinio'r llinellau a ddewiswyd ar eu harwyddion hafal."
  ga: "Ailínigh na línte roghnaithe ar a gcomharthaí cothroime."
  gd: "Co-thaobhaich na loidhnichean a thaghadh air na comharran co-ionannachd."
  pl: "Wyrównuje zaznaczone wiersze według znaków równości."
  pt: "Alinha as linhas selecionadas pelos sinais de igual."
  ru: "Выравнивает выделенные строки по знакам равенства."
  ar: "حاذِ الأسطر المحددة على علامات المساواة."
  hi: "चयनित पंक्तियों को उनके बराबर चिह्नों पर संरेखित करें।"
  bn: "নির্বাচিত লাইনগুলিকে তাদের সমান চিহ্ন অনুযায়ী সারিবদ্ধ করে।"
  zh: "按等号对齐所选行。"
  ja: "選択した行を等号の位置で揃えます。"
menu.item.edit.align.colon.help:
  en: "Align the selected lines on the colon character."
  es: "Alinea las líneas seleccionadas por el carácter de dos puntos."
  fr: "Aligner les lignes sélectionnées sur le caractère deux-points."
  de: "Richtet die ausgewählten Zeilen am Doppelpunkt aus."
  cy: "Alinio'r llinellau dewisedig ar y colon."
  ga: "Ailínigh na línte roghnaithe ar an idirstad."
  gd: "Co-thaobhaich na loidhnichean taghte air a' chòilean."
  pl: "Wyrównaj zaznaczone wiersze względem dwukropka."
  pt: "Alinha as linhas selecionadas pelo caractere de dois-pontos."
  ru: "Выровнять выделенные строки по двоеточию."
  ar: "محاذاة الأسطر المحددة على النقطتين الرأسيتين."
  hi: "चयनित पंक्तियों को कोलन वर्ण पर संरेखित करें।"
  bn: "নির্বাচিত লাইনগুলি কোলন অক্ষরে সারিবদ্ধ করুন।"
  zh: "将选中的行按冒号字符对齐。"
  ja: "選択した行をコロン文字で揃えます。"
menu.item.edit.align.comma.help:
  en: "Align the selected lines on the comma character."
  es: "Alinea las líneas seleccionadas por el carácter de coma."
  fr: "Aligner les lignes sélectionnées sur le caractère virgule."
  de: "Richtet die ausgewählten Zeilen am Komma aus."
  cy: "Alinio'r llinellau dewisedig ar y goma."
  ga: "Ailínigh na línte roghnaithe ar an gcamóg."
  gd: "Co-thaobhaich na loidhnichean taghte air a' chromag."
  pl: "Wyrównaj zaznaczone wiersze względem przecinka."
  pt: "Alinha as linhas selecionadas pelo caractere de vírgula."
  ru: "Выровнять выделенные строки по запятой."
  ar: "محاذاة الأسطر المحددة على الفاصلة."
  hi: "चयनित पंक्तियों को अल्पविराम वर्ण पर संरेखित करें।"
  bn: "নির্বাচিত লাইনগুলি কমা অক্ষরে সারিবদ্ধ করুন।"
  zh: "将选中的行按逗号字符对齐。"
  ja: "選択した行をカンマ文字で揃えます。"
menu.item.edit.align.pipe.help:
  en: "Align the selected lines on the pipe character."
  es: "Alinea las líneas seleccionadas por el carácter de barra vertical."
  fr: "Aligner les lignes sélectionnées sur le caractère barre verticale."
  de: "Richtet die ausgewählten Zeilen am senkrechten Strich aus."
  cy: "Alinio'r llinellau dewisedig ar y bibell."
  ga: "Ailínigh na línte roghnaithe ar an bpíopa."
  gd: "Co-thaobhaich na loidhnichean taghte air a' phìob."
  pl: "Wyrównaj zaznaczone wiersze względem kreski pionowej."
  pt: "Alinha as linhas selecionadas pelo caractere de barra vertical."
  ru: "Выровнять выделенные строки по вертикальной черте."
  ar: "محاذاة الأسطر المحددة على الشرطة العمودية."
  hi: "चयनित पंक्तियों को पाइप वर्ण पर संरेखित करें।"
  bn: "নির্বাচিত লাইনগুলি পাইপ অক্ষরে সারিবদ্ধ করুন।"
  zh: "将选中的行按竖线字符对齐。"
  ja: "選択した行を縦棒文字で揃えます。"
menu.item.edit.surround.paren.help:
  en: "Wrap the selection in parentheses."
  es: "Rodea la selección con paréntesis."
  fr: "Entourer la sélection de parenthèses."
  de: "Umschließt die Auswahl mit runden Klammern."
  cy: "Amgáu'r dewisiad mewn cromfachau crwn."
  ga: "Cuir lúibíní timpeall an roghnúcháin."
  gd: "Cuairtich an taghadh le camagan."
  pl: "Otocz zaznaczenie nawiasami okrągłymi."
  pt: "Envolve a seleção com parênteses."
  ru: "Заключить выделение в круглые скобки."
  ar: "إحاطة التحديد بأقواس دائرية."
  hi: "चयन को कोष्ठक में लपेटें।"
  bn: "নির্বাচনটি বন্ধনীতে আবৃত করুন।"
  zh: "用圆括号包裹选区。"
  ja: "選択範囲を丸括弧で囲みます。"
menu.item.edit.surround.bracket.help:
  en: "Wrap the selection in square brackets."
  es: "Rodea la selección con corchetes."
  fr: "Entourer la sélection de crochets."
  de: "Umschließt die Auswahl mit eckigen Klammern."
  cy: "Amgáu'r dewisiad mewn cromfachau petryal."
  ga: "Cuir lúibíní cearnacha timpeall an roghnúcháin."
  gd: "Cuairtich an taghadh le camagan ceàrnach."
  pl: "Otocz zaznaczenie nawiasami kwadratowymi."
  pt: "Envolve a seleção com colchetes."
  ru: "Заключить выделение в квадратные скобки."
  ar: "إحاطة التحديد بأقواس مربعة."
  hi: "चयन को वर्ग कोष्ठक में लपेटें।"
  bn: "নির্বাচনটি বর্গাকার বন্ধনীতে আবৃত করুন।"
  zh: "用方括号包裹选区。"
  ja: "選択範囲を角括弧で囲みます。"
menu.item.edit.surround.brace.help:
  en: "Wrap the selection in curly braces."
  es: "Rodea la selección con llaves."
  fr: "Entourer la sélection d'accolades."
  de: "Umschließt die Auswahl mit geschweiften Klammern."
  cy: "Amgáu'r dewisiad mewn cromfachau cyrliog."
  ga: "Cuir lúibíní slabhracha timpeall an roghnúcháin."
  gd: "Cuairtich an taghadh le camagan fiar."
  pl: "Otocz zaznaczenie nawiasami klamrowymi."
  pt: "Envolve a seleção com chaves."
  ru: "Заключить выделение в фигурные скобки."
  ar: "إحاطة التحديد بأقواس معقوفة."
  hi: "चयन को कुंडलित कोष्ठक में लपेटें।"
  bn: "নির্বাচনটি কোঁকড়া বন্ধনীতে আবৃত করুন।"
  zh: "用花括号包裹选区。"
  ja: "選択範囲を波括弧で囲みます。"
menu.item.edit.surround.angle.help:
  en: "Wrap the selection in angle brackets."
  es: "Rodea la selección con corchetes angulares."
  fr: "Entourer la sélection de chevrons."
  de: "Umschließt die Auswahl mit spitzen Klammern."
  cy: "Amgáu'r dewisiad mewn cromfachau onglog."
  ga: "Cuir lúibíní uilleacha timpeall an roghnúcháin."
  gd: "Cuairtich an taghadh le camagan ceàrnagach."
  pl: "Otocz zaznaczenie nawiasami kątowymi."
  pt: "Envolve a seleção com colchetes angulares."
  ru: "Заключить выделение в угловые скобки."
  ar: "إحاطة التحديد بأقواس زاوية."
  hi: "चयन को कोण कोष्ठक में लपेटें।"
  bn: "নির্বাচনটি কোণ বন্ধনীতে আবৃত করুন।"
  zh: "用尖括号包裹选区。"
  ja: "選択範囲を山括弧で囲みます。"
menu.item.edit.surround.double_quote.help:
  en: "Wrap the selection in double quotes."
  es: "Rodea la selección con comillas dobles."
  fr: "Entourer la sélection de guillemets doubles."
  de: "Umschließt die Auswahl mit doppelten Anführungszeichen."
  cy: "Amgáu'r dewisiad mewn dyfynodau dwbl."
  ga: "Cuir comharthaí athfhriotail dúbailte timpeall an roghnúcháin."
  gd: "Cuairtich an taghadh le comharran-labhairt dùbailte."
  pl: "Otocz zaznaczenie cudzysłowami podwójnymi."
  pt: "Envolve a seleção com aspas duplas."
  ru: "Заключить выделение в двойные кавычки."
  ar: "إحاطة التحديد بعلامتي اقتباس مزدوجتين."
  hi: "चयन को दोहरे उद्धरण चिह्नों में लपेटें।"
  bn: "নির্বাচনটি দ্বিগুণ উদ্ধৃতি চিহ্নে আবৃত করুন।"
  zh: "用双引号包裹选区。"
  ja: "選択範囲を二重引用符で囲みます。"
menu.item.edit.surround.single_quote.help:
  en: "Wrap the selection in single quotes."
  es: "Rodea la selección con comillas simples."
  fr: "Entourer la sélection de guillemets simples."
  de: "Umschließt die Auswahl mit einfachen Anführungszeichen."
  cy: "Amgáu'r dewisiad mewn dyfynodau sengl."
  ga: "Cuir comharthaí athfhriotail singil timpeall an roghnúcháin."
  gd: "Cuairtich an taghadh le comharran-labhairt singilte."
  pl: "Otocz zaznaczenie cudzysłowami pojedynczymi."
  pt: "Envolve a seleção com aspas simples."
  ru: "Заключить выделение в одинарные кавычки."
  ar: "إحاطة التحديد بعلامتي اقتباس مفردتين."
  hi: "चयन को एकल उद्धरण चिह्नों में लपेटें।"
  bn: "নির্বাচনটি একক উদ্ধৃতি চিহ্নে আবৃত করুন।"
  zh: "用单引号包裹选区。"
  ja: "選択範囲を単一引用符で囲みます。"
menu.item.edit.surround.backtick.help:
  en: "Wrap the selection in backticks."
  es: "Rodea la selección con acentos graves."
  fr: "Entourer la sélection d'accents graves."
  de: "Umschließt die Auswahl mit Backticks."
  cy: "Amgáu'r dewisiad mewn ôl-dicau."
  ga: "Cuir cúldticeanna timpeall an roghnúcháin."
  gd: "Cuairtich an taghadh le backticks."
  pl: "Otocz zaznaczenie znakami wstecznego apostrofu."
  pt: "Envolve a seleção com crases."
  ru: "Заключить выделение в обратные кавычки."
  ar: "إحاطة التحديد بعلامات الاقتباس الخلفية."
  hi: "चयन को बैकटिक में लपेटें।"
  bn: "নির্বাচনটি ব্যাকটিকে আবৃত করুন।"
  zh: "用反引号包裹选区。"
  ja: "選択範囲をバッククォートで囲みます。"
menu.item.edit.undo.help:
  en: "Undo the last change."
  es: "Deshace el último cambio."
  fr: "Annuler la dernière modification."
  de: "Macht die letzte Änderung rückgängig."
  cy: "Dadwneud y newid diwethaf."
  ga: "Cealaigh an t-athrú deireanach."
  gd: "Neo-dhèan an t-atharrachadh mu dheireadh."
  pl: "Cofnij ostatnią zmianę."
  pt: "Desfaz a última alteração."
  ru: "Отменить последнее изменение."
  ar: "التراجع عن آخر تغيير."
  hi: "अंतिम परिवर्तन को पूर्ववत करें।"
  bn: "শেষ পরিবর্তনটি পূর্বাবস্থায় ফেরান।"
  zh: "撤销上一次更改。"
  ja: "直前の変更を元に戻します。"
menu.item.edit.redo.help:
  en: "Redo the last undone change."
  es: "Rehace el último cambio deshecho."
  fr: "Rétablir la dernière modification annulée."
  de: "Stellt die letzte rückgängig gemachte Änderung wieder her."
  cy: "Ailwneud y newid a ddadwnaethpwyd ddiwethaf."
  ga: "Athdhéan an t-athrú a cealaíodh go deireanach."
  gd: "Ath-dhèan an t-atharrachadh mu dheireadh a chaidh a neo-dhèanamh."
  pl: "Ponów ostatnią cofniętą zmianę."
  pt: "Refaz a última alteração desfeita."
  ru: "Вернуть последнее отменённое изменение."
  ar: "إعادة آخر تغيير تم التراجع عنه."
  hi: "अंतिम पूर्ववत परिवर्तन को फिर से करें।"
  bn: "শেষ পূর্বাবস্থায় ফেরানো পরিবর্তনটি পুনরায় করুন।"
  zh: "重做上一次撤销的更改。"
  ja: "直前に取り消した変更をやり直します。"
menu.item.edit.undo_branch.help:
  en: "Switch to another branch in the undo history."
  es: "Cambia a otra rama del historial de deshacer."
  fr: "Basculer vers une autre branche de l'historique d'annulation."
  de: "Wechselt zu einem anderen Zweig im Rückgängig-Verlauf."
  cy: "Newid i gangen arall yn yr hanes dadwneud."
  ga: "Athraigh go brainse eile i stair na gcealuithe."
  gd: "Gluais gu geug eile ann an eachdraidh an neo-dhèanaidh."
  pl: "Przełącz na inną gałąź w historii cofania."
  pt: "Alterna para outro ramo no histórico de desfazer."
  ru: "Переключиться на другую ветку в истории отмен."
  ar: "التبديل إلى فرع آخر في سجل التراجع."
  hi: "पूर्ववत इतिहास में किसी अन्य शाखा पर स्विच करें।"
  bn: "পূর্বাবস্থা ইতিহাসে অন্য শাখায় স্যুইচ করুন।"
  zh: "切换到撤销历史中的另一个分支。"
  ja: "取り消し履歴の別のブランチに切り替えます。"
menu.item.edit.cut.help:
  en: "Cut the selection to the clipboard."
  es: "Corta la selección al portapapeles."
  fr: "Couper la sélection vers le presse-papiers."
