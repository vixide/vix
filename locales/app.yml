  ja: "選択範囲を区切り記号で囲むコマンドを開きます。"
menu.item.edit.align_menu.help:
  en: "Open commands to align lines on a character."
  es: "Abre comandos para alinear líneas por un carácter."
  fr: "Ouvrir les commandes pour aligner les lignes sur un caractère."
  de: "Öffnet Befehle, um Zeilen an einem Zeichen auszurichten."
  cy: "Agor gorchmynion i alinio llinellau ar nod."
  ga: "Oscail orduithe chun línte a ailíniú ar charachtar."
  gd: "Fosgail àitheantan airson loidhnichean a cho-thaobhadh air caractar."
  pl: "Otwiera polecenia wyrównywania wierszy względem znaku."
  pt: "Abre comandos para alinhar linhas por um caractere."
  ru: "Открыть команды выравнивания строк по символу."
  ar: "فتح أوامر لمحاذاة الأسطر على حرف."
  hi: "किसी वर्ण पर पंक्तियों को संरेखित करने के लिए कमांड खोलें।"
