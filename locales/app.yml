menu.item.edit.comment_banner.help:
  en: "Wrap the selection in a decorative comment banner."
  es: "Envuelve la selección en un banner de comentario decorativo."
  fr: "Encadre la sélection dans une bannière de commentaire décorative."
  de: "Umschließt die Auswahl mit einem dekorativen Kommentarbanner."
  cy: "Amgáu'r dewisiad mewn baner sylw addurniadol."
  ga: "Fill an roghnúchán i mbratach tráchta maisiúil."
  gd: "Cuairtich an taghadh ann am bratach beachd sgeadachail."
  pl: "Otacza zaznaczenie ozdobnym banerem komentarza."
  pt: "Envolve a seleção num banner de comentário decorativo."
  ru: "Оборачивает выделение в декоративный баннер-комментарий."
  ar: "يحيط التحديد بلافتة تعليق زخرفية."
