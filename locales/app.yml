menu.item.edit.surround_menu.help:
  en: "Open commands to wrap the selection in delimiters."
  es: "Abre comandos para rodear la selección con delimitadores."
  fr: "Ouvrir les commandes pour entourer la sélection de délimiteurs."
  de: "Öffnet Befehle, um die Auswahl mit Begrenzern zu umschließen."
  cy: "Agor gorchmynion i amgáu'r dewisiad mewn amffinyddion."
  ga: "Oscail orduithe chun teormharcóirí a chur timpeall an roghnúcháin."
  gd: "Fosgail àitheantan airson an taghadh a chuairteachadh le crìoch-chomharran."
  pl: "Otwiera polecenia otaczania zaznaczenia ogranicznikami."
  pt: "Abre comandos para envolver a seleção com delimitadores."
  ru: "Открыть команды для заключения выделения в разделители."
  ar: "فتح أوامر لإحاطة التحديد بمحددات."
  hi: "चयन को सीमांकक में लपेटने के लिए कमांड खोलें।"
