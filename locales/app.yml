  ar: "فتح أوامر للعمل مع عُقد Org-roam."
  hi: "Org-roam नोड्स के साथ काम करने के कमांड खोलें।"
  bn: "Org-roam নোড নিয়ে কাজ করার কমান্ড খুলুন।"
  zh: "打开用于处理 Org-roam 节点的命令。"
  ja: "Org-roam ノードを扱うコマンドを開きます。"
menu.item.org.contacts.help:
  en: "Open commands for managing contacts."
  es: "Abre comandos para gestionar contactos."
  fr: "Ouvre les commandes de gestion des contacts."
  de: "Öffnet Befehle zur Verwaltung von Kontakten."
  cy: "Agor gorchmynion ar gyfer rheoli cysylltiadau."
  ga: "Oscail orduithe chun teagmhálaithe a bhainistiú."
  gd: "Fosgail àitheantan airson luchd-aithne a stiùireadh."
  pl: "Otwiera polecenia zarządzania kontaktami."
  pt: "Abre comandos para gerenciar contatos."
  ru: "Открывает команды для управления контактами."
  ar: "فتح أوامر لإدارة جهات الاتصال."
  hi: "संपर्क प्रबंधित करने के कमांड खोलें।"
  bn: "পরিচিতি পরিচালনার কমান্ড খুলুন।"
  zh: "打开用于管理联系人的命令。"
  ja: "連絡先を管理するコマンドを開きます。"
menu.item.org.export.help:
  en: "Open commands to export Org documents."
  es: "Abre comandos para exportar documentos Org."
  fr: "Ouvre les commandes d'exportation de documents Org."
  de: "Öffnet Befehle zum Exportieren von Org-Dokumenten."
  cy: "Agor gorchmynion i allforio dogfennau Org."
  ga: "Oscail orduithe chun cáipéisí Org a easpórtáil."
  gd: "Fosgail àitheantan gus sgrìobhainnean Org às-phortadh."
  pl: "Otwiera polecenia eksportu dokumentów Org."
  pt: "Abre comandos para exportar documentos Org."
  ru: "Открывает команды для экспорта документов Org."
  ar: "فتح أوامر لتصدير مستندات Org."
  hi: "Org दस्तावेज़ निर्यात करने के कमांड खोलें।"
  bn: "Org নথি রপ্তানি করার কমান্ড খুলুন।"
  zh: "打开用于导出 Org 文档的命令。"
  ja: "Org 文書をエクスポートするコマンドを開きます。"
menu.item.help.welcome.help:
  en: "Open the welcome and getting-started screen."
  es: "Abre la pantalla de bienvenida e introducción."
  fr: "Ouvre l'écran d'accueil et de prise en main."
  de: "Öffnet den Willkommens- und Einführungsbildschirm."
  cy: "Agor y sgrin croeso a chychwyn arni."
  ga: "Oscail an scáileán fáilte agus tosaithe."
  gd: "Fosgail an sgrìn fàilte is tòiseachaidh."
  pl: "Otwiera ekran powitalny i wprowadzenie."
  pt: "Abre o ecrã de boas-vindas e introdução."
  ru: "Открывает экран приветствия и начала работы."
  ar: "يفتح شاشة الترحيب والبدء."
  hi: "स्वागत और आरंभ स्क्रीन खोलें।"
  bn: "স্বাগত ও শুরু করার স্ক্রিন খুলুন।"
  zh: "打开欢迎和入门界面。"
  ja: "ようこそ画面と入門画面を開きます。"
menu.item.help.shortcuts.help:
  en: "Show the list of keyboard shortcuts."
  es: "Muestra la lista de atajos de teclado."
  fr: "Affiche la liste des raccourcis clavier."
  de: "Zeigt die Liste der Tastenkürzel an."
  cy: "Dangos y rhestr o lwybrau byr bysellfwrdd."
  ga: "Taispeáin liosta na n-aicearraí méarchláir."
  gd: "Seall liosta nan ath-ghoirid meur-chlàir."
  pl: "Wyświetla listę skrótów klawiszowych."
  pt: "Mostra a lista de atalhos de teclado."
  ru: "Показывает список сочетаний клавиш."
  ar: "يعرض قائمة اختصارات لوحة المفاتيح."
  hi: "कीबोर्ड शॉर्टकट की सूची दिखाएं।"
  bn: "কীবোর্ড শর্টকাটের তালিকা দেখান।"
  zh: "显示键盘快捷键列表。"
  ja: "キーボードショートカットの一覧を表示します。"
menu.item.help.license.help:
  en: "Show the Vix software license."
  es: "Muestra la licencia de software de Vix."
  fr: "Affiche la licence du logiciel Vix."
  de: "Zeigt die Softwarelizenz von Vix an."
  cy: "Dangos trwydded meddalwedd Vix."
  ga: "Taispeáin ceadúnas bogearraí Vix."
  gd: "Seall cead bathar-bog Vix."
  pl: "Wyświetla licencję oprogramowania Vix."
  pt: "Mostra a licença de software do Vix."
  ru: "Показывает лицензию программы Vix."
  ar: "يعرض ترخيص برنامج Vix."
  hi: "Vix सॉफ़्टवेयर लाइसेंस दिखाएं।"
  bn: "Vix সফটওয়্যার লাইসেন্স দেখান।"
  zh: "显示 Vix 软件许可证。"
  ja: "Vix のソフトウェアライセンスを表示します。"
menu.item.help.report_issue.help:
  en: "Open a form to report a bug or issue."
  es: "Abre un formulario para informar de un error o problema."
  fr: "Ouvre un formulaire pour signaler un bogue ou un problème."
  de: "Öffnet ein Formular zum Melden eines Fehlers oder Problems."
  cy: "Agor ffurflen i adrodd am nam neu broblem."
  ga: "Oscail foirm chun fabht nó fadhb a thuairisciú."
  gd: "Fosgail foirm gus buga no duilgheadas aithris."
  pl: "Otwiera formularz zgłaszania błędu lub problemu."
  pt: "Abre um formulário para relatar um erro ou problema."
  ru: "Открывает форму для сообщения об ошибке или проблеме."
  ar: "يفتح نموذجًا للإبلاغ عن خطأ أو مشكلة."
  hi: "बग या समस्या की रिपोर्ट करने के लिए फ़ॉर्म खोलें।"
  bn: "বাগ বা সমস্যা রিপোর্ট করার ফর্ম খুলুন।"
  zh: "打开表单以报告缺陷或问题。"
  ja: "バグや問題を報告するフォームを開きます。"
menu.item.help.privacy.help:
  en: "Show the Vix privacy statement."
  es: "Muestra la declaración de privacidad de Vix."
  fr: "Affiche la déclaration de confidentialité de Vix."
  de: "Zeigt die Datenschutzerklärung von Vix an."
  cy: "Dangos datganiad preifatrwydd Vix."
  ga: "Taispeáin ráiteas príobháideachais Vix."
  gd: "Seall aithris prìobhaideachd Vix."
  pl: "Wyświetla oświadczenie o prywatności Vix."
  pt: "Mostra a declaração de privacidade do Vix."
  ru: "Показывает заявление о конфиденциальности Vix."
  ar: "يعرض بيان الخصوصية الخاص بـ Vix."
  hi: "Vix गोपनीयता कथन दिखाएं।"
  bn: "Vix গোপনীয়তা বিবৃতি দেখান।"
  zh: "显示 Vix 隐私声明。"
  ja: "Vix のプライバシーステートメントを表示します。"
menu.item.run.start.help:
  en: "Start running or debugging the program."
  es: "Inicia la ejecución o depuración del programa."
  fr: "Lance l'exécution ou le débogage du programme."
  de: "Startet die Ausführung oder das Debugging des Programms."
  cy: "Dechrau rhedeg neu ddadfygio'r rhaglen."
  ga: "Tosaigh ag rith nó ag dífhabhtú an chláir."
  gd: "Tòisich a' ruith no a' dì-bhugachadh a' phrògraim."
  pl: "Uruchamia lub debuguje program."
  pt: "Inicia a execução ou depuração do programa."
  ru: "Запускает выполнение или отладку программы."
  ar: "يبدأ تشغيل البرنامج أو تصحيحه."
  hi: "प्रोग्राम चलाना या डीबग करना शुरू करें।"
  bn: "প্রোগ্রাম চালানো বা ডিবাগ করা শুরু করুন।"
  zh: "开始运行或调试程序。"
  ja: "プログラムの実行またはデバッグを開始します。"
menu.item.run.stop.help:
  en: "Stop the running program."
  es: "Detiene el programa en ejecución."
  fr: "Arrête le programme en cours d'exécution."
  de: "Stoppt das laufende Programm."
  cy: "Atal y rhaglen sy'n rhedeg."
  ga: "Stop an clár atá ag rith."
  gd: "Sguir dhen phrògram a tha a' ruith."
  pl: "Zatrzymuje działający program."
  pt: "Para o programa em execução."
  ru: "Останавливает выполняемую программу."
  ar: "يوقف البرنامج قيد التشغيل."
  hi: "चल रहे प्रोग्राम को रोकें।"
  bn: "চলমান প্রোগ্রাম থামান।"
  zh: "停止正在运行的程序。"
  ja: "実行中のプログラムを停止します。"
menu.item.run.toggle_breakpoint.help:
  en: "Set or clear a breakpoint at the current line."
  es: "Coloca o quita un punto de interrupción en la línea actual."
  fr: "Ajoute ou supprime un point d'arrêt sur la ligne actuelle."
  de: "Setzt oder entfernt einen Haltepunkt in der aktuellen Zeile."
  cy: "Gosod neu glirio pwynt torri ar y llinell gyfredol."
  ga: "Socraigh nó glan brisphointe ag an líne reatha."
  gd: "Suidhich no glan brisphuing air an loidhne làithreach."
  pl: "Ustawia lub usuwa punkt przerwania w bieżącym wierszu."
  pt: "Define ou remove um ponto de interrupção na linha atual."
  ru: "Устанавливает или снимает точку останова на текущей строке."
  ar: "يضع أو يزيل نقطة توقف عند السطر الحالي."
  hi: "वर्तमान पंक्ति पर ब्रेकपॉइंट सेट या हटाएं।"
  bn: "বর্তমান লাইনে ব্রেকপয়েন্ট সেট বা মুছুন।"
  zh: "在当前行设置或清除断点。"
  ja: "現在の行にブレークポイントを設定または解除します。"
menu.item.run.continue.help:
  en: "Resume execution until the next breakpoint."
  es: "Reanuda la ejecución hasta el siguiente punto de interrupción."
  fr: "Reprend l'exécution jusqu'au prochain point d'arrêt."
  de: "Setzt die Ausführung bis zum nächsten Haltepunkt fort."
  cy: "Ailddechrau'r gweithredu tan y pwynt torri nesaf."
  ga: "Atosaigh an rith go dtí an chéad bhrisphointe eile."
  gd: "Ath-thòisich an ruith gun ath bhrisphuing."
  pl: "Wznawia wykonywanie do następnego punktu przerwania."
  pt: "Retoma a execução até o próximo ponto de interrupção."
  ru: "Продолжает выполнение до следующей точки останова."
  ar: "يستأنف التنفيذ حتى نقطة التوقف التالية."
  hi: "अगले ब्रेकपॉइंट तक निष्पादन फिर से शुरू करें।"
  bn: "পরবর্তী ব্রেকপয়েন্ট পর্যন্ত এক্সিকিউশন পুনরায় শুরু করুন।"
  zh: "继续执行直到下一个断点。"
  ja: "次のブレークポイントまで実行を再開します。"
menu.item.run.step_over.help:
  en: "Execute the current line without entering functions."
  es: "Ejecuta la línea actual sin entrar en las funciones."
  fr: "Exécute la ligne actuelle sans entrer dans les fonctions."
  de: "Führt die aktuelle Zeile aus, ohne Funktionen zu betreten."
  cy: "Gweithredu'r llinell gyfredol heb fynd i mewn i ffwythiannau."
  ga: "Rith an líne reatha gan dul isteach i bhfeidhmeanna."
  gd: "Ruith an loidhne làithreach gun a dhol a-steach do ghnìomhan."
  pl: "Wykonuje bieżący wiersz bez wchodzenia do funkcji."
  pt: "Executa a linha atual sem entrar nas funções."
  ru: "Выполняет текущую строку, не заходя в функции."
  ar: "ينفّذ السطر الحالي دون الدخول إلى الدوال."
  hi: "फ़ंक्शन में प्रवेश किए बिना वर्तमान पंक्ति निष्पादित करें।"
  bn: "ফাংশনে না ঢুকে বর্তমান লাইন এক্সিকিউট করুন।"
  zh: "执行当前行但不进入函数。"
  ja: "関数に入らずに現在の行を実行します。"
menu.item.run.step_into.help:
  en: "Step into the function called on the current line."
  es: "Entra en la función llamada en la línea actual."
  fr: "Entre dans la fonction appelée sur la ligne actuelle."
  de: "Springt in die in der aktuellen Zeile aufgerufene Funktion."
  cy: "Camu i mewn i'r ffwythiant a alwyd ar y llinell gyfredol."
  ga: "Céimnigh isteach san fheidhm a glaodh ar an líne reatha."
  gd: "Ceumnaich a-steach dhan ghnìomh air an loidhne làithreach."
  pl: "Wchodzi do funkcji wywołanej w bieżącym wierszu."
  pt: "Entra na função chamada na linha atual."
  ru: "Заходит в функцию, вызванную на текущей строке."
  ar: "يدخل إلى الدالة المستدعاة في السطر الحالي."
  hi: "वर्तमान पंक्ति पर बुलाए गए फ़ंक्शन में प्रवेश करें।"
  bn: "বর্তমান লাইনে কল করা ফাংশনে প্রবেশ করুন।"
  zh: "步入当前行调用的函数。"
  ja: "現在の行で呼び出された関数にステップインします。"
menu.item.run.step_out.help:
  en: "Run until the current function returns."
  es: "Ejecuta hasta que la función actual retorne."
  fr: "Exécute jusqu'au retour de la fonction actuelle."
  de: "Läuft, bis die aktuelle Funktion zurückkehrt."
  cy: "Rhedeg tan i'r ffwythiant cyfredol ddychwelyd."
  ga: "Rith go dtí go bhfillfidh an fheidhm reatha."
  gd: "Ruith gus an till an gnìomh làithreach."
  pl: "Wykonuje program aż do powrotu z bieżącej funkcji."
  pt: "Executa até que a função atual retorne."
  ru: "Выполняет до выхода из текущей функции."
  ar: "يعمل حتى تعود الدالة الحالية."
  hi: "वर्तमान फ़ंक्शन के लौटने तक चलाएं।"
  bn: "বর্তমান ফাংশন রিটার্ন করা পর্যন্ত চালান।"
  zh: "运行直到当前函数返回。"
  ja: "現在の関数が戻るまで実行します。"
menu.item.run.pause.help:
  en: "Pause the running program."
  es: "Pausa el programa en ejecución."
  fr: "Met en pause le programme en cours d'exécution."
  de: "Hält das laufende Programm an."
  cy: "Oedi'r rhaglen sy'n rhedeg."
  ga: "Cuir sos leis an gclár atá ag rith."
  gd: "Cuir stad-fhois air a' phrògram a tha a' ruith."
  pl: "Wstrzymuje działający program."
  pt: "Pausa o programa em execução."
  ru: "Приостанавливает выполняемую программу."
  ar: "يوقف البرنامج قيد التشغيل مؤقتًا."
  hi: "चल रहे प्रोग्राम को रोकें (पॉज़)।"
  bn: "চলমান প্রোগ্রাম বিরতি দিন।"
  zh: "暂停正在运行的程序。"
  ja: "実行中のプログラムを一時停止します。"
menu.item.run.watch.help:
  en: "Add an expression to watch while debugging."
  es: "Añade una expresión para observar durante la depuración."
  fr: "Ajoute une expression à surveiller pendant le débogage."
  de: "Fügt einen Ausdruck zur Überwachung beim Debuggen hinzu."
  cy: "Ychwanegu mynegiad i'w wylio wrth ddadfygio."
  ga: "Cuir slonn leis le faire air agus tú ag dífhabhtú."
  gd: "Cuir eas-preisean ris airson a chumail sùil air rè dì-bhugachaidh."
  pl: "Dodaje wyrażenie do obserwowania podczas debugowania."
  pt: "Adiciona uma expressão para observar durante a depuração."
  ru: "Добавляет выражение для наблюдения при отладке."
  ar: "يضيف تعبيرًا لمراقبته أثناء التصحيح."
  hi: "डीबगिंग के दौरान देखने के लिए एक अभिव्यक्ति जोड़ें।"
  bn: "ডিবাগিংয়ের সময় দেখার জন্য একটি এক্সপ্রেশন যোগ করুন।"
  zh: "添加一个在调试时监视的表达式。"
  ja: "デバッグ中に監視する式を追加します。"
menu.item.run.repl.help:
  en: "Evaluate an expression in the debug console."
  es: "Evalúa una expresión en la consola de depuración."
  fr: "Évalue une expression dans la console de débogage."
  de: "Wertet einen Ausdruck in der Debug-Konsole aus."
  cy: "Gwerthuso mynegiad yn y consol dadfygio."
  ga: "Luacháil slonn sa chonsól dífhabhtaithe."
  gd: "Luachaich eas-preisean anns a' chonsoil dì-bhugachaidh."
  pl: "Oblicza wyrażenie w konsoli debugowania."
  pt: "Avalia uma expressão no console de depuração."
  ru: "Вычисляет выражение в консоли отладки."
  ar: "يقيّم تعبيرًا في وحدة تحكم التصحيح."
  hi: "डीबग कंसोल में एक अभिव्यक्ति का मूल्यांकन करें।"
  bn: "ডিবাগ কনসোলে একটি এক্সপ্রেশন মূল্যায়ন করুন।"
  zh: "在调试控制台中求值表达式。"
  ja: "デバッグコンソールで式を評価します。"
menu.item.run.panel.help:
  en: "Show or hide the debug panel."
  es: "Muestra u oculta el panel de depuración."
  fr: "Affiche ou masque le panneau de débogage."
  de: "Zeigt oder verbirgt das Debug-Panel."
  cy: "Dangos neu guddio'r panel dadfygio."
  ga: "Taispeáin nó folaigh an painéal dífhabhtaithe."
  gd: "Seall no falaich am panail dì-bhugachaidh."
  pl: "Pokazuje lub ukrywa panel debugowania."
  pt: "Mostra ou oculta o painel de depuração."
  ru: "Показывает или скрывает панель отладки."
  ar: "يُظهر أو يُخفي لوحة التصحيح."
  hi: "डीबग पैनल दिखाएं या छिपाएं।"
  bn: "ডিবাগ প্যানেল দেখান বা লুকান।"
  zh: "显示或隐藏调试面板。"
  ja: "デバッグパネルを表示または非表示にします。"
menu.item.view.keymap.help:
  en: "Choose the keyboard keymap."
  es: "Elige la asignación de teclado."
  fr: "Choisit la disposition des touches."
  de: "Wählt die Tastenbelegung aus."
  cy: "Dewis y map bysellau."
  ga: "Roghnaigh an mapa méarchláir."
  gd: "Tagh am mapa meur-chlàir."
  pl: "Wybiera mapę klawiszy."
  pt: "Escolhe o mapeamento de teclado."
  ru: "Выбирает раскладку клавиш."
  ar: "يختار خريطة لوحة المفاتيح."
  hi: "कीबोर्ड कीमैप चुनें।"
  bn: "কীবোর্ড কীম্যাপ নির্বাচন করুন।"
