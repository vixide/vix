  fr: "Affiche les détails et le diff du changement actuel."
  de: "Zeigt Details und Diff der aktuellen Änderung an."
  cy: "Dangos manylion a diff y newid cyfredol."
  ga: "Taispeáin sonraí agus diff an athraithe reatha."
  gd: "Seall am mion-fhiosrachadh agus an diff aig an atharrachadh làithreach."
  pl: "Wyświetla szczegóły i różnice bieżącej zmiany."
