  bn: "শিরোনাম দিয়ে একটি Org-roam নোড খুঁজুন এবং খুলুন।"
  zh: "按标题搜索并打开 Org-roam 节点。"
  ja: "タイトルで Org-roam ノードを検索して開きます。"
menu.item.org.node.insert_link.help:
  en: "Insert a link to an Org-roam node at the cursor."
  es: "Inserta un enlace a un nodo Org-roam en el cursor."
  fr: "Insère un lien vers un nœud Org-roam au niveau du curseur."
  de: "Fügt an der Cursorposition einen Link zu einem Org-roam-Knoten ein."
  cy: "Mewnosoda ddolen at nod Org-roam wrth y cyrchwr."
  ga: "Ionsáigh nasc chuig nód Org-roam ag an gcúrsóir."
  gd: "Cuir a-steach ceangal gu nòd Org-roam aig a' chùrsair."
  pl: "Wstawia łącze do węzła Org-roam w miejscu kursora."
  pt: "Insere um link para um nó Org-roam na posição do cursor."
  ru: "Вставляет ссылку на узел Org-roam в позиции курсора."
  ar: "يُدرج رابطًا إلى عقدة Org-roam عند المؤشر."
  hi: "कर्सर पर Org-roam नोड का लिंक डालें।"
  bn: "কার্সারে একটি Org-roam নোডের লিঙ্ক সন্নিবেশ করুন।"
  zh: "在光标处插入指向 Org-roam 节点的链接。"
  ja: "カーソル位置に Org-roam ノードへのリンクを挿入します。"
menu.item.org.node.link_complete.help:
  en: "Autocomplete a node link at the cursor from existing nodes."
  es: "Autocompleta un enlace de nodo en el cursor a partir de nodos existentes."
  fr: "Complète automatiquement un lien de nœud au curseur à partir des nœuds existants."
  de: "Vervollständigt an der Cursorposition einen Knotenlink aus vorhandenen Knoten."
  cy: "Awtogwblha ddolen nod wrth y cyrchwr o nodau presennol."
  ga: "Comhlánaigh nasc nóid go huathoibríoch ag an gcúrsóir ó nóid atá ann."
  gd: "Fèin-choilean ceangal nòd aig a' chùrsair bho nòdan a tha ann."
  pl: "Automatycznie uzupełnia łącze węzła w miejscu kursora na podstawie istniejących węzłów."
  pt: "Autocompleta um link de nó no cursor a partir dos nós existentes."
  ru: "Автодополняет ссылку на узел в позиции курсора из существующих узлов."
  ar: "يُكمل تلقائيًا رابط عقدة عند المؤشر من العقد الموجودة."
  hi: "मौजूदा नोड्स से कर्सर पर नोड लिंक स्वतः पूर्ण करें।"
  bn: "বিদ্যমান নোড থেকে কার্সারে নোড লিঙ্ক স্বয়ংক্রিয়ভাবে সম্পূর্ণ করুন।"
  zh: "根据现有节点在光标处自动补全节点链接。"
  ja: "既存ノードからカーソル位置のノードリンクを自動補完します。"
menu.item.org.node.insert_transclusion.help:
  en: "Insert a transclusion that embeds another node's content."
  es: "Inserta una transclusión que incrusta el contenido de otro nodo."
  fr: "Insère une transclusion qui intègre le contenu d'un autre nœud."
  de: "Fügt eine Transklusion ein, die den Inhalt eines anderen Knotens einbettet."
  cy: "Mewnosoda drawsgynhwysiad sy'n plannu cynnwys nod arall."
  ga: "Ionsáigh trasnú a leabaíonn ábhar nóid eile."
  gd: "Cuir a-steach tar-ghabhail a leabaicheas susbaint nòd eile."
  pl: "Wstawia transkluzję osadzającą treść innego węzła."
  pt: "Insere uma transclusão que incorpora o conteúdo de outro nó."
  ru: "Вставляет трансклюзию, встраивающую содержимое другого узла."
  ar: "يُدرج تضمينًا يُدمج محتوى عقدة أخرى."
  hi: "किसी अन्य नोड की सामग्री एम्बेड करने वाला ट्रांसक्लूजन डालें।"
  bn: "অন্য নোডের বিষয়বস্তু এম্বেড করে এমন ট্রান্সক্লুশন সন্নিবেশ করুন।"
  zh: "插入嵌入其他节点内容的转录引用。"
  ja: "別のノードの内容を埋め込むトランスクルージョンを挿入します。"
menu.item.org.node.random.help:
  en: "Open a randomly chosen Org-roam node."
  es: "Abre un nodo Org-roam elegido al azar."
  fr: "Ouvre un nœud Org-roam choisi au hasard."
  de: "Öffnet einen zufällig ausgewählten Org-roam-Knoten."
  cy: "Agora nod Org-roam a ddewiswyd ar hap."
  ga: "Oscail nód Org-roam a roghnaítear go randamach."
  gd: "Fosgail nòd Org-roam a thaghar air thuaiream."
  pl: "Otwiera losowo wybrany węzeł Org-roam."
  pt: "Abre um nó Org-roam escolhido aleatoriamente."
  ru: "Открывает случайно выбранный узел Org-roam."
  ar: "يفتح عقدة Org-roam مختارة عشوائيًا."
  hi: "यादृच्छिक रूप से चुना गया Org-roam नोड खोलें।"
  bn: "এলোমেলোভাবে নির্বাচিত একটি Org-roam নোড খুলুন।"
  zh: "打开随机选择的 Org-roam 节点。"
  ja: "ランダムに選ばれた Org-roam ノードを開きます。"
menu.item.org.node.nodeify.help:
  en: "Turn the current entry into a node by assigning it an ID."
  es: "Convierte la entrada actual en un nodo asignándole un ID."
  fr: "Transforme l'entrée actuelle en nœud en lui attribuant un ID."
  de: "Wandelt den aktuellen Eintrag durch Zuweisen einer ID in einen Knoten um."
  cy: "Trosa'r cofnod presennol yn nod trwy roi ID iddo."
  ga: "Déan nód den iontráil reatha trí ID a shannadh di."
  gd: "Tionndaidh an clàr làithreach na nòd le bhith a' sònrachadh ID dha."
  pl: "Zamienia bieżący wpis w węzeł, przypisując mu ID."
  pt: "Transforma a entrada atual em um nó atribuindo-lhe um ID."
  ru: "Превращает текущую запись в узел, назначая ей ID."
  ar: "يحوّل الإدخال الحالي إلى عقدة بتعيين مُعرّف له."
  hi: "वर्तमान प्रविष्टि को ID निर्दिष्ट कर नोड में बदलें।"
  bn: "একটি ID বরাদ্দ করে বর্তমান এন্ট্রিকে নোডে রূপান্তর করুন।"
  zh: "为当前条目分配 ID，将其转换为节点。"
  ja: "現在のエントリに ID を割り当ててノード化します。"
menu.item.org.node.extract_subtree.help:
  en: "Move the current subtree into its own new node file."
  es: "Mueve el subárbol actual a su propio archivo de nodo nuevo."
  fr: "Déplace le sous-arbre actuel dans son propre nouveau fichier de nœud."
  de: "Verschiebt den aktuellen Teilbaum in eine eigene neue Knotendatei."
  cy: "Symuda'r is-goeden bresennol i'w ffeil nod newydd ei hun."
  ga: "Bog an fochrann reatha isteach ina chomhad nóid nua féin."
  gd: "Gluais am fo-chraobh làithreach a-steach don fhaidhle nòd ùr aige fhèin."
  pl: "Przenosi bieżące poddrzewo do własnego nowego pliku węzła."
  pt: "Move a subárvore atual para o seu próprio arquivo de nó novo."
  ru: "Перемещает текущее поддерево в отдельный новый файл узла."
  ar: "ينقل الشجرة الفرعية الحالية إلى ملف عقدة جديد خاص بها."
  hi: "वर्तमान सबट्री को उसकी अपनी नई नोड फ़ाइल में ले जाएँ।"
  bn: "বর্তমান সাবট্রিকে তার নিজস্ব নতুন নোড ফাইলে সরান।"
  zh: "将当前子树移动到它自己的新节点文件中。"
  ja: "現在のサブツリーを独自の新しいノードファイルに移動します。"
menu.item.org.node.backlinks.help:
  en: "Show all nodes that link to the current node."
  es: "Muestra todos los nodos que enlazan con el nodo actual."
  fr: "Affiche tous les nœuds qui pointent vers le nœud actuel."
  de: "Zeigt alle Knoten, die auf den aktuellen Knoten verweisen."
  cy: "Dangosa bob nod sy'n cysylltu â'r nod presennol."
  ga: "Taispeáin gach nód a nascann leis an nód reatha."
  gd: "Seall a h-uile nòd a cheanglas ris an nòd làithreach."
  pl: "Pokazuje wszystkie węzły, które odsyłają do bieżącego węzła."
  pt: "Mostra todos os nós que apontam para o nó atual."
  ru: "Показывает все узлы, которые ссылаются на текущий узел."
  ar: "يعرض جميع العقد التي تربط بالعقدة الحالية."
  hi: "वर्तमान नोड से लिंक करने वाले सभी नोड दिखाएँ।"
  bn: "বর্তমান নোডের সাথে লিঙ্ক করা সমস্ত নোড দেখান।"
  zh: "显示链接到当前节点的所有节点。"
  ja: "現在のノードにリンクしているすべてのノードを表示します。"
menu.item.org.node.dead_links.help:
  en: "List links that point to missing or deleted nodes."
  es: "Enumera los enlaces que apuntan a nodos inexistentes o eliminados."
  fr: "Répertorie les liens pointant vers des nœuds manquants ou supprimés."
  de: "Listet Links auf, die auf fehlende oder gelöschte Knoten verweisen."
  cy: "Rhestra ddolenni sy'n cyfeirio at nodau coll neu ddiddymedig."
  ga: "Liostaigh naisc a dhíríonn ar nóid atá ar iarraidh nó scriosta."
  gd: "Liostaich ceanglaichean a tha a' comharrachadh nòdan a tha a dhìth no air an sguabadh às."
  pl: "Wyświetla łącza wskazujące na brakujące lub usunięte węzły."
  pt: "Lista links que apontam para nós ausentes ou excluídos."
  ru: "Перечисляет ссылки, ведущие на отсутствующие или удалённые узлы."
  ar: "يسرد الروابط التي تشير إلى عقد مفقودة أو محذوفة."
  hi: "गायब या हटाए गए नोड्स की ओर इशारा करने वाले लिंक सूचीबद्ध करें।"
  bn: "অনুপস্থিত বা মুছে ফেলা নোডের দিকে নির্দেশ করা লিঙ্কগুলি তালিকাভুক্ত করুন।"
  zh: "列出指向缺失或已删除节点的链接。"
  ja: "存在しない、または削除されたノードを指すリンクを一覧表示します。"
menu.item.org.node.rename_by_title.help:
  en: "Rename the current file to match the node's title."
  es: "Renombra el archivo actual para que coincida con el título del nodo."
  fr: "Renomme le fichier actuel pour correspondre au titre du nœud."
  de: "Benennt die aktuelle Datei passend zum Titel des Knotens um."
  cy: "Ailenwa'r ffeil bresennol i gyfateb i deitl y nod."
  ga: "Athainmnigh an comhad reatha chun teideal an nóid a mheaitseáil."
  gd: "Ath-ainmich am faidhle làithreach gus a bhith a rèir tiotal an nòid."
  pl: "Zmienia nazwę bieżącego pliku, aby pasowała do tytułu węzła."
  pt: "Renomeia o arquivo atual para corresponder ao título do nó."
  ru: "Переименовывает текущий файл в соответствии с заголовком узла."
  ar: "يعيد تسمية الملف الحالي ليطابق عنوان العقدة."
  hi: "वर्तमान फ़ाइल का नाम नोड के शीर्षक से मेल खाने के लिए बदलें।"
  bn: "নোডের শিরোনামের সাথে মেলাতে বর্তমান ফাইলের নাম পরিবর্তন করুন।"
  zh: "将当前文件重命名为与节点标题匹配。"
  ja: "現在のファイル名をノードのタイトルに合わせて変更します。"
menu.item.org.node.reset.help:
  en: "Rebuild the node cache from scratch."
  es: "Reconstruye la caché de nodos desde cero."
  fr: "Reconstruit le cache des nœuds à partir de zéro."
  de: "Baut den Knoten-Cache von Grund auf neu auf."
  cy: "Ailadeilada storfa'r nodau o'r dechrau."
  ga: "Atóg taisce na nód ón tús."
  gd: "Ath-thog tasgadan nan nòd bhon toiseach."
  pl: "Odbudowuje pamięć podręczną węzłów od podstaw."
  pt: "Reconstrói o cache de nós do zero."
  ru: "Перестраивает кэш узлов с нуля."
  ar: "يعيد بناء ذاكرة العقد المؤقتة من الصفر."
  hi: "नोड कैश को शुरू से पुनर्निर्मित करें।"
  bn: "নোড ক্যাশ নতুন করে পুনর্নির্মাণ করুন।"
  zh: "从头重建节点缓存。"
  ja: "ノードキャッシュを一から再構築します。"
menu.item.org.contacts.email.help:
  en: "Insert an email field into the current contact entry."
  es: "Inserta un campo de correo electrónico en la entrada de contacto actual."
  fr: "Insère un champ e-mail dans la fiche de contact actuelle."
  de: "Fügt dem aktuellen Kontakteintrag ein E-Mail-Feld hinzu."
  cy: "Mewnosoda faes e-bost yn y cofnod cyswllt presennol."
  ga: "Ionsáigh réimse ríomhphoist san iontráil teagmhála reatha."
  gd: "Cuir a-steach raon puist-d anns a' chlàr fiosrachaidh làithreach."
  pl: "Wstawia pole adresu e-mail do bieżącego wpisu kontaktu."
  pt: "Insere um campo de e-mail na entrada de contato atual."
  ru: "Вставляет поле электронной почты в текущую запись контакта."
  ar: "يُدرج حقل بريد إلكتروني في إدخال جهة الاتصال الحالية."
  hi: "वर्तमान संपर्क प्रविष्टि में एक ईमेल फ़ील्ड डालें।"
  bn: "বর্তমান পরিচিতি এন্ট্রিতে একটি ইমেল ফিল্ড সন্নিবেশ করুন।"
  zh: "在当前联系人条目中插入电子邮件字段。"
  ja: "現在の連絡先エントリにメールフィールドを挿入します。"
menu.item.org.contacts.phone.help:
  en: "Insert a phone number field into the current contact."
  es: "Inserta un campo de número de teléfono en el contacto actual."
  fr: "Insère un champ de numéro de téléphone dans le contact actuel."
  de: "Fügt dem aktuellen Kontakt ein Telefonnummernfeld hinzu."
  cy: "Mewnosod maes rhif ffôn yn y cyswllt cyfredol."
  ga: "Cuir réimse uimhir ghutháin isteach sa teagmhálaí reatha."
  gd: "Cuir raon àireamh fòn a-steach don neach-aithne làithreach."
  pl: "Wstawia pole numeru telefonu do bieżącego kontaktu."
  pt: "Insere um campo de número de telefone no contato atual."
  ru: "Вставляет поле номера телефона в текущий контакт."
  ar: "إدراج حقل رقم هاتف في جهة الاتصال الحالية."
  hi: "वर्तमान संपर्क में एक फ़ोन नंबर फ़ील्ड डालें।"
  bn: "বর্তমান পরিচিতিতে একটি ফোন নম্বর ফিল্ড যোগ করুন।"
  zh: "在当前联系人中插入电话号码字段。"
  ja: "現在の連絡先に電話番号フィールドを挿入します。"
menu.item.org.contacts.address.help:
  en: "Insert an address field into the current contact."
  es: "Inserta un campo de dirección en el contacto actual."
  fr: "Insère un champ d'adresse dans le contact actuel."
  de: "Fügt dem aktuellen Kontakt ein Adressfeld hinzu."
  cy: "Mewnosod maes cyfeiriad yn y cyswllt cyfredol."
  ga: "Cuir réimse seoltade isteach sa teagmhálaí reatha."
  gd: "Cuir raon seòlaidh a-steach don neach-aithne làithreach."
  pl: "Wstawia pole adresu do bieżącego kontaktu."
  pt: "Insere um campo de endereço no contato atual."
  ru: "Вставляет поле адреса в текущий контакт."
  ar: "إدراج حقل عنوان في جهة الاتصال الحالية."
  hi: "वर्तमान संपर्क में एक पता फ़ील्ड डालें।"
  bn: "বর্তমান পরিচিতিতে একটি ঠিকানা ফিল্ড যোগ করুন।"
  zh: "在当前联系人中插入地址字段。"
  ja: "現在の連絡先に住所フィールドを挿入します。"
menu.item.org.contacts.birthday.help:
  en: "Insert a birthday field into the current contact."
  es: "Inserta un campo de cumpleaños en el contacto actual."
  fr: "Insère un champ d'anniversaire dans le contact actuel."
  de: "Fügt dem aktuellen Kontakt ein Geburtstagsfeld hinzu."
  cy: "Mewnosod maes pen-blwydd yn y cyswllt cyfredol."
  ga: "Cuir réimse lá breithe isteach sa teagmhálaí reatha."
  gd: "Cuir raon co-là-breith a-steach don neach-aithne làithreach."
  pl: "Wstawia pole urodzin do bieżącego kontaktu."
  pt: "Insere um campo de aniversário no contato atual."
  ru: "Вставляет поле дня рождения в текущий контакт."
  ar: "إدراج حقل عيد ميلاد في جهة الاتصال الحالية."
  hi: "वर्तमान संपर्क में एक जन्मदिन फ़ील्ड डालें।"
  bn: "বর্তমান পরিচিতিতে একটি জন্মদিন ফিল্ড যোগ করুন।"
  zh: "在当前联系人中插入生日字段。"
  ja: "現在の連絡先に誕生日フィールドを挿入します。"
menu.item.org.contacts.nickname.help:
  en: "Insert a nickname field into the current contact."
  es: "Inserta un campo de apodo en el contacto actual."
  fr: "Insère un champ de surnom dans le contact actuel."
  de: "Fügt dem aktuellen Kontakt ein Spitznamenfeld hinzu."
  cy: "Mewnosod maes llysenw yn y cyswllt cyfredol."
  ga: "Cuir réimse leasainm isteach sa teagmhálaí reatha."
  gd: "Cuir raon far-ainm a-steach don neach-aithne làithreach."
  pl: "Wstawia pole pseudonimu do bieżącego kontaktu."
  pt: "Insere um campo de apelido no contato atual."
  ru: "Вставляет поле прозвища в текущий контакт."
  ar: "إدراج حقل اسم مستعار في جهة الاتصال الحالية."
  hi: "वर्तमान संपर्क में एक उपनाम फ़ील्ड डालें।"
  bn: "বর্তমান পরিচিতিতে একটি ডাকনাম ফিল্ড যোগ করুন।"
  zh: "在当前联系人中插入昵称字段。"
  ja: "現在の連絡先にニックネームフィールドを挿入します。"
menu.item.org.contacts.note.help:
  en: "Insert a note field into the current contact."
