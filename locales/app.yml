  ru: "Показывает подробности и различия текущего изменения."
  ar: "اعرض تفاصيل التغيير الحالي والفرق الخاص به."
  hi: "वर्तमान परिवर्तन का विवरण और diff दिखाएं।"
  bn: "বর্তমান পরিবর্তনের বিবরণ এবং diff দেখান।"
  zh: "显示当前更改的详细信息和差异。"
  ja: "現在の変更の詳細と差分を表示します。"
menu.item.jj.new.help:
