  fr: "Quitte Vix."
  de: "Beendet Vix."
  cy: "Gadael Vix."
  ga: "Scoir de Vix."
  gd: "Fàg Vix."
  pl: "Zamyka Vix."
  pt: "Sai do Vix."
  ru: "Выходит из Vix."
