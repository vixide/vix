  de: "Überschreibmodus ein-/ausschalten, sodass Eingaben Zeichen ersetzen."
  cy: "Toglo'r modd trosysgrifo fel bod teipio'n disodli nodau."
  ga: "Scoránaigh mód forscríofa ionas go n-athraíonn clóscríobh carachtair."
  gd: "Toglaich modh tar-sgrìobhaidh gus an cuir sgrìobhadh an àite charactaran."
  pl: "Przełącz tryb nadpisywania, aby pisanie zastępowało znaki."
