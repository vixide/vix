  ja: "インターフェースの言語を選択します。"
menu.item.view.time_zone.help:
  en: "Set the time zone used for display."
  es: "Establece la zona horaria usada para mostrar."
  fr: "Définit le fuseau horaire utilisé pour l'affichage."
  de: "Legt die für die Anzeige verwendete Zeitzone fest."
  cy: "Gosod y gylchfa amser a ddefnyddir i arddangos."
  ga: "Socraigh an crios ama a úsáidtear le taispeáint."
  gd: "Suidhich an roinn-tìde a thèid a chleachdadh airson taisbeanaidh."
  pl: "Ustawia strefę czasową używaną do wyświetlania."
  pt: "Define o fuso horário usado para exibição."
  ru: "Задаёт часовой пояс для отображения."
  ar: "يحدد المنطقة الزمنية المستخدمة للعرض."
  hi: "प्रदर्शन के लिए उपयोग किया जाने वाला समय क्षेत्र सेट करें।"
  bn: "প্রদর্শনের জন্য ব্যবহৃত টাইম জোন সেট করুন।"
  zh: "设置用于显示的时区。"
  ja: "表示に使用するタイムゾーンを設定します。"
menu.item.view.split.help:
  en: "Split the editor into multiple panes."
  es: "Divide el editor en varios paneles."
  fr: "Divise l'éditeur en plusieurs volets."
  de: "Teilt den Editor in mehrere Bereiche auf."
  cy: "Rhannu'r golygydd yn sawl paen."
  ga: "Roinn an t-eagarthóir i bpánaí iomadúla."
  gd: "Sgoilt an deasaiche ann an iomadh leòsan."
  pl: "Dzieli edytor na wiele paneli."
  pt: "Divide o editor em vários painéis."
  ru: "Разделяет редактор на несколько панелей."
  ar: "يقسّم المحرر إلى عدة أجزاء."
  hi: "संपादक को कई पैन में विभाजित करें।"
  bn: "সম্পাদককে একাধিক প্যানে বিভক্ত করুন।"
  zh: "将编辑器拆分为多个窗格。"
  ja: "エディターを複数のペインに分割します。"
menu.item.view.layout.help:
  en: "Choose the window layout."
  es: "Elige la disposición de las ventanas."
  fr: "Choisit la disposition des fenêtres."
  de: "Wählt das Fensterlayout aus."
  cy: "Dewis cynllun y ffenestri."
  ga: "Roghnaigh leagan amach na fuinneoige."
  gd: "Tagh co-dhealbhachd na h-uinneige."
  pl: "Wybiera układ okien."
  pt: "Escolhe o layout da janela."
  ru: "Выбирает расположение окон."
  ar: "يختار تخطيط النوافذ."
  hi: "विंडो लेआउट चुनें।"
  bn: "উইন্ডো লেআউট নির্বাচন করুন।"
  zh: "选择窗口布局。"
  ja: "ウィンドウのレイアウトを選択します。"
menu.item.view.editor.help:
  en: "Adjust editor display options."
  es: "Ajusta las opciones de visualización del editor."
  fr: "Ajuste les options d'affichage de l'éditeur."
  de: "Passt die Anzeigeoptionen des Editors an."
  cy: "Addasu opsiynau arddangos y golygydd."
  ga: "Coigeartaigh roghanna taispeána an eagarthóra."
  gd: "Atharraich roghainnean taisbeanaidh an deasaiche."
  pl: "Dostosowuje opcje wyświetlania edytora."
  pt: "Ajusta as opções de exibição do editor."
  ru: "Настраивает параметры отображения редактора."
  ar: "يضبط خيارات عرض المحرر."
  hi: "संपादक प्रदर्शन विकल्प समायोजित करें।"
  bn: "সম্পাদকের প্রদর্শন বিকল্প সমন্বয় করুন।"
  zh: "调整编辑器显示选项。"
  ja: "エディターの表示オプションを調整します。"
menu.item.view.zoom.help:
  en: "Adjust the zoom and text size."
  es: "Ajusta el zoom y el tamaño del texto."
  fr: "Ajuste le zoom et la taille du texte."
  de: "Passt Zoom und Textgröße an."
  cy: "Addasu'r chwyddo a maint y testun."
  ga: "Coigeartaigh an súmáil agus méid an téacs."
  gd: "Atharraich an sùmadh agus meud an teacsa."
  pl: "Dostosowuje powiększenie i rozmiar tekstu."
  pt: "Ajusta o zoom e o tamanho do texto."
  ru: "Настраивает масштаб и размер текста."
  ar: "يضبط التكبير وحجم النص."
  hi: "ज़ूम और टेक्स्ट आकार समायोजित करें।"
  bn: "জুম এবং টেক্সটের আকার সমন্বয় করুন।"
  zh: "调整缩放和文字大小。"
  ja: "ズームとテキストサイズを調整します。"
menu.vix.help:
  en: "Open the Vix application menu for settings, about, and quitting."
  es: "Abre el menú de la aplicación Vix para ajustes, información y salir."
  fr: "Ouvre le menu de l'application Vix pour les réglages, à propos et quitter."
  de: "Öffnet das Vix-Anwendungsmenü für Einstellungen, Info und Beenden."
  cy: "Agor dewislen gymhwysiad Vix ar gyfer gosodiadau, ynghylch a gadael."
  ga: "Oscail roghchlár feidhmchláir Vix le haghaidh socruithe, eolas agus scor."
  gd: "Fosgail clàr-taice aplacaid Vix airson roghainnean, mu dheidhinn is fàgail."
  pl: "Otwiera menu aplikacji Vix z ustawieniami, informacjami i wyjściem."
  pt: "Abre o menu do aplicativo Vix para configurações, sobre e sair."
  ru: "Открывает меню приложения Vix: настройки, «О программе» и выход."
  ar: "يفتح قائمة تطبيق Vix للإعدادات والمعلومات والخروج."
  hi: "सेटिंग्स, परिचय और बाहर निकलने के लिए Vix एप्लिकेशन मेनू खोलें।"
  bn: "সেটিংস, পরিচিতি ও প্রস্থানের জন্য Vix অ্যাপ্লিকেশন মেনু খুলুন।"
  zh: "打开 Vix 应用程序菜单，进行设置、关于和退出。"
  ja: "設定、バージョン情報、終了のための Vix アプリケーションメニューを開きます。"
menu.edit.help:
  en: "Open the Edit menu to undo, cut, copy, paste, and find text."
  es: "Abre el menú Editar para deshacer, cortar, copiar, pegar y buscar texto."
  fr: "Ouvre le menu Édition pour annuler, couper, copier, coller et rechercher."
  de: "Öffnet das Menü Bearbeiten zum Rückgängigmachen, Ausschneiden, Kopieren, Einfügen und Suchen."
  cy: "Agor y ddewislen Golygu i ddadwneud, torri, copïo, gludo a chwilio testun."
  ga: "Oscail an roghchlár Eagar chun cealú, gearradh, cóipeáil, greamú agus téacs a aimsiú."
  gd: "Fosgail an clàr Deasaich airson neo-dhèanamh, gearradh, lethbhreac, cur ann is lorg teacsa."
  pl: "Otwiera menu Edycja, aby cofać, wycinać, kopiować, wklejać i wyszukiwać tekst."
  pt: "Abre o menu Editar para desfazer, recortar, copiar, colar e localizar texto."
  ru: "Открывает меню «Правка»: отмена, вырезание, копирование, вставка и поиск."
  ar: "يفتح قائمة التحرير للتراجع والقص والنسخ واللصق والبحث عن النص."
  hi: "टेक्स्ट को पूर्ववत, कट, कॉपी, पेस्ट और खोजने के लिए संपादन मेनू खोलें।"
  bn: "লেখা আনডু, কাট, কপি, পেস্ট ও খোঁজার জন্য Edit মেনু খুলুন।"
  zh: "打开编辑菜单，进行撤销、剪切、复制、粘贴和查找文本。"
  ja: "元に戻す、切り取り、コピー、貼り付け、検索を行う編集メニューを開きます。"
menu.view.help:
  en: "Open the View menu to change layout, panels, and display options."
  es: "Abre el menú Ver para cambiar el diseño, los paneles y las opciones de vista."
  fr: "Ouvre le menu Affichage pour modifier la disposition, les panneaux et l'affichage."
  de: "Öffnet das Menü Ansicht zum Ändern von Layout, Bereichen und Anzeigeoptionen."
  cy: "Agor y ddewislen Golwg i newid cynllun, paneli ac opsiynau arddangos."
  ga: "Oscail an roghchlár Amharc chun leagan amach, painéil agus roghanna taispeána a athrú."
  gd: "Fosgail an clàr Sealladh airson co-dhealbhachd, panailean is roghainnean taisbeanaidh atharrachadh."
  pl: "Otwiera menu Widok, aby zmienić układ, panele i opcje wyświetlania."
  pt: "Abre o menu Exibir para alterar layout, painéis e opções de exibição."
  ru: "Открывает меню «Вид» для изменения макета, панелей и параметров отображения."
  ar: "يفتح قائمة العرض لتغيير التخطيط واللوحات وخيارات العرض."
  hi: "लेआउट, पैनल और प्रदर्शन विकल्प बदलने के लिए दृश्य मेनू खोलें।"
  bn: "লেআউট, প্যানেল ও প্রদর্শন বিকল্প পরিবর্তনে View মেনু খুলুন।"
  zh: "打开视图菜单，更改布局、面板和显示选项。"
  ja: "レイアウト、パネル、表示オプションを変更する表示メニューを開きます。"
menu.go.help:
  en: "Open the Go menu to jump to files, lines, symbols, and locations."
  es: "Abre el menú Ir para saltar a archivos, líneas, símbolos y ubicaciones."
  fr: "Ouvre le menu Aller pour accéder aux fichiers, lignes, symboles et emplacements."
  de: "Öffnet das Menü Gehe zu, um zu Dateien, Zeilen, Symbolen und Orten zu springen."
  cy: "Agor y ddewislen Mynd i neidio i ffeiliau, llinellau, symbolau a lleoliadau."
  ga: "Oscail an roghchlár Téigh chun léim chuig comhaid, línte, siombailí agus suíomhanna."
  gd: "Fosgail an clàr Rach airson leum gu faidhlichean, loidhnichean, samhlaidhean is àiteachan."
  pl: "Otwiera menu Przejdź, aby przejść do plików, wierszy, symboli i lokalizacji."
  pt: "Abre o menu Ir para saltar para arquivos, linhas, símbolos e locais."
  ru: "Открывает меню «Переход» для перехода к файлам, строкам, символам и местам."
  ar: "يفتح قائمة الانتقال للقفز إلى الملفات والأسطر والرموز والمواقع."
  hi: "फ़ाइलों, पंक्तियों, प्रतीकों और स्थानों पर जाने के लिए जाएँ मेनू खोलें।"
  bn: "ফাইল, লাইন, সিম্বল ও অবস্থানে যেতে Go মেনু খুলুন।"
  zh: "打开转到菜单，跳转到文件、行、符号和位置。"
  ja: "ファイル、行、シンボル、場所へ移動する移動メニューを開きます。"
menu.run.help:
  en: "Open the Run menu to build, run, and debug your code."
  es: "Abre el menú Ejecutar para compilar, ejecutar y depurar tu código."
  fr: "Ouvre le menu Exécuter pour compiler, exécuter et déboguer votre code."
  de: "Öffnet das Menü Ausführen zum Erstellen, Ausführen und Debuggen des Codes."
  cy: "Agor y ddewislen Rhedeg i adeiladu, rhedeg a dadfygio eich cod."
  ga: "Oscail an roghchlár Rith chun do chód a thógáil, a rith agus a dhífhabhtú."
  gd: "Fosgail an clàr Ruith airson do chòd a thogail, a ruith is a dhì-bhugachadh."
  pl: "Otwiera menu Uruchom, aby budować, uruchamiać i debugować kod."
  pt: "Abre o menu Executar para compilar, executar e depurar seu código."
  ru: "Открывает меню «Запуск» для сборки, запуска и отладки кода."
  ar: "يفتح قائمة التشغيل لبناء التعليمات البرمجية وتشغيلها وتصحيحها."
  hi: "अपने कोड को बिल्ड, रन और डीबग करने के लिए रन मेनू खोलें।"
  bn: "আপনার কোড বিল্ড, রান ও ডিবাগ করতে Run মেনু খুলুন।"
  zh: "打开运行菜单，构建、运行和调试代码。"
  ja: "コードのビルド、実行、デバッグを行う実行メニューを開きます。"
menu.ai.help:
  en: "Open the AI menu for code assistance, chat, and generation."
  es: "Abre el menú AI para asistencia de código, chat y generación."
  fr: "Ouvre le menu AI pour l'assistance au code, le chat et la génération."
  de: "Öffnet das AI-Menü für Code-Unterstützung, Chat und Generierung."
  cy: "Agor y ddewislen AI ar gyfer cymorth cod, sgwrsio a chynhyrchu."
  ga: "Oscail an roghchlár AI le haghaidh cúnamh cóid, comhrá agus giniúint."
  gd: "Fosgail an clàr AI airson taic còd, cabadaich is gineadh."
  pl: "Otwiera menu AI z pomocą w kodzie, czatem i generowaniem."
  pt: "Abre o menu AI para assistência de código, chat e geração."
  ru: "Открывает меню AI для помощи с кодом, чата и генерации."
  ar: "يفتح قائمة AI للمساعدة في البرمجة والدردشة والتوليد."
  hi: "कोड सहायता, चैट और जनरेशन के लिए AI मेनू खोलें।"
  bn: "কোড সহায়তা, চ্যাট ও জেনারেশনের জন্য AI মেনু খুলুন।"
  zh: "打开 AI 菜单，进行代码辅助、聊天和生成。"
  ja: "コード支援、チャット、生成のための AI メニューを開きます。"
menu.db.help:
  en: "Open the DB menu to connect to and query databases with SQL."
  es: "Abre el menú DB para conectarte a bases de datos y consultarlas con SQL."
  fr: "Ouvre le menu DB pour se connecter aux bases de données et les interroger en SQL."
  de: "Öffnet das DB-Menü, um Datenbanken zu verbinden und mit SQL abzufragen."
  cy: "Agor y ddewislen DB i gysylltu â chronfeydd data a'u holi â SQL."
  ga: "Oscail an roghchlár DB chun nascadh le bunachair sonraí agus iad a cheistiú le SQL."
  gd: "Fosgail an clàr DB airson ceangal ri stòran-dàta is an ceasnachadh le SQL."
  pl: "Otwiera menu DB, aby łączyć się z bazami danych i odpytywać je w SQL."
  pt: "Abre o menu DB para conectar-se a bancos de dados e consultá-los com SQL."
  ru: "Открывает меню DB для подключения к базам данных и запросов на SQL."
  ar: "يفتح قائمة DB للاتصال بقواعد البيانات والاستعلام عنها باستخدام SQL."
  hi: "SQL से डेटाबेस से जुड़ने और क्वेरी करने के लिए DB मेनू खोलें।"
  bn: "SQL দিয়ে ডেটাবেসে সংযোগ ও কোয়েরি করতে DB মেনু খুলুন।"
  zh: "打开 DB 菜单，连接数据库并用 SQL 查询。"
  ja: "SQL でデータベースに接続しクエリを実行する DB メニューを開きます。"
menu.jj.help:
  en: "Open the JJ menu for Jujutsu version-control commands."
  es: "Abre el menú JJ para los comandos de control de versiones Jujutsu."
  fr: "Ouvre le menu JJ pour les commandes de gestion de versions Jujutsu."
  de: "Öffnet das JJ-Menü für Versionsverwaltungsbefehle von Jujutsu."
  cy: "Agor y ddewislen JJ ar gyfer gorchmynion rheoli fersiynau Jujutsu."
  ga: "Oscail an roghchlár JJ le haghaidh orduithe rialaithe leaganacha Jujutsu."
  gd: "Fosgail an clàr JJ airson àitheantan smachd tionndaidh Jujutsu."
  pl: "Otwiera menu JJ z poleceniami kontroli wersji Jujutsu."
  pt: "Abre o menu JJ para comandos de controle de versão do Jujutsu."
  ru: "Открывает меню JJ с командами системы контроля версий Jujutsu."
  ar: "يفتح قائمة JJ لأوامر التحكم في الإصدارات الخاصة بـ Jujutsu."
  hi: "Jujutsu वर्शन-कंट्रोल कमांड के लिए JJ मेनू खोलें।"
  bn: "Jujutsu ভার্সন-কন্ট্রোল কমান্ডের জন্য JJ মেনু খুলুন।"
  zh: "打开 JJ 菜单，使用 Jujutsu 版本控制命令。"
  ja: "Jujutsu バージョン管理コマンドのための JJ メニューを開きます。"
menu.git.help:
  en: "Open the Git menu to stage, commit, branch, and push changes."
  es: "Abre el menú Git para preparar, confirmar, ramificar y enviar cambios."
  fr: "Ouvre le menu Git pour indexer, valider, créer des branches et pousser."
  de: "Öffnet das Git-Menü zum Stagen, Committen, Verzweigen und Pushen von Änderungen."
  cy: "Agor y ddewislen Git i lwyfannu, cyflawni, canghennu a gwthio newidiadau."
  ga: "Oscail an roghchlár Git chun athruithe a stáitsiú, a thiomnú, a bhrainseáil agus a bhrú."
  gd: "Fosgail an clàr Git airson atharraichean a stèidseadh, a chur a-steach, a mheuranachadh is a phutadh."
  pl: "Otwiera menu Git, aby dodawać, zatwierdzać, tworzyć gałęzie i wypychać zmiany."
  pt: "Abre o menu Git para preparar, confirmar, ramificar e enviar alterações."
  ru: "Открывает меню Git для индексации, коммитов, веток и отправки изменений."
  ar: "يفتح قائمة Git لتجهيز التغييرات وتثبيتها وتفريعها ودفعها."
  hi: "बदलावों को स्टेज, कमिट, ब्रांच और पुश करने के लिए Git मेनू खोलें।"
  bn: "পরিবর্তন স্টেজ, কমিট, ব্রাঞ্চ ও পুশ করতে Git মেনু খুলুন।"
  zh: "打开 Git 菜单，暂存、提交、分支和推送更改。"
  ja: "変更のステージ、コミット、ブランチ、プッシュを行う Git メニューを開きます。"
menu.org.help:
  en: "Open the Org menu for Org-mode notes, outlines, and Org-roam."
  es: "Abre el menú Org para notas, esquemas y Org-roam de Org-mode."
  fr: "Ouvre le menu Org pour les notes, plans et Org-roam d'Org-mode."
  de: "Öffnet das Org-Menü für Org-mode-Notizen, Gliederungen und Org-roam."
  cy: "Agor y ddewislen Org ar gyfer nodiadau, amlinelliadau ac Org-roam Org-mode."
  ga: "Oscail an roghchlár Org le haghaidh nótaí, imlínte agus Org-roam Org-mode."
  gd: "Fosgail an clàr Org airson notaichean Org-mode, sgeamaichean is Org-roam."
  pl: "Otwiera menu Org z notatkami, konspektami i Org-roam trybu Org-mode."
  pt: "Abre o menu Org para notas, tópicos e Org-roam do Org-mode."
  ru: "Открывает меню Org для заметок, структур и Org-roam в Org-mode."
  ar: "يفتح قائمة Org لملاحظات Org-mode والمخططات وOrg-roam."
  hi: "Org-mode नोट्स, आउटलाइन और Org-roam के लिए Org मेनू खोलें।"
  bn: "Org-mode নোট, আউটলাইন ও Org-roam-এর জন্য Org মেনু খুলুন।"
  zh: "打开 Org 菜单，使用 Org-mode 笔记、大纲和 Org-roam。"
  ja: "Org-mode のノート、アウトライン、Org-roam のための Org メニューを開きます。"
menu.tools.help:
  en: "Open the Tools menu for editors, converters, and utilities."
  es: "Abre el menú Herramientas para editores, conversores y utilidades."
  fr: "Ouvre le menu Outils pour les éditeurs, convertisseurs et utilitaires."
  de: "Öffnet das Menü Werkzeuge für Editoren, Konverter und Dienstprogramme."
  cy: "Agor y ddewislen Offer ar gyfer golygyddion, trawsnewidyddion a chyfleustodau."
  ga: "Oscail an roghchlár Uirlisí le haghaidh eagarthóirí, tiontairí agus áiseanna."
  gd: "Fosgail an clàr Innealan airson deasaichean, tionndadairean is goireasan."
  pl: "Otwiera menu Narzędzia z edytorami, konwerterami i narzędziami pomocniczymi."
  pt: "Abre o menu Ferramentas para editores, conversores e utilitários."
  ru: "Открывает меню «Инструменты» с редакторами, конвертерами и утилитами."
  ar: "يفتح قائمة الأدوات للمحررات والمحولات والأدوات المساعدة."
  hi: "संपादकों, कन्वर्टरों और उपयोगिताओं के लिए टूल्स मेनू खोलें।"
  bn: "এডিটর, কনভার্টার ও ইউটিলিটির জন্য Tools মেনু খুলুন।"
  zh: "打开工具菜单，使用编辑器、转换器和实用程序。"
  ja: "エディター、コンバーター、ユーティリティのためのツールメニューを開きます。"
menu.help.help:
  en: "Open the Help menu for documentation, shortcuts, and about."
  es: "Abre el menú Ayuda para documentación, atajos e información."
  fr: "Ouvre le menu Aide pour la documentation, les raccourcis et à propos."
  de: "Öffnet das Menü Hilfe für Dokumentation, Tastenkürzel und Info."
  cy: "Agor y ddewislen Cymorth ar gyfer dogfennaeth, llwybrau byr a gwybodaeth."
  ga: "Oscail an roghchlár Cabhair le haghaidh doiciméadú, aicearraí agus eolas."
  gd: "Fosgail an clàr Cuideachadh airson docamaideadh, ath-ghoiridean is fiosrachadh."
  pl: "Otwiera menu Pomoc z dokumentacją, skrótami i informacjami."
  pt: "Abre o menu Ajuda para documentação, atalhos e sobre."
  ru: "Открывает меню «Справка»: документация, горячие клавиши и «О программе»."
  ar: "يفتح قائمة المساعدة للوثائق والاختصارات والمعلومات."
  hi: "दस्तावेज़, शॉर्टकट और परिचय के लिए सहायता मेनू खोलें।"
  bn: "ডকুমেন্টেশন, শর্টকাট ও পরিচিতির জন্য Help মেনু খুলুন।"
  zh: "打开帮助菜单，查看文档、快捷键和关于。"
  ja: "ドキュメント、ショートカット、バージョン情報のためのヘルプメニューを開きます。"
