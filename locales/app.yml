menu.item.jj.git_fetch.help:
  en: "Fetch changes from the Git remote into Jujutsu."
  es: "Trae cambios del remoto de Git a Jujutsu."
  fr: "Récupère les modifications du dépôt distant Git dans Jujutsu."
  de: "Ruft Änderungen vom Git-Remote in Jujutsu ab."
