  es: "Transacción revertida"
  fr: "Transaction annulée"
  de: "Transaktion zurückgerollt"
  cy: "Trafodyn wedi'i ddychwelyd"
  ga: "Idirbheart rollta ar ais"
  gd: "Gnothach air a roiligeadh air ais"
  pl: "Transakcja wycofana"
  pt: "Transação revertida"
  ru: "Транзакция откачена"
  ar: "تم التراجع عن المعاملة"
  hi: "लेन-देन रोलबैक हुआ"
  bn: "ট্রানজেকশন রোলব্যাক হয়েছে"
  zh: "事务已回滚"
  ja: "トランザクションをロールバックしました"
msg.db_tx_none:
  en: "No open transaction"
  es: "No hay transacción abierta"
  fr: "Aucune transaction ouverte"
  de: "Keine offene Transaktion"
  cy: "Dim trafodyn ar agor"
  ga: "Níl aon idirbheart oscailte"
  gd: "Chan eil gnothach fosgailte ann"
  pl: "Brak otwartej transakcji"
  pt: "Nenhuma transação aberta"
  ru: "Нет открытой транзакции"
  ar: "لا توجد معاملة مفتوحة"
  hi: "कोई खुला लेन-देन नहीं"
  bn: "কোনো খোলা ট্রানজেকশন নেই"
  zh: "没有打开的事务"
  ja: "開いているトランザクションはありません"
msg.db_running:
  en: "Running… (Ctrl+C to cancel)"
  es: "Ejecutando… (Ctrl+C para cancelar)"
  fr: "Exécution… (Ctrl+C pour annuler)"
  de: "Läuft… (Strg+C zum Abbrechen)"
  cy: "Yn rhedeg… (Ctrl+C i ganslo)"
  ga: "Ag rith… (Ctrl+C le cealú)"
  gd: "A' ruith… (Ctrl+C airson sgur)"
  pl: "Wykonywanie… (Ctrl+C, aby anulować)"
  pt: "Executando… (Ctrl+C para cancelar)"
  ru: "Выполнение… (Ctrl+C для отмены)"
  ar: "قيد التشغيل… (Ctrl+C للإلغاء)"
  hi: "चल रहा है… (रद्द करने के लिए Ctrl+C)"
  bn: "চলছে… (বাতিল করতে Ctrl+C)"
  zh: "正在执行…（Ctrl+C 取消）"
  ja: "実行中…（Ctrl+C でキャンセル）"
msg.db_cancelled:
  en: "Query cancelled"
  es: "Consulta cancelada"
  fr: "Requête annulée"
  de: "Abfrage abgebrochen"
  cy: "Ymholiad wedi'i ganslo"
  ga: "Ceist cealaithe"
  gd: "Ceist air a sgur"
  pl: "Zapytanie anulowane"
  pt: "Consulta cancelada"
  ru: "Запрос отменён"
  ar: "تم إلغاء الاستعلام"
  hi: "क्वेरी रद्द की गई"
  bn: "কোয়েরি বাতিল হয়েছে"
  zh: "查询已取消"
  ja: "クエリをキャンセルしました"
msg.db_tunnel_no_port:
  en: "No free local port for the SSH tunnel"
  es: "No hay puerto local libre para el túnel SSH"
  fr: "Aucun port local libre pour le tunnel SSH"
  de: "Kein freier lokaler Port für den SSH-Tunnel"
  cy: "Dim porth lleol rhydd ar gyfer y twnnel SSH"
  ga: "Níl aon phort logánta saor don tollán SSH"
  gd: "Chan eil port ionadail saor ann airson an tunail SSH"
  pl: "Brak wolnego lokalnego portu dla tunelu SSH"
  pt: "Nenhuma porta local livre para o túnel SSH"
  ru: "Нет свободного локального порта для SSH-туннеля"
  ar: "لا يوجد منفذ محلي متاح لنفق SSH"
  hi: "SSH टनल के लिए कोई मुक्त स्थानीय पोर्ट नहीं"
  bn: "SSH টানেলের জন্য কোনো মুক্ত লোকাল পোর্ট নেই"
  zh: "没有可用于 SSH 隧道的本地端口"
  ja: "SSH トンネル用の空きローカルポートがありません"
msg.db_tunnel_spawn:
  en: "Could not start ssh: %{error}"
  es: "No se pudo iniciar ssh: %{error}"
  fr: "Impossible de démarrer ssh : %{error}"
  de: "ssh konnte nicht gestartet werden: %{error}"
  cy: "Methwyd cychwyn ssh: %{error}"
  ga: "Níorbh fhéidir ssh a thosú: %{error}"
  gd: "Cha b' urrainn ssh a thòiseachadh: %{error}"
  pl: "Nie można uruchomić ssh: %{error}"
  pt: "Não foi possível iniciar o ssh: %{error}"
  ru: "Не удалось запустить ssh: %{error}"
  ar: "تعذّر بدء ssh: %{error}"
  hi: "ssh शुरू नहीं हो सका: %{error}"
  bn: "ssh শুরু করা যায়নি: %{error}"
  zh: "无法启动 ssh：%{error}"
  ja: "ssh を起動できませんでした: %{error}"
msg.db_tunnel_timeout:
  en: "SSH tunnel did not come up in time"
  es: "El túnel SSH no se estableció a tiempo"
  fr: "Le tunnel SSH ne s'est pas établi à temps"
  de: "SSH-Tunnel kam nicht rechtzeitig zustande"
  cy: "Ni ddaeth y twnnel SSH i fyny mewn pryd"
  ga: "Níor tháinig an tollán SSH aníos in am"
  gd: "Cha tàinig an tunail SSH suas ann an àm"
  pl: "Tunel SSH nie uruchomił się na czas"
  pt: "O túnel SSH não subiu a tempo"
  ru: "SSH-туннель не поднялся вовремя"
  ar: "لم يُنشأ نفق SSH في الوقت المناسب"
  hi: "SSH टनल समय पर नहीं आया"
  bn: "SSH টানেল সময়মতো চালু হয়নি"
  zh: "SSH 隧道未能及时建立"
  ja: "SSH トンネルが時間内に確立されませんでした"
msg.db_edit_readonly:
  en: "This result is not editable (needs a single table with a primary key)"
  es: "Este resultado no es editable (requiere una sola tabla con clave primaria)"
  fr: "Ce résultat n'est pas modifiable (nécessite une seule table avec clé primaire)"
  de: "Dieses Ergebnis ist nicht bearbeitbar (benötigt eine einzelne Tabelle mit Primärschlüssel)"
  cy: "Nid oes modd golygu'r canlyniad hwn (angen un tabl ag allwedd gynradd)"
  ga: "Níl an toradh seo ineagarthóireachta (tábla aonair le príomheochair de dhíth)"
  gd: "Chan urrainnear an toradh seo a dheasachadh (feum air aon chlàr le prìomh-iuchair)"
  pl: "Tego wyniku nie można edytować (wymaga jednej tabeli z kluczem głównym)"
  pt: "Este resultado não é editável (requer uma única tabela com chave primária)"
  ru: "Этот результат нельзя редактировать (нужна одна таблица с первичным ключом)"
  ar: "هذه النتيجة غير قابلة للتحرير (تتطلب جدولاً واحداً بمفتاح أساسي)"
  hi: "यह परिणाम संपादन योग्य नहीं है (प्राथमिक कुंजी वाली एकल तालिका चाहिए)"
  bn: "এই ফলাফল সম্পাদনাযোগ্য নয় (প্রাইমারি কী সহ একটি একক টেবিল প্রয়োজন)"
  zh: "此结果不可编辑（需要具有主键的单个表）"
  ja: "この結果は編集できません（主キーを持つ単一テーブルが必要）"
msg.db_edit_none:
  en: "No staged edits to commit"
  es: "No hay ediciones preparadas para confirmar"
  fr: "Aucune modification préparée à valider"
  de: "Keine vorgemerkten Änderungen zum Bestätigen"
  cy: "Dim golygiadau wedi'u paratoi i'w ymrwymo"
  ga: "Níl aon eagarthóireacht stáitse le tiomnú"
  gd: "Chan eil deasachaidhean air ullachadh ri chur gu bàs"
  pl: "Brak przygotowanych zmian do zatwierdzenia"
  pt: "Nenhuma edição preparada para confirmar"
  ru: "Нет подготовленных изменений для применения"
  ar: "لا توجد تعديلات مُجهّزة للتثبيت"
  hi: "प्रतिबद्ध करने के लिए कोई तैयार संपादन नहीं"
  bn: "কমিট করার মতো কোনো স্টেজড সম্পাদনা নেই"
  zh: "没有可提交的暂存编辑"
  ja: "コミットするステージ済みの編集がありません"
msg.db_edit_conflict:
  en: "Conflict: %{column} changed since you loaded it — refresh and retry"
  es: "Conflicto: %{column} cambió desde que la cargaste — actualiza y reintenta"
  fr: "Conflit : %{column} a changé depuis le chargement — actualisez et réessayez"
  de: "Konflikt: %{column} hat sich seit dem Laden geändert — aktualisieren und erneut versuchen"
  cy: "Gwrthdaro: newidiodd %{column} ers ei lwytho — adnewyddwch a rhowch gynnig eto"
  ga: "Coinbhleacht: athraíodh %{column} ó lódáil tú é — athnuaigh agus bain triail eile"
  gd: "Còmhstri: dh'atharraich %{column} on a luchdaich thu e — ath-nuadhaich is feuch a-rithist"
  pl: "Konflikt: %{column} zmieniła się od wczytania — odśwież i spróbuj ponownie"
  pt: "Conflito: %{column} mudou desde o carregamento — atualize e tente novamente"
  ru: "Конфликт: %{column} изменился после загрузки — обновите и повторите"
  ar: "تعارض: تغيّر %{column} منذ تحميله — حدّث وأعد المحاولة"
  hi: "विरोध: %{column} लोड करने के बाद बदल गया — ताज़ा करें और पुनः प्रयास करें"
  bn: "দ্বন্দ্ব: লোড করার পর %{column} পরিবর্তিত হয়েছে — রিফ্রেশ করে আবার চেষ্টা করুন"
  zh: "冲突：%{column} 在加载后已更改 — 请刷新后重试"
  ja: "競合: 読み込み後に %{column} が変更されました — 更新して再試行してください"
msg.db_edit_committed:
  en: "Committed %{count} cell edits"
  es: "Se confirmaron %{count} ediciones de celda"
  fr: "%{count} modifications de cellule validées"
  de: "%{count} Zellenänderungen bestätigt"
  cy: "Ymrwymwyd %{count} golygiad cell"
  ga: "Tiomnaíodh %{count} eagarthóireacht cille"
  gd: "Chaidh %{count} deasachadh cealla a chur gu bàs"
  pl: "Zatwierdzono %{count} edycji komórek"
  pt: "%{count} edições de célula confirmadas"
  ru: "Применено изменений ячеек: %{count}"
  ar: "تم تثبيت %{count} تعديل خلية"
  hi: "%{count} सेल संपादन प्रतिबद्ध किए गए"
  bn: "%{count}টি সেল সম্পাদনা কমিট হয়েছে"
  zh: "已提交 %{count} 处单元格编辑"
  ja: "%{count} 件のセル編集をコミットしました"
msg.db_insight_scan:
  en: "Full table scan detected — consider an index"
  es: "Escaneo completo de tabla detectado: considera un índice"
  fr: "Parcours complet de table détecté — envisagez un index"
  de: "Vollständiger Tabellenscan erkannt — Index erwägen"
  cy: "Canfuwyd sgan tabl llawn — ystyriwch fynegai"
  ga: "Scanadh iomlán tábla aimsithe — smaoinigh ar innéacs"
  gd: "Sganadh clàir shlàin air a lorg — beachdaich air clàr-amais"
  pl: "Wykryto pełne skanowanie tabeli — rozważ indeks"
  pt: "Varredura completa de tabela detectada — considere um índice"
  ru: "Обнаружено полное сканирование таблицы — подумайте об индексе"
  ar: "اكتُشف فحص كامل للجدول — فكّر في فهرس"
  hi: "पूर्ण तालिका स्कैन मिला — इंडेक्स पर विचार करें"
  bn: "সম্পূর্ণ টেবিল স্ক্যান শনাক্ত — একটি ইনডেক্স বিবেচনা করুন"
  zh: "检测到全表扫描 — 建议考虑索引"
  ja: "フルテーブルスキャンを検出 — インデックスの検討を"
