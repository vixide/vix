  ga: "Clónáil stór cianda Jujutsu isteach i gcomhadlann áitiúil nua."
  gd: "Dèan lethbhreac de stòr Jujutsu cèin gu eòlaire ionadail ùr."
  pl: "Klonuje zdalne repozytorium Jujutsu do nowego lokalnego katalogu."
