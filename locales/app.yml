menu.item.edit.paste.help:
  en: "Paste the clipboard contents at the cursor."
  es: "Pega el contenido del portapapeles en el cursor."
  fr: "Coller le contenu du presse-papiers au curseur."
  de: "Fügt den Inhalt der Zwischenablage an der Cursorposition ein."
