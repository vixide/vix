msg.welcome:
  en: "Welcome to Vix. Press Ctrl P for the command palette, F1 for help."
  es: "Bienvenido a Vix. Pulsa Ctrl P para la paleta de comandos, F1 para ayuda."
  fr: "Bienvenue dans Vix. Appuyez sur Ctrl P pour la palette de commandes, F1 pour l'aide."
  de: "Willkommen bei Vix. Drücke Ctrl P für die Befehlspalette, F1 für Hilfe."
  cy: "Croeso i Vix. Pwyswch Ctrl P am y palet gorchmynion, F1 am gymorth."
  ga: "Fáilte go Vix. Brúigh Ctrl P don phailéad orduithe, F1 le haghaidh cabhrach."
  gd: "Fàilte gu Vix. Brùth Ctrl P airson pailead nan àithne, F1 airson cuideachaidh."
  pl: "Witaj w Vix. Naciśnij Ctrl P, aby otworzyć paletę poleceń, F1, aby uzyskać pomoc."
  pt: "Bem-vindo ao Vix. Pressione Ctrl P para a paleta de comandos, F1 para ajuda."
  ru: "Добро пожаловать в Vix. Нажмите Ctrl P для палитры команд, F1 для справки."
  ar: "مرحبًا بك في Vix. اضغط Ctrl P للوحة الأوامر، F1 للمساعدة."
  hi: "Vix में आपका स्वागत है। कमांड पैलेट के लिए Ctrl P, सहायता के लिए F1 दबाएँ।"
  bn: "Vix-এ স্বাগতম। কমান্ড প্যালেটের জন্য Ctrl P, সাহায্যের জন্য F1 চাপুন।"
  zh: "欢迎使用 Vix。按 Ctrl P 打开命令面板，F1 获取帮助。"
  ja: "Vix へようこそ。Ctrl P でコマンドパレット、F1 でヘルプを表示します。"
msg.welcome_hint:
  en: "Ctrl B toggles the file explorer, Ctrl E switches focus."
  es: "Ctrl B alterna el explorador de archivos, Ctrl E cambia el foco."
  fr: "Ctrl B affiche l'explorateur de fichiers, Ctrl E change le focus."
  de: "Ctrl B schaltet den Datei-Explorer um, Ctrl E wechselt den Fokus."
  cy: "Mae Ctrl B yn toglo'r archwiliwr ffeiliau, Ctrl E yn newid ffocws."
  ga: "Athraíonn Ctrl B an taiscéalaí comhad, athraíonn Ctrl E an fócas."
  gd: "Bidh Ctrl B a' toglachadh a' bhrabhsair fhaidhlichean, Ctrl E ag atharrachadh an fhòcais."
  pl: "Ctrl B przełącza eksplorator plików, Ctrl E zmienia fokus."
  pt: "Ctrl B alterna o explorador de arquivos, Ctrl E muda o foco."
  ru: "Ctrl B переключает проводник, Ctrl E меняет фокус."
  ar: "Ctrl B يبدّل مستكشف الملفات، Ctrl E يغيّر التركيز."
  hi: "Ctrl B फ़ाइल एक्सप्लोरर टॉगल करता है, Ctrl E फ़ोकस बदलता है।"
  bn: "Ctrl B ফাইল এক্সপ্লোরার টগল করে, Ctrl E ফোকাস পরিবর্তন করে।"
  zh: "Ctrl B 切换文件资源管理器，Ctrl E 切换焦点。"
  ja: "Ctrl B でファイルエクスプローラーを切り替え、Ctrl E でフォーカスを切り替えます。"
msg.website:
  en: "Website: https://github.com/sixarm/vix"
  es: "Sitio web: https://github.com/sixarm/vix"
  fr: "Site web : https://github.com/sixarm/vix"
  de: "Webseite: https://github.com/sixarm/vix"
  cy: "Gwefan: https://github.com/sixarm/vix"
msg.email:
  en: "Email: hello@sixarm.com"
  es: "Correo: hello@sixarm.com"
  fr: "E-mail : hello@sixarm.com"
  de: "E-Mail: hello@sixarm.com"
  cy: "E-bost: hello@sixarm.com"
msg.about:
  en: "Vix — Simple Terminal Rust IDE. Open, edit, and save text files."
  es: "Vix — IDE de Rust para terminal. Abre, edita y guarda archivos de texto."
  fr: "Vix — IDE Rust pour terminal. Ouvrez, modifiez et enregistrez des fichiers texte."
  de: "Vix — Einfache Terminal-Rust-IDE. Textdateien öffnen, bearbeiten und speichern."
  cy: "Vix — IDE Rust syml ar gyfer y derfynell. Agor, golygu a chadw ffeiliau testun."

