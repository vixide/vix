  ar: "يُدرج UUID عشوائيًا من الإصدار 4."
  hi: "एक यादृच्छिक संस्करण 4 UUID डालें।"
  bn: "একটি এলোমেলো সংস্করণ 4 UUID সন্নিবেশ করুন।"
