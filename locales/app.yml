  pl: "Wybiera język interfejsu."
  pt: "Escolhe o idioma da interface."
  ru: "Выбирает язык интерфейса."
  ar: "يختار لغة الواجهة."
  hi: "इंटरफ़ेस की भाषा चुनें।"
  bn: "ইন্টারফেসের ভাষা নির্বাচন করুন।"
