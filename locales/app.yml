  cy: "Toglo lapio llinellau hir i ffitio lled y ffenestr."
  ga: "Scoránaigh timfhilleadh línte fada chun oiriúnú do leithead na fuinneoige."
  gd: "Toglaich pasgadh loidhnichean fada gu leud na h-uinneige."
