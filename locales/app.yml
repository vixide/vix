  ga: "Oscail orduithe aimsithe agus cuardaigh."
  gd: "Fosgail àitheantan lorg is sireadh."
  pl: "Otwiera polecenia znajdowania i wyszukiwania."
  pt: "Abre comandos de localizar e pesquisar."
  ru: "Открыть команды поиска."
  ar: "فتح أوامر البحث والعثور."
  hi: "खोज और सर्च कमांड खोलें।"
