  de: "Alle faltbaren Code-Bereiche einklappen."
  cy: "Cwympo pob rhanbarth cod plygadwy."
  ga: "Laghdaigh gach réigiún cóid infhillte."
  gd: "Lùb a h-uile roinn còd a ghabhas pasgadh."
  pl: "Zwiń wszystkie zwijalne obszary kodu."
  pt: "Recolhe todas as regiões de código dobráveis."
  ru: "Свернуть все сворачиваемые блоки кода."
  ar: "طيّ جميع مناطق الكود القابلة للطي."
  hi: "सभी फ़ोल्ड करने योग्य कोड क्षेत्रों को संकुचित करें।"
  bn: "সমস্ত ভাঁজযোগ্য কোড অঞ্চল সংকুচিত করুন।"
  zh: "折叠所有可折叠的代码区域。"
  ja: "折りたたみ可能なすべてのコード領域を折りたたみます。"
menu.item.view.unfold_all.help:
  en: "Expand all folded code regions."
  es: "Expande todas las regiones de código plegadas."
  fr: "Déplie toutes les régions de code repliées."
  de: "Alle eingeklappten Code-Bereiche ausklappen."
  cy: "Ehangu pob rhanbarth cod wedi'i blygu."
  ga: "Leathnaigh gach réigiún cóid fillte."
  gd: "Leudaich a h-uile roinn còd a chaidh a phasgadh."
  pl: "Rozwiń wszystkie zwinięte obszary kodu."
  pt: "Expande todas as regiões de código dobradas."
  ru: "Развернуть все свёрнутые блоки кода."
  ar: "فرد جميع مناطق الكود المطوية."
  hi: "सभी मुड़े हुए कोड क्षेत्रों को विस्तृत करें।"
  bn: "সমস্ত ভাঁজ করা কোড অঞ্চল প্রসারিত করুন।"
  zh: "展开所有已折叠的代码区域。"
  ja: "折りたたまれたすべてのコード領域を展開します。"
menu.item.view.inlay_hints.help:
  en: "Toggle inline type and parameter hints from the LSP."
  es: "Alterna las sugerencias de tipo y parámetro en línea del LSP."
  fr: "Active ou désactive les indices de type et de paramètre en ligne du LSP."
  de: "Inline-Typ- und Parameterhinweise vom LSP ein-/ausschalten."
  cy: "Toglo awgrymiadau math a pharamedr mewnlin o'r LSP."
  ga: "Scoránaigh leideanna cineáil is paraiméadair inlíne ón LSP."
  gd: "Toglaich sanasan seòrsa is paramadair a-staigh bhon LSP."
  pl: "Przełącz wbudowane podpowiedzi typów i parametrów z LSP."
  pt: "Alterna as dicas embutidas de tipo e parâmetro do LSP."
  ru: "Переключить встроенные подсказки типов и параметров от LSP."
  ar: "تبديل تلميحات النوع والمعامل المضمّنة من LSP."
  hi: "LSP से इनलाइन प्रकार और पैरामीटर संकेत टॉगल करें।"
  bn: "LSP থেকে ইনলাইন টাইপ ও প্যারামিটার ইঙ্গিত টগল করুন।"
  zh: "切换来自 LSP 的内嵌类型和参数提示。"
  ja: "LSP のインライン型・パラメータヒントを切り替えます。"
menu.item.view.sticky_scroll.help:
  en: "Toggle pinning enclosing scopes to the top while scrolling."
  es: "Alterna la fijación de los ámbitos contenedores arriba al desplazar."
  fr: "Active ou désactive l'épinglage des portées englobantes en haut lors du défilement."
  de: "Anheften umschließender Bereiche oben beim Scrollen ein-/ausschalten."
  cy: "Toglo pinio cwmpasau amgáu ar y brig wrth sgrolio."
  ga: "Scoránaigh na scóip iniata a phionnáil ag an mbarr le linn scrollála."
  gd: "Toglaich prìneadh nan sgòp iadhaidh aig a' bhàrr rè sgrolladh."
  pl: "Przełącz przypinanie otaczających zakresów u góry podczas przewijania."
  pt: "Alterna a fixação dos escopos envolventes no topo ao rolar."
  ru: "Переключить закрепление охватывающих областей вверху при прокрутке."
  ar: "تبديل تثبيت النطاقات المحيطة في الأعلى أثناء التمرير."
  hi: "स्क्रॉल करते समय संलग्न स्कोप को शीर्ष पर पिन करना टॉगल करें।"
  bn: "স্ক্রল করার সময় আবদ্ধ স্কোপ উপরে পিন করা টগল করুন।"
  zh: "切换滚动时将外层作用域固定在顶部。"
  ja: "スクロール中に外側のスコープを上部に固定する表示を切り替えます。"
menu.item.view.minimap.help:
  en: "Toggle the code overview minimap."
  es: "Alterna el minimapa de vista general del código."
  fr: "Active ou désactive la minicarte d'aperçu du code."
  de: "Code-Übersichts-Minimap ein-/ausschalten."
  cy: "Toglo'r minimap trosolwg cod."
  ga: "Scoránaigh an mhionléarscáil forbhreathnaithe cóid."
  gd: "Toglaich am mion-mhapa foir-shealladh còd."
  pl: "Przełącz minimapę podglądu kodu."
  pt: "Alterna o minimapa de visão geral do código."
  ru: "Переключить миникарту обзора кода."
  ar: "تبديل الخريطة المصغّرة لنظرة عامة على الكود."
  hi: "कोड अवलोकन मिनीमैप टॉगल करें।"
  bn: "কোড ওভারভিউ মিনিম্যাপ টগল করুন।"
  zh: "切换代码概览缩略图。"
  ja: "コード概観のミニマップを切り替えます。"
menu.item.view.highlight_word.help:
  en: "Toggle highlighting other occurrences of the word at the cursor."
  es: "Alterna el resaltado de otras apariciones de la palabra en el cursor."
  fr: "Active ou désactive la surbrillance des autres occurrences du mot au curseur."
  de: "Hervorheben weiterer Vorkommen des Worts am Cursor ein-/ausschalten."
  cy: "Toglo amlygu ymddangosiadau eraill o'r gair wrth y cyrchwr."
  ga: "Scoránaigh aibhsiú na dtarluithe eile den fhocal ag an gcúrsóir."
  gd: "Toglaich soilleireachadh nan tachartasan eile den fhacal aig a' chùrsair."
  pl: "Przełącz podświetlanie innych wystąpień słowa przy kursorze."
  pt: "Alterna o realce de outras ocorrências da palavra no cursor."
  ru: "Переключить подсветку других вхождений слова под курсором."
  ar: "تبديل تمييز التكرارات الأخرى للكلمة عند المؤشر."
  hi: "कर्सर पर शब्द की अन्य घटनाओं को हाइलाइट करना टॉगल करें।"
  bn: "কার্সারে থাকা শব্দের অন্যান্য উপস্থিতি হাইলাইট করা টগল করুন।"
  zh: "切换高亮光标处单词的其他出现位置。"
  ja: "カーソル位置の単語の他の出現箇所の強調表示を切り替えます。"
menu.item.view.spellcheck.help:
  en: "Toggle spell checking of the document text."
  es: "Alterna la corrección ortográfica del texto del documento."
  fr: "Active ou désactive la vérification orthographique du texte."
  de: "Rechtschreibprüfung des Dokumenttexts ein-/ausschalten."
  cy: "Toglo gwirio sillafu testun y ddogfen."
  ga: "Scoránaigh seiceáil litrithe théacs na cáipéise."
  gd: "Toglaich sgrùdadh litreachaidh air teacsa na sgrìobhainn."
  pl: "Przełącz sprawdzanie pisowni tekstu dokumentu."
  pt: "Alterna a verificação ortográfica do texto do documento."
  ru: "Переключить проверку орфографии текста документа."
  ar: "تبديل التدقيق الإملائي لنص المستند."
  hi: "दस्तावेज़ पाठ की वर्तनी जाँच टॉगल करें।"
  bn: "নথির টেক্সটের বানান পরীক্ষা টগল করুন।"
  zh: "切换文档文本的拼写检查。"
  ja: "文書テキストのスペルチェックを切り替えます。"
menu.item.view.auto_pair.help:
  en: "Toggle automatic insertion of matching brackets and quotes."
  es: "Alterna la inserción automática de corchetes y comillas coincidentes."
  fr: "Active ou désactive l'insertion automatique des parenthèses et guillemets correspondants."
  de: "Automatisches Einfügen passender Klammern und Anführungszeichen ein-/ausschalten."
  cy: "Toglo mewnosod cromfachau a dyfynodau cyfatebol yn awtomatig."
  ga: "Scoránaigh ionsá uathoibríoch lúibíní is comharthaí athfhriotail comhoiriúnacha."
  gd: "Toglaich cur a-steach fèin-obrachail de chamagan is comharran-labhairt co-fhreagarrach."
  pl: "Przełącz automatyczne wstawianie pasujących nawiasów i cudzysłowów."
  pt: "Alterna a inserção automática de colchetes e aspas correspondentes."
  ru: "Переключить автоматическую вставку парных скобок и кавычек."
  ar: "تبديل الإدراج التلقائي للأقواس وعلامات الاقتباس المطابقة."
  hi: "मिलान कोष्ठकों और उद्धरणों के स्वचालित सम्मिलन को टॉगल करें।"
  bn: "মিলযুক্ত বন্ধনী ও উদ্ধৃতির স্বয়ংক্রিয় সন্নিবেশ টগল করুন।"
  zh: "切换自动插入匹配的括号和引号。"
  ja: "対応する括弧・引用符の自動挿入を切り替えます。"
menu.item.view.rainbow_brackets.help:
  en: "Toggle coloring matched brackets by nesting depth."
  es: "Alterna el coloreado de corchetes emparejados por nivel de anidamiento."
  fr: "Active ou désactive la coloration des parenthèses appariées selon la profondeur d'imbrication."
  de: "Einfärben zusammengehöriger Klammern nach Verschachtelungstiefe ein-/ausschalten."
  cy: "Toglo lliwio cromfachau cyfatebol yn ôl dyfnder nythu."
  ga: "Scoránaigh dathú lúibíní meaitseáilte de réir doimhneacht neadaithe."
  gd: "Toglaich dathadh chamagan co-fhreagarrach a rèir doimhne neadachaidh."
  pl: "Przełącz kolorowanie pasujących nawiasów według głębokości zagnieżdżenia."
  pt: "Alterna a coloração de colchetes correspondentes por profundidade de aninhamento."
  ru: "Переключить раскраску парных скобок по глубине вложенности."
  ar: "تبديل تلوين الأقواس المتطابقة حسب عمق التداخل."
  hi: "नेस्टिंग गहराई के अनुसार मिलान कोष्ठकों को रंगना टॉगल करें।"
  bn: "নেস্টিং গভীরতা অনুসারে মিলযুক্ত বন্ধনী রঙ করা টগল করুন।"
  zh: "切换按嵌套深度为匹配括号着色。"
  ja: "対応する括弧をネストの深さで色分け表示を切り替えます。"
menu.item.view.trim_on_save.help:
  en: "Toggle trimming trailing whitespace when saving."
  es: "Alterna la eliminación de espacios finales al guardar."
  fr: "Active ou désactive la suppression des espaces de fin lors de l'enregistrement."
  de: "Entfernen nachfolgender Leerzeichen beim Speichern ein-/ausschalten."
  cy: "Toglo tocio bylchau ar ddiwedd llinellau wrth gadw."
  ga: "Scoránaigh baint spásála rianaigh agus tú ag sábháil."
  gd: "Toglaich gearradh àite bàn air deireadh loidhne nuair a shàbhalas tu."
  pl: "Przełącz usuwanie końcowych spacji podczas zapisywania."
  pt: "Alterna a remoção de espaços em branco no fim das linhas ao salvar."
  ru: "Переключить удаление концевых пробелов при сохранении."
  ar: "تبديل إزالة المسافات الزائدة في نهاية الأسطر عند الحفظ."
  hi: "सहेजते समय अंत के रिक्त स्थान हटाना टॉगल करें।"
  bn: "সংরক্ষণের সময় শেষের ফাঁকা স্থান ছেঁটে ফেলা টগল করুন।"
  zh: "切换保存时删除行尾空白。"
  ja: "保存時に行末の空白を削除する動作を切り替えます。"
menu.item.view.final_newline_on_save.help:
  en: "Toggle ensuring a final newline at the end of file when saving."
  es: "Alterna asegurar una nueva línea final al final del archivo al guardar."
  fr: "Active ou désactive l'ajout d'un saut de ligne final en fin de fichier lors de l'enregistrement."
  de: "Sicherstellen eines abschließenden Zeilenumbruchs beim Speichern ein-/ausschalten."
  cy: "Toglo sicrhau llinell newydd derfynol ar ddiwedd ffeil wrth gadw."
  ga: "Scoránaigh líne nua deiridh a chinntiú ag deireadh an chomhaid agus tú ag sábháil."
  gd: "Toglaich dèanamh cinnteach à loidhne ùr dheireannach aig deireadh faidhle nuair a shàbhalas tu."
  pl: "Przełącz zapewnianie końcowego znaku nowej linii przy zapisie."
  pt: "Alterna garantir uma nova linha final no fim do arquivo ao salvar."
  ru: "Переключить добавление завершающего перевода строки при сохранении."
  ar: "تبديل ضمان سطر جديد في نهاية الملف عند الحفظ."
  hi: "सहेजते समय फ़ाइल के अंत में अंतिम नई पंक्ति सुनिश्चित करना टॉगल करें।"
  bn: "সংরক্ষণের সময় ফাইলের শেষে চূড়ান্ত নতুন লাইন নিশ্চিত করা টগল করুন।"
  zh: "切换保存时确保文件末尾有换行符。"
  ja: "保存時にファイル末尾へ最終改行を付与する動作を切り替えます。"
menu.item.view.format_on_save.help:
  en: "Toggle automatic formatting of the document when saving."
  es: "Alterna el formateo automático del documento al guardar."
  fr: "Active ou désactive le formatage automatique du document lors de l'enregistrement."
  de: "Automatisches Formatieren des Dokuments beim Speichern ein-/ausschalten."
  cy: "Toglo fformatio'r ddogfen yn awtomatig wrth gadw."
  ga: "Scoránaigh formáidiú uathoibríoch na cáipéise agus tú ag sábháil."
  gd: "Toglaich fòrmatadh fèin-obrachail na sgrìobhainn nuair a shàbhalas tu."
  pl: "Przełącz automatyczne formatowanie dokumentu podczas zapisywania."
  pt: "Alterna a formatação automática do documento ao salvar."
  ru: "Переключить автоматическое форматирование документа при сохранении."
  ar: "تبديل التنسيق التلقائي للمستند عند الحفظ."
  hi: "सहेजते समय दस्तावेज़ के स्वचालित स्वरूपण को टॉगल करें।"
  bn: "সংরক্ষণের সময় নথির স্বয়ংক্রিয় ফরম্যাটিং টগল করুন।"
  zh: "切换保存时自动格式化文档。"
  ja: "保存時に文書を自動整形する動作を切り替えます。"
menu.item.view.auto_save.help:
  en: "Toggle automatically saving changes as you edit."
  es: "Alterna el guardado automático de los cambios mientras editas."
  fr: "Active ou désactive l'enregistrement automatique des modifications pendant l'édition."
  de: "Automatisches Speichern von Änderungen während der Bearbeitung ein-/ausschalten."
  cy: "Toglo cadw newidiadau'n awtomatig wrth i chi olygu."
  ga: "Scoránaigh sábháil uathoibríoch athruithe agus tú ag eagarthóireacht."
  gd: "Toglaich sàbhaladh fèin-obrachail atharraichean fhad 's a dheasaicheas tu."
  pl: "Przełącz automatyczne zapisywanie zmian podczas edycji."
  pt: "Alterna o salvamento automático das alterações enquanto edita."
  ru: "Переключить автоматическое сохранение изменений при редактировании."
  ar: "تبديل الحفظ التلقائي للتغييرات أثناء التحرير."
  hi: "संपादन करते समय परिवर्तनों को स्वचालित रूप से सहेजना टॉगल करें।"
  bn: "সম্পাদনার সময় পরিবর্তন স্বয়ংক্রিয়ভাবে সংরক্ষণ করা টগল করুন।"
  zh: "切换编辑时自动保存更改。"
  ja: "編集中に変更を自動保存する動作を切り替えます。"
menu.item.view.next_tab.help:
  en: "Switch to the next open tab."
  es: "Cambia a la siguiente pestaña abierta."
  fr: "Passe à l'onglet ouvert suivant."
  de: "Zum nächsten geöffneten Tab wechseln."
  cy: "Newid i'r tab agored nesaf."
  ga: "Aistrigh go dtí an chéad chluaisín oscailte eile."
  gd: "Gluais chun an ath thaba fhosgailte."
  pl: "Przełącz na następną otwartą kartę."
  pt: "Muda para a próxima aba aberta."
  ru: "Перейти к следующей открытой вкладке."
  ar: "الانتقال إلى علامة التبويب المفتوحة التالية."
  hi: "अगले खुले टैब पर स्विच करें।"
  bn: "পরবর্তী খোলা ট্যাবে যান।"
  zh: "切换到下一个打开的标签页。"
  ja: "次の開いているタブに切り替えます。"
menu.item.view.prev_tab.help:
  en: "Switch to the previous open tab."
  es: "Cambia a la pestaña abierta anterior."
  fr: "Passe à l'onglet ouvert précédent."
  de: "Zum vorherigen geöffneten Tab wechseln."
  cy: "Newid i'r tab agored blaenorol."
  ga: "Aistrigh go dtí an cluaisín oscailte roimhe."
  gd: "Gluais chun an taba fhosgailte roimhe."
  pl: "Przełącz na poprzednią otwartą kartę."
  pt: "Muda para a aba aberta anterior."
  ru: "Перейти к предыдущей открытой вкладке."
  ar: "الانتقال إلى علامة التبويب المفتوحة السابقة."
  hi: "पिछले खुले टैब पर स्विच करें।"
  bn: "পূর্ববর্তী খোলা ট্যাবে যান।"
  zh: "切换到上一个打开的标签页。"
  ja: "前の開いているタブに切り替えます。"
menu.name.apple.help:
  en: "Switch to the Apple keyboard shortcut scheme."
  es: "Cambia al esquema de atajos de teclado de Apple."
  fr: "Passe au schéma de raccourcis clavier Apple."
  de: "Zum Apple-Tastenkürzelschema wechseln."
  cy: "Newid i gynllun llwybrau byr bysellfwrdd Apple."
  ga: "Aistrigh go scéim aicearraí méarchláir Apple."
  gd: "Gluais gu sgeama ath-ghoiridean meur-chlàir Apple."
  pl: "Przełącz na układ skrótów klawiszowych Apple."
  pt: "Muda para o esquema de atalhos de teclado da Apple."
  ru: "Переключиться на схему сочетаний клавиш Apple."
  ar: "التبديل إلى نظام اختصارات لوحة مفاتيح Apple."
  hi: "Apple कीबोर्ड शॉर्टकट योजना पर स्विच करें।"
  bn: "Apple কীবোর্ড শর্টকাট স্কিমে স্যুইচ করুন।"
  zh: "切换到 Apple 键盘快捷键方案。"
  ja: "Apple のキーボードショートカット方式に切り替えます。"
menu.name.vscode_macos.help:
  en: "Switch to the VSCode macOS keyboard shortcut scheme."
