msg.about:
  en: "Vix — Simple Terminal Rust IDE. Open, edit, and save text files."
  es: "Vix — IDE de Rust para terminal. Abre, edita y guarda archivos de texto."
  fr: "Vix — IDE Rust pour terminal. Ouvrez, modifiez et enregistrez des fichiers texte."
  de: "Vix — Einfache Terminal-Rust-IDE. Textdateien öffnen, bearbeiten und speichern."
  cy: "Vix — IDE Rust syml ar gyfer y derfynell. Agor, golygu a chadw ffeiliau testun."
  ar: "Vix — بيئة تطوير Rust بسيطة للطرفية. افتح ملفات النصوص وحرّرها واحفظها."
  bn: "Vix — সরল টার্মিনাল Rust IDE। টেক্সট ফাইল খুলুন, সম্পাদনা করুন ও সংরক্ষণ করুন।"
  ga: "Vix — IDE Rust simplí don teirminéal. Oscail, cuir in eagar agus sábháil comhaid téacs."
  gd: "Vix — IDE Rust sìmplidh airson an tèirmineil. Fosgail, deasaich is sàbhail faidhlichean teacsa."
  hi: "Vix — सरल टर्मिनल Rust IDE। टेक्स्ट फ़ाइलें खोलें, संपादित करें और सहेजें।"
  ja: "Vix — シンプルなターミナル Rust IDE。テキストファイルを開き、編集し、保存します。"
  pl: "Vix — proste terminalowe IDE Rust. Otwieraj, edytuj i zapisuj pliki tekstowe."
  pt: "Vix — IDE Rust simples para terminal. Abra, edite e salve arquivos de texto."
  ru: "Vix — простая терминальная Rust IDE. Открывайте, редактируйте и сохраняйте текстовые файлы."
  zh: "Vix — 简单的终端 Rust IDE。打开、编辑并保存文本文件。"

