  ja: "クリップボードの内容をカーソル位置に貼り付けます。"
menu.item.edit.paste_from_history.help:
  en: "Choose a past clipboard entry to paste."
  es: "Elige una entrada anterior del portapapeles para pegar."
  fr: "Choisir une entrée passée du presse-papiers à coller."
  de: "Wählt einen früheren Zwischenablage-Eintrag zum Einfügen aus."
  cy: "Dewis cofnod clipfwrdd blaenorol i'w ludo."
  ga: "Roghnaigh iontráil ghearrthaisce roimhe seo le greamú."
  gd: "Tagh clàr-bòrd-chliopaichean roimhe airson a chur a-steach."
  pl: "Wybierz wcześniejszy wpis schowka do wklejenia."
  pt: "Escolhe uma entrada anterior da área de transferência para colar."
  ru: "Выбрать из истории буфера обмена запись для вставки."
  ar: "اختيار عنصر سابق من الحافظة للصقه."
  hi: "पेस्ट करने के लिए पिछली क्लिपबोर्ड प्रविष्टि चुनें।"
  bn: "পেস্ট করতে পূর্ববর্তী ক্লিপবোর্ড এন্ট্রি বেছে নিন।"
  zh: "选择一个历史剪贴板条目进行粘贴。"
  ja: "貼り付ける過去のクリップボード項目を選びます。"
menu.item.edit.select_menu.help:
  en: "Open commands for selecting text."
  es: "Abre comandos para seleccionar texto."
  fr: "Ouvrir les commandes de sélection de texte."
  de: "Öffnet Befehle zum Auswählen von Text."
  cy: "Agor gorchmynion ar gyfer dewis testun."
  ga: "Oscail orduithe chun téacs a roghnú."
  gd: "Fosgail àitheantan airson teacsa a thaghadh."
  pl: "Otwiera polecenia zaznaczania tekstu."
  pt: "Abre comandos para selecionar texto."
  ru: "Открыть команды выделения текста."
  ar: "فتح أوامر تحديد النص."
  hi: "टेक्स्ट चयन के लिए कमांड खोलें।"
