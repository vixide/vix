  de: "Verfasst eine neue E-Mail an das Vix-Team."
  cy: "Cyfansoddi e-bost newydd at dîm Vix."
  ga: "Cum ríomhphost nua chuig foireann Vix."
  gd: "Sgrìobh post-d ùr gu sgioba Vix."
  pl: "Tworzy nową wiadomość e-mail do zespołu Vix."
  pt: "Compõe um novo e-mail para a equipe do Vix."
  ru: "Создаёт новое письмо команде Vix."
  ar: "ينشئ رسالة بريد إلكتروني جديدة إلى فريق Vix."
