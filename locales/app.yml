  gd: "Fosgail làrach-lìn Vix sa bhrabhsair agad."
  pl: "Otwiera witrynę Vix w przeglądarce."
  pt: "Abre o site do Vix no seu navegador."
  ru: "Открывает сайт Vix в браузере."
  ar: "يفتح موقع Vix في متصفحك."
  hi: "अपने ब्राउज़र में Vix की वेबसाइट खोलें।"
