  ja: "選択範囲を装飾的なコメントバナーで囲みます。"
menu.item.edit.emmet_expand.help:
  en: "Expand the Emmet abbreviation at the cursor."
  es: "Expande la abreviatura Emmet en el cursor."
  fr: "Développe l'abréviation Emmet au niveau du curseur."
  de: "Erweitert die Emmet-Abkürzung an der Cursorposition."
  cy: "Ehangu'r byrfodd Emmet wrth y cyrchwr."
  ga: "Leathnaigh an giorrúchán Emmet ag an gcúrsóir."
  gd: "Leudaich an giorrachadh Emmet aig a' chùrsair."
  pl: "Rozwija skrót Emmet w miejscu kursora."
  pt: "Expande a abreviatura Emmet no cursor."
  ru: "Разворачивает сокращение Emmet в позиции курсора."
  ar: "يوسّع اختصار Emmet عند المؤشر."
  hi: "कर्सर पर Emmet संक्षिप्त रूप का विस्तार करें।"
  bn: "কার্সারে থাকা Emmet সংক্ষেপটি বিস্তৃত করুন।"
  zh: "展开光标处的 Emmet 缩写。"
  ja: "カーソル位置の Emmet 略記を展開します。"
menu.item.edit.toggle_value.help:
  en: "Toggle the value under the cursor, such as true or false."
  es: "Alterna el valor bajo el cursor, como true o false."
  fr: "Bascule la valeur sous le curseur, comme true ou false."
  de: "Schaltet den Wert unter dem Cursor um, etwa true oder false."
  cy: "Toglo'r gwerth o dan y cyrchwr, fel true neu false."
  ga: "Scoránaigh an luach faoin gcúrsóir, ar nós true nó false."
  gd: "Toglaich an luach fon chùrsair, mar true no false."
  pl: "Przełącza wartość pod kursorem, np. true lub false."
  pt: "Alterna o valor sob o cursor, como true ou false."
  ru: "Переключает значение под курсором, например true или false."
  ar: "يبدّل القيمة تحت المؤشر، مثل true أو false."
  hi: "कर्सर के नीचे मान को टॉगल करें, जैसे true या false।"
  bn: "কার্সারের নিচের মান টগল করুন, যেমন true বা false।"
  zh: "切换光标下的值，例如 true 或 false。"
  ja: "カーソル下の値（true や false など）を切り替えます。"
menu.item.edit.transpose_chars.help:
  en: "Swap the two characters around the cursor."
  es: "Intercambia los dos caracteres alrededor del cursor."
  fr: "Permute les deux caractères autour du curseur."
  de: "Vertauscht die beiden Zeichen um den Cursor."
  cy: "Cyfnewid y ddau nod o boptu'r cyrchwr."
  ga: "Malartaigh an dá charachtar timpeall an chúrsóra."
  gd: "Iomlaidich an dà charactar timcheall a' chùrsair."
  pl: "Zamienia miejscami dwa znaki wokół kursora."
  pt: "Troca os dois caracteres em torno do cursor."
  ru: "Меняет местами два символа вокруг курсора."
  ar: "يبدّل الحرفين المحيطين بالمؤشر."
  hi: "कर्सर के आसपास के दो अक्षरों की अदला-बदली करें।"
  bn: "কার্সারের চারপাশের দুটি অক্ষর অদলবদল করুন।"
  zh: "交换光标两侧的两个字符。"
  ja: "カーソル前後の 2 文字を入れ替えます。"
menu.item.edit.transpose_words.help:
  en: "Swap the two words around the cursor."
  es: "Intercambia las dos palabras alrededor del cursor."
  fr: "Permute les deux mots autour du curseur."
  de: "Vertauscht die beiden Wörter um den Cursor."
  cy: "Cyfnewid y ddau air o boptu'r cyrchwr."
  ga: "Malartaigh an dá fhocal timpeall an chúrsóra."
  gd: "Iomlaidich an dà fhacal timcheall a' chùrsair."
  pl: "Zamienia miejscami dwa słowa wokół kursora."
  pt: "Troca as duas palavras em torno do cursor."
  ru: "Меняет местами два слова вокруг курсора."
  ar: "يبدّل الكلمتين المحيطتين بالمؤشر."
  hi: "कर्सर के आसपास के दो शब्दों की अदला-बदली करें।"
  bn: "কার্সারের চারপাশের দুটি শব্দ অদলবদল করুন।"
  zh: "交换光标两侧的两个单词。"
  ja: "カーソル前後の 2 つの単語を入れ替えます。"
menu.item.edit.increment_number.help:
  en: "Increase the number under the cursor by one."
  es: "Aumenta en uno el número bajo el cursor."
  fr: "Augmente de un le nombre sous le curseur."
  de: "Erhöht die Zahl unter dem Cursor um eins."
  cy: "Cynyddu'r rhif o dan y cyrchwr o un."
  ga: "Méadaigh an uimhir faoin gcúrsóir de haon."
  gd: "Àrdaich an àireamh fon chùrsair le aon."
  pl: "Zwiększa liczbę pod kursorem o jeden."
  pt: "Aumenta em um o número sob o cursor."
  ru: "Увеличивает число под курсором на единицу."
  ar: "يزيد الرقم تحت المؤشر بمقدار واحد."
  hi: "कर्सर के नीचे की संख्या को एक से बढ़ाएँ।"
  bn: "কার্সারের নিচের সংখ্যাটি এক বাড়ান।"
  zh: "将光标下的数字加一。"
  ja: "カーソル下の数値を 1 増やします。"
menu.item.edit.decrement_number.help:
  en: "Decrease the number under the cursor by one."
  es: "Disminuye en uno el número bajo el cursor."
  fr: "Diminue de un le nombre sous le curseur."
  de: "Verringert die Zahl unter dem Cursor um eins."
  cy: "Lleihau'r rhif o dan y cyrchwr o un."
  ga: "Laghdaigh an uimhir faoin gcúrsóir de haon."
  gd: "Lùghdaich an àireamh fon chùrsair le aon."
  pl: "Zmniejsza liczbę pod kursorem o jeden."
  pt: "Diminui em um o número sob o cursor."
  ru: "Уменьшает число под курсором на единицу."
  ar: "ينقص الرقم تحت المؤشر بمقدار واحد."
  hi: "कर्सर के नीचे की संख्या को एक से घटाएँ।"
  bn: "কার্সারের নিচের সংখ্যাটি এক কমান।"
  zh: "将光标下的数字减一。"
  ja: "カーソル下の数値を 1 減らします。"
menu.item.edit.macro.help:
  en: "Open commands for recording and playing keyboard macros."
  es: "Abre comandos para grabar y reproducir macros de teclado."
  fr: "Ouvre les commandes pour enregistrer et jouer des macros clavier."
  de: "Öffnet Befehle zum Aufzeichnen und Abspielen von Tastaturmakros."
  cy: "Agor gorchmynion i recordio a chwarae macros bysellfwrdd."
  ga: "Oscail orduithe chun macraí méarchláir a thaifeadadh agus a sheinm."
  gd: "Fosgail àitheantan gus macrothan a' mheur-chlàir a chlàradh 's a chluich."
  pl: "Otwiera polecenia do nagrywania i odtwarzania makr klawiaturowych."
  pt: "Abre comandos para gravar e reproduzir macros de teclado."
  ru: "Открывает команды записи и воспроизведения макросов клавиатуры."
  ar: "يفتح أوامر تسجيل وتشغيل وحدات ماكرو لوحة المفاتيح."
  hi: "कीबोर्ड मैक्रो रिकॉर्ड और चलाने के लिए कमांड खोलें।"
  bn: "কীবোর্ড ম্যাক্রো রেকর্ড ও চালানোর কমান্ড খুলুন।"
  zh: "打开录制和播放键盘宏的命令。"
  ja: "キーボードマクロの記録と再生のコマンドを開きます。"
menu.item.edit.record_macro.help:
  en: "Start or stop recording a keyboard macro."
  es: "Inicia o detiene la grabación de una macro de teclado."
  fr: "Démarre ou arrête l'enregistrement d'une macro clavier."
  de: "Startet oder stoppt die Aufzeichnung eines Tastaturmakros."
  cy: "Dechrau neu atal recordio macro bysellfwrdd."
  ga: "Tosaigh nó stop taifeadadh macra méarchláir."
  gd: "Tòisich no stad clàradh macro meur-chlàir."
  pl: "Rozpoczyna lub kończy nagrywanie makra klawiaturowego."
  pt: "Inicia ou para a gravação de uma macro de teclado."
  ru: "Начинает или останавливает запись макроса клавиатуры."
  ar: "يبدأ أو يوقف تسجيل ماكرو لوحة المفاتيح."
  hi: "कीबोर्ड मैक्रो की रिकॉर्डिंग शुरू या बंद करें।"
  bn: "কীবোর্ড ম্যাক্রো রেকর্ডিং শুরু বা বন্ধ করুন।"
  zh: "开始或停止录制键盘宏。"
  ja: "キーボードマクロの記録を開始または停止します。"
menu.item.edit.play_macro.help:
  en: "Replay the last recorded macro."
  es: "Reproduce la última macro grabada."
  fr: "Rejoue la dernière macro enregistrée."
  de: "Spielt das zuletzt aufgezeichnete Makro erneut ab."
  cy: "Ailchwarae'r macro diwethaf a recordiwyd."
  ga: "Athsheinn an macra deireanach a taifeadadh."
  gd: "Ath-chluich am macro mu dheireadh a chaidh a chlàradh."
  pl: "Odtwarza ostatnio nagrane makro."
  pt: "Reproduz a última macro gravada."
  ru: "Воспроизводит последний записанный макрос."
  ar: "يعيد تشغيل آخر ماكرو مسجّل."
  hi: "अंतिम रिकॉर्ड किए गए मैक्रो को फिर से चलाएँ।"
  bn: "সর্বশেষ রেকর্ড করা ম্যাক্রোটি আবার চালান।"
  zh: "重放最后录制的宏。"
  ja: "最後に記録したマクロを再生します。"
menu.item.edit.save_macro.help:
  en: "Save the recorded macro under a name."
  es: "Guarda la macro grabada con un nombre."
  fr: "Enregistre la macro sous un nom."
  de: "Speichert das aufgezeichnete Makro unter einem Namen."
  cy: "Cadw'r macro a recordiwyd o dan enw."
  ga: "Sábháil an macra taifeadta faoi ainm."
  gd: "Sàbhail am macro clàraichte fo ainm."
  pl: "Zapisuje nagrane makro pod nazwą."
  pt: "Guarda a macro gravada com um nome."
  ru: "Сохраняет записанный макрос под именем."
  ar: "يحفظ الماكرو المسجّل باسم."
  hi: "रिकॉर्ड किए गए मैक्रो को एक नाम से सहेजें।"
  bn: "রেকর্ড করা ম্যাক্রোটি একটি নামে সংরক্ষণ করুন।"
  zh: "以名称保存录制的宏。"
  ja: "記録したマクロに名前を付けて保存します。"
menu.item.edit.play_saved_macro.help:
  en: "Choose a saved macro and replay it."
  es: "Elige una macro guardada y reprodúcela."
  fr: "Choisit une macro enregistrée et la rejoue."
  de: "Wählt ein gespeichertes Makro aus und spielt es ab."
  cy: "Dewis macro a gadwyd a'i ailchwarae."
  ga: "Roghnaigh macra sábháilte agus athsheinn é."
  gd: "Tagh macro a chaidh a shàbhaladh is ath-chluich e."
  pl: "Wybiera zapisane makro i je odtwarza."
  pt: "Escolhe uma macro guardada e reproduz."
  ru: "Выбирает сохранённый макрос и воспроизводит его."
  ar: "يختار ماكرو محفوظًا ويعيد تشغيله."
  hi: "एक सहेजा गया मैक्रो चुनें और चलाएँ।"
  bn: "সংরক্ষিত একটি ম্যাক্রো বেছে নিয়ে চালান।"
  zh: "选择一个已保存的宏并播放。"
  ja: "保存済みのマクロを選んで再生します。"
menu.item.edit.bookmark_toggle.help:
  en: "Add or remove a bookmark on the current line."
  es: "Añade o quita un marcador en la línea actual."
  fr: "Ajoute ou supprime un signet sur la ligne actuelle."
  de: "Fügt ein Lesezeichen in der aktuellen Zeile hinzu oder entfernt es."
  cy: "Ychwanegu neu dynnu nod tudalen ar y llinell gyfredol."
  ga: "Cuir leabharmharc leis an líne reatha nó bain de é."
  gd: "Cuir comharra-leabhair ris an loidhne làithreach no thoir air falbh e."
  pl: "Dodaje lub usuwa zakładkę w bieżącym wierszu."
  pt: "Adiciona ou remove um marcador na linha atual."
  ru: "Добавляет или удаляет закладку на текущей строке."
  ar: "يضيف أو يزيل إشارة مرجعية في السطر الحالي."
  hi: "वर्तमान पंक्ति पर बुकमार्क जोड़ें या हटाएँ।"
  bn: "বর্তমান লাইনে একটি বুকমার্ক যোগ বা মুছুন।"
  zh: "在当前行添加或移除书签。"
  ja: "現在の行のブックマークを追加または削除します。"
menu.item.edit.bookmark_next.help:
  en: "Jump to the next bookmark."
  es: "Salta al siguiente marcador."
  fr: "Passe au signet suivant."
  de: "Springt zum nächsten Lesezeichen."
  cy: "Neidio i'r nod tudalen nesaf."
  ga: "Léim go dtí an chéad leabharmharc eile."
  gd: "Leum chun ath chomharra-leabhair."
  pl: "Przechodzi do następnej zakładki."
  pt: "Salta para o próximo marcador."
  ru: "Переходит к следующей закладке."
  ar: "ينتقل إلى الإشارة المرجعية التالية."
  hi: "अगले बुकमार्क पर जाएँ।"
  bn: "পরবর্তী বুকমার্কে যান।"
  zh: "跳转到下一个书签。"
  ja: "次のブックマークに移動します。"
menu.item.edit.bookmark_prev.help:
  en: "Jump to the previous bookmark."
  es: "Salta al marcador anterior."
  fr: "Revient au signet précédent."
  de: "Springt zum vorherigen Lesezeichen."
  cy: "Neidio i'r nod tudalen blaenorol."
  ga: "Léim go dtí an leabharmharc roimhe."
  gd: "Leum chun a' chomharra-leabhair roimhe."
  pl: "Przechodzi do poprzedniej zakładki."
  pt: "Salta para o marcador anterior."
  ru: "Переходит к предыдущей закладке."
  ar: "ينتقل إلى الإشارة المرجعية السابقة."
  hi: "पिछले बुकमार्क पर जाएँ।"
  bn: "আগের বুকমার্কে যান।"
  zh: "跳转到上一个书签。"
  ja: "前のブックマークに移動します。"
menu.item.edit.bookmark_list.help:
  en: "List all bookmarks and jump to one."
  es: "Lista todos los marcadores y salta a uno."
  fr: "Liste tous les signets et permet d'en atteindre un."
  de: "Listet alle Lesezeichen auf und springt zu einem."
  cy: "Rhestru pob nod tudalen a neidio i un."
  ga: "Liostaigh na leabharmharcanna go léir agus léim chuig ceann."
  gd: "Liostaich a h-uile comharra-leabhair is leum gu fear."
  pl: "Wyświetla wszystkie zakładki i pozwala przejść do jednej."
  pt: "Lista todos os marcadores e salta para um."
  ru: "Показывает все закладки и переходит к выбранной."
  ar: "يسرد كل الإشارات المرجعية وينتقل إلى واحدة."
  hi: "सभी बुकमार्क सूचीबद्ध करें और किसी एक पर जाएँ।"
  bn: "সব বুকমার্ক তালিকাভুক্ত করে একটিতে যান।"
  zh: "列出所有书签并跳转到其中一个。"
  ja: "すべてのブックマークを一覧表示し、選んで移動します。"
menu.go.start.help:
  en: "Move the cursor to the start of the current word."
  es: "Mueve el cursor al inicio de la palabra actual."
  fr: "Déplace le curseur au début du mot actuel."
  de: "Bewegt den Cursor zum Anfang des aktuellen Wortes."
  cy: "Symud y cyrchwr i ddechrau'r gair cyfredol."
  ga: "Bog an cúrsóir go tús an fhocail reatha."
  gd: "Gluais an cùrsair gu toiseach an fhacail làithrich."
  pl: "Przesuwa kursor na początek bieżącego słowa."
  pt: "Move o cursor para o início da palavra atual."
  ru: "Перемещает курсор в начало текущего слова."
  ar: "ينقل المؤشر إلى بداية الكلمة الحالية."
  hi: "कर्सर को वर्तमान शब्द के आरंभ में ले जाएँ।"
  bn: "কার্সারটি বর্তমান শব্দের শুরুতে নিয়ে যান।"
  zh: "将光标移动到当前单词的开头。"
  ja: "カーソルを現在の単語の先頭へ移動します。"
menu.go.end.help:
  en: "Move the cursor to the end of the current word."
  es: "Mueve el cursor al final de la palabra actual."
  fr: "Déplace le curseur à la fin du mot actuel."
  de: "Bewegt den Cursor zum Ende des aktuellen Wortes."
  cy: "Symud y cyrchwr i ddiwedd y gair cyfredol."
  ga: "Bog an cúrsóir go deireadh an fhocail reatha."
  gd: "Gluais an cùrsair gu deireadh an fhacail làithrich."
  pl: "Przesuwa kursor na koniec bieżącego słowa."
  pt: "Move o cursor para o fim da palavra atual."
  ru: "Перемещает курсор в конец текущего слова."
  ar: "ينقل المؤشر إلى نهاية الكلمة الحالية."
  hi: "कर्सर को वर्तमान शब्द के अंत में ले जाएँ।"
  bn: "কার্সারটি বর্তমান শব্দের শেষে নিয়ে যান।"
  zh: "将光标移动到当前单词的末尾。"
  ja: "カーソルを現在の単語の末尾へ移動します。"
menu.go.next.help:
  en: "Move the cursor to the next word."
  es: "Mueve el cursor a la palabra siguiente."
  fr: "Déplace le curseur au mot suivant."
  de: "Bewegt den Cursor zum nächsten Wort."
  cy: "Symud y cyrchwr i'r gair nesaf."
  ga: "Bog an cúrsóir go dtí an chéad fhocal eile."
  gd: "Gluais an cùrsair chun an ath fhacail."
  pl: "Przesuwa kursor do następnego słowa."
  pt: "Move o cursor para a palavra seguinte."
  ru: "Перемещает курсор к следующему слову."
  ar: "ينقل المؤشر إلى الكلمة التالية."
  hi: "कर्सर को अगले शब्द पर ले जाएँ।"
  bn: "কার্সারটি পরবর্তী শব্দে নিয়ে যান।"
  zh: "将光标移动到下一个单词。"
  ja: "カーソルを次の単語へ移動します。"
menu.go.previous.help:
  en: "Move the cursor to the previous word."
  es: "Mueve el cursor a la palabra anterior."
  fr: "Déplace le curseur au mot précédent."
  de: "Bewegt den Cursor zum vorherigen Wort."
  cy: "Symud y cyrchwr i'r gair blaenorol."
  ga: "Bog an cúrsóir go dtí an focal roimhe."
  gd: "Gluais an cùrsair chun an fhacail roimhe."
  pl: "Przesuwa kursor do poprzedniego słowa."
  pt: "Move o cursor para a palavra anterior."
  ru: "Перемещает курсор к предыдущему слову."
  ar: "ينقل المؤشر إلى الكلمة السابقة."
  hi: "कर्सर को पिछले शब्द पर ले जाएँ।"
  bn: "কার্সারটি আগের শব্দে নিয়ে যান।"
  zh: "将光标移动到上一个单词。"
  ja: "カーソルを前の単語へ移動します。"
menu.go.number.help:
  en: "Jump to a word by its on-screen number."
  es: "Salta a una palabra por su número en pantalla."
  fr: "Atteint un mot d'après son numéro à l'écran."
  de: "Springt zu einem Wort anhand seiner Bildschirmnummer."
  cy: "Neidio i air yn ôl ei rif ar y sgrin."
  ga: "Léim chuig focal de réir a uimhir ar an scáileán."
  gd: "Leum gu facal a rèir an àireimh aige air an sgrion."
  pl: "Przechodzi do słowa według jego numeru na ekranie."
  pt: "Salta para uma palavra pelo seu número no ecrã."
  ru: "Переходит к слову по его номеру на экране."
  ar: "ينتقل إلى كلمة حسب رقمها على الشاشة."
  hi: "स्क्रीन पर उसके नंबर से किसी शब्द पर जाएँ।"
  bn: "স্ক্রিনে তার নম্বর অনুসারে একটি শব্দে যান।"
  zh: "根据屏幕上的编号跳转到某个单词。"
  ja: "画面上の番号で単語に移動します。"
menu.go.symbol.help:
  en: "Jump to a symbol in the current file."
  es: "Salta a un símbolo del archivo actual."
  fr: "Atteint un symbole dans le fichier actuel."
  de: "Springt zu einem Symbol in der aktuellen Datei."
  cy: "Neidio i symbol yn y ffeil gyfredol."
  ga: "Léim chuig siombail sa chomhad reatha."
  gd: "Leum gu samhla san fhaidhle làithreach."
  pl: "Przechodzi do symbolu w bieżącym pliku."
  pt: "Salta para um símbolo no ficheiro atual."
  ru: "Переходит к символу в текущем файле."
  ar: "ينتقل إلى رمز في الملف الحالي."
  hi: "वर्तमान फ़ाइल में किसी सिंबल पर जाएँ।"
  bn: "বর্তমান ফাইলের একটি সিম্বলে যান।"
  zh: "跳转到当前文件中的符号。"
  ja: "現在のファイル内のシンボルに移動します。"
menu.go.declaration.help:
  en: "Jump to the declaration of the symbol under the cursor."
  es: "Salta a la declaración del símbolo bajo el cursor."
  fr: "Atteint la déclaration du symbole sous le curseur."
  de: "Springt zur Deklaration des Symbols unter dem Cursor."
  cy: "Neidio i ddatganiad y symbol o dan y cyrchwr."
  ga: "Léim chuig dearbhú na siombaile faoin gcúrsóir."
  gd: "Leum gu foirmleachadh an t-samhla fon chùrsair."
  pl: "Przechodzi do deklaracji symbolu pod kursorem."
  pt: "Salta para a declaração do símbolo sob o cursor."
  ru: "Переходит к объявлению символа под курсором."
  ar: "ينتقل إلى تصريح الرمز الموجود تحت المؤشر."
  hi: "कर्सर के नीचे के सिंबल की घोषणा पर जाएँ।"
  bn: "কার্সারের নিচের সিম্বলের ঘোষণায় যান।"
  zh: "跳转到光标下符号的声明。"
  ja: "カーソル下のシンボルの宣言に移動します。"
menu.go.implementations.help:
  en: "Jump to implementations of the symbol under the cursor."
  es: "Salta a las implementaciones del símbolo bajo el cursor."
  fr: "Atteint les implémentations du symbole sous le curseur."
  de: "Springt zu den Implementierungen des Symbols unter dem Cursor."
  cy: "Neidio i weithrediadau'r symbol o dan y cyrchwr."
  ga: "Léim chuig feidhmiúcháin na siombaile faoin gcúrsóir."
  gd: "Leum gu buileachaidhean an t-samhla fon chùrsair."
  pl: "Przechodzi do implementacji symbolu pod kursorem."
  pt: "Salta para as implementações do símbolo sob o cursor."
  ru: "Переходит к реализациям символа под курсором."
  ar: "ينتقل إلى تطبيقات الرمز الموجود تحت المؤشر."
  hi: "कर्सर के नीचे के सिंबल के कार्यान्वयनों पर जाएँ।"
  bn: "কার্সারের নিচের সিম্বলের ইমপ্লিমেন্টেশনে যান।"
  zh: "跳转到光标下符号的实现。"
  ja: "カーソル下のシンボルの実装に移動します。"
menu.go.references.help:
  en: "Jump to all references of the symbol under the cursor."
  es: "Salta a todas las referencias del símbolo bajo el cursor."
  fr: "Aller à toutes les références du symbole sous le curseur."
  de: "Zu allen Referenzen des Symbols unter dem Cursor springen."
  cy: "Neidio i holl gyfeiriadau'r symbol o dan y cyrchwr."
  ga: "Léim chuig gach tagairt don siombail faoin gcúrsóir."
  gd: "Leum gu gach iomradh air an t-samhla fon chùrsair."
  pl: "Przejdź do wszystkich odwołań do symbolu pod kursorem."
  pt: "Ir para todas as referências do símbolo sob o cursor."
  ru: "Перейти ко всем ссылкам на символ под курсором."
  ar: "الانتقال إلى جميع مراجع الرمز الموجود أسفل المؤشر."
  hi: "कर्सर के नीचे स्थित प्रतीक के सभी संदर्भों पर जाएँ।"
  bn: "কার্সারের নিচের প্রতীকের সমস্ত রেফারেন্সে যান।"
  zh: "跳转到光标下符号的所有引用。"
  ja: "カーソル位置のシンボルの全参照に移動します。"
menu.go.next_issue.help:
  en: "Jump to the next diagnostic issue in the file."
  es: "Salta al siguiente problema de diagnóstico del archivo."
  fr: "Aller au prochain problème de diagnostic du fichier."
  de: "Zum nächsten Diagnoseproblem in der Datei springen."
  cy: "Neidio i'r broblem ddiagnostig nesaf yn y ffeil."
  ga: "Léim chuig an chéad fhadhb diagnóiseach eile sa chomhad."
  gd: "Leum chun na h-ath dhuilgheadais sgrùdaidh san fhaidhle."
  pl: "Przejdź do następnego problemu diagnostycznego w pliku."
  pt: "Ir para o próximo problema de diagnóstico no arquivo."
  ru: "Перейти к следующей диагностической проблеме в файле."
  ar: "الانتقال إلى المشكلة التشخيصية التالية في الملف."
  hi: "फ़ाइल में अगली डायग्नोस्टिक समस्या पर जाएँ।"
  bn: "ফাইলের পরবর্তী ডায়াগনস্টিক সমস্যায় যান।"
  zh: "跳转到文件中的下一个诊断问题。"
  ja: "ファイル内の次の診断問題に移動します。"
menu.go.prev_issue.help:
  en: "Jump to the previous diagnostic issue in the file."
  es: "Salta al problema de diagnóstico anterior del archivo."
  fr: "Aller au problème de diagnostic précédent du fichier."
  de: "Zum vorherigen Diagnoseproblem in der Datei springen."
  cy: "Neidio i'r broblem ddiagnostig flaenorol yn y ffeil."
  ga: "Léim chuig an fhadhb diagnóiseach roimhe seo sa chomhad."
  gd: "Leum chun na duilgheadais sgrùdaidh roimhe san fhaidhle."
  pl: "Przejdź do poprzedniego problemu diagnostycznego w pliku."
  pt: "Ir para o problema de diagnóstico anterior no arquivo."
  ru: "Перейти к предыдущей диагностической проблеме в файле."
  ar: "الانتقال إلى المشكلة التشخيصية السابقة في الملف."
  hi: "फ़ाइल में पिछली डायग्नोस्टिक समस्या पर जाएँ।"
  bn: "ফাইলের পূর্ববর্তী ডায়াগনস্টিক সমস্যায় যান।"
  zh: "跳转到文件中的上一个诊断问题。"
  ja: "ファイル内の前の診断問題に移動します。"
menu.go.next_change.help:
  en: "Jump to the next changed hunk since the last commit."
  es: "Salta al siguiente fragmento modificado desde el último commit."
  fr: "Aller au prochain bloc modifié depuis le dernier commit."
  de: "Zum nächsten geänderten Block seit dem letzten Commit springen."
  cy: "Neidio i'r darn nesaf a newidiwyd ers y commit diwethaf."
  ga: "Léim chuig an chéad bhloc athraithe eile ón commit deireanach."
  gd: "Leum chun an ath bhloca a chaidh atharrachadh bhon commit mu dheireadh."
  pl: "Przejdź do następnego zmienionego fragmentu od ostatniego commita."
  pt: "Ir para o próximo trecho alterado desde o último commit."
  ru: "Перейти к следующему изменённому фрагменту с последнего коммита."
  ar: "الانتقال إلى الجزء المتغيّر التالي منذ آخر commit في Git."
  hi: "पिछले commit के बाद अगले बदले गए हंक पर जाएँ।"
  bn: "শেষ commit-এর পর থেকে পরবর্তী পরিবর্তিত হাঙ্কে যান।"
  zh: "跳转到自上次提交以来的下一个更改块。"
  ja: "最後のコミット以降に変更された次のハンクに移動します。"
menu.go.prev_change.help:
  en: "Jump to the previous changed hunk since the last commit."
  es: "Salta al fragmento modificado anterior desde el último commit."
  fr: "Aller au bloc modifié précédent depuis le dernier commit."
  de: "Zum vorherigen geänderten Block seit dem letzten Commit springen."
  cy: "Neidio i'r darn blaenorol a newidiwyd ers y commit diwethaf."
  ga: "Léim chuig an bhloc athraithe roimhe seo ón commit deireanach."
  gd: "Leum chun a' bhloca roimhe a chaidh atharrachadh bhon commit mu dheireadh."
  pl: "Przejdź do poprzedniego zmienionego fragmentu od ostatniego commita."
  pt: "Ir para o trecho alterado anterior desde o último commit."
  ru: "Перейти к предыдущему изменённому фрагменту с последнего коммита."
  ar: "الانتقال إلى الجزء المتغيّر السابق منذ آخر commit في Git."
  hi: "पिछले commit के बाद पिछले बदले गए हंक पर जाएँ।"
  bn: "শেষ commit-এর পর থেকে পূর্ববর্তী পরিবর্তিত হাঙ্কে যান।"
  zh: "跳转到自上次提交以来的上一个更改块。"
  ja: "最後のコミット以降に変更された前のハンクに移動します。"
menu.item.edit.recent_locations.help:
  en: "Browse and revisit recently visited cursor locations."
  es: "Explora y regresa a ubicaciones del cursor visitadas recientemente."
  fr: "Parcourir et revenir aux emplacements du curseur récemment visités."
  de: "Kürzlich besuchte Cursorpositionen durchsuchen und erneut aufrufen."
  cy: "Pori ac ailymweld â lleoliadau'r cyrchwr a ymwelwyd yn ddiweddar."
  ga: "Brabhsáil agus fill ar shuíomhanna cúrsóra ar tugadh cuairt orthu le déanaí."
  gd: "Rùraich is till gu ionadan cùrsair air an do thadhail thu o chionn ghoirid."
  pl: "Przeglądaj i wracaj do ostatnio odwiedzanych pozycji kursora."
  pt: "Navegue e retorne a locais do cursor visitados recentemente."
  ru: "Просмотреть и вернуться к недавно посещённым позициям курсора."
  ar: "تصفّح مواضع المؤشر التي زُرتها مؤخرًا والعودة إليها."
  hi: "हाल ही में देखे गए कर्सर स्थानों को ब्राउज़ करें और फिर से जाएँ।"
  bn: "সম্প্রতি পরিদর্শন করা কার্সার অবস্থানগুলি ব্রাউজ করুন ও ফিরে যান।"
  zh: "浏览并返回最近访问过的光标位置。"
  ja: "最近訪れたカーソル位置を一覧表示して再訪します。"
menu.go.jump.help:
  en: "Jump to a line by typing its on-screen label."
  es: "Salta a una línea escribiendo su etiqueta en pantalla."
  fr: "Aller à une ligne en tapant son étiquette affichée à l'écran."
  de: "Zu einer Zeile springen, indem ihr Bildschirmkürzel eingegeben wird."
  cy: "Neidio i linell drwy deipio ei label ar y sgrin."
  ga: "Léim chuig líne trí lipéad scáileáin a chlóscríobh."
  gd: "Leum gu loidhne le bhith a' sgrìobhadh na leubail air an sgrion aice."
  pl: "Przejdź do wiersza, wpisując jego etykietę na ekranie."
  pt: "Ir para uma linha digitando o rótulo exibido na tela."
  ru: "Перейти к строке, введя её экранную метку."
  ar: "الانتقال إلى سطر بكتابة تسميته الظاهرة على الشاشة."
  hi: "स्क्रीन पर दिखे लेबल को टाइप करके किसी पंक्ति पर जाएँ।"
  bn: "স্ক্রিনে দেখানো লেবেল টাইপ করে কোনো লাইনে যান।"
  zh: "输入屏幕上的标签以跳转到某一行。"
  ja: "画面上のラベルを入力して行に移動します。"
menu.go.bookmarks.help:
  en: "Open commands for setting and navigating bookmarks."
  es: "Abre comandos para crear y navegar por marcadores."
  fr: "Ouvrir les commandes pour créer et parcourir les signets."
  de: "Befehle zum Setzen und Navigieren von Lesezeichen öffnen."
  cy: "Agor gorchmynion i osod a llywio nodau tudalen."
  ga: "Oscail orduithe chun leabharmharcanna a shocrú agus a nascleanúint."
  gd: "Fosgail àitheantan gus comharran-lìn a shuidheachadh 's a sheòladh."
  pl: "Otwórz polecenia do ustawiania i przechodzenia między zakładkami."
  pt: "Abrir comandos para definir e navegar por marcadores."
  ru: "Открыть команды для установки закладок и перехода по ним."
  ar: "فتح أوامر لتعيين الإشارات المرجعية والتنقل بينها."
  hi: "बुकमार्क सेट करने और उनमें नेविगेट करने के आदेश खोलें।"
  bn: "বুকমার্ক সেট ও নেভিগেট করার কমান্ড খুলুন।"
  zh: "打开用于设置和浏览书签的命令。"
  ja: "ブックマークの設定と移動のコマンドを開きます。"
