  ja: "ランダムなバージョン 4 の UUID を挿入します。"
menu.item.tools.insert.uuid.v5.help:
  en: "Insert a version 5 UUID hashed from a name with SHA-1."
  es: "Inserta un UUID versión 5 obtenido de un nombre con SHA-1."
  fr: "Insère un UUID version 5 haché à partir d'un nom avec SHA-1."
  de: "Fügt eine UUID der Version 5 ein, aus einem Namen per SHA-1 gehasht."
  cy: "Mewnosod UUID fersiwn 5 wedi'i stwnsio o enw gyda SHA-1."
  ga: "Ionsáigh UUID leagan 5 haiseáilte ó ainm le SHA-1."
  gd: "Cuir a-steach UUID tionndadh 5 air a hais bho ainm le SHA-1."
  pl: "Wstawia UUID w wersji 5 utworzony z nazwy przy użyciu SHA-1."
  pt: "Insere um UUID versão 5 gerado de um nome com SHA-1."
  ru: "Вставляет UUID версии 5, полученный из имени с помощью SHA-1."
  ar: "يُدرج UUID من الإصدار 5 مُجزّأ من اسم باستخدام SHA-1."
  hi: "SHA-1 से नाम को हैश करके एक संस्करण 5 UUID डालें।"
  bn: "SHA-1 দিয়ে একটি নাম হ্যাশ করে একটি সংস্করণ 5 UUID সন্নিবেশ করুন।"
  zh: "插入用 SHA-1 对名称哈希得到的版本 5 UUID。"
  ja: "SHA-1 で名前をハッシュしたバージョン 5 の UUID を挿入します。"
menu.item.tools.insert.uuid.v6.help:
  en: "Insert a sortable version 6 UUID from a timestamp and MAC address."
  es: "Inserta un UUID versión 6 ordenable a partir de una marca de tiempo y una dirección MAC."
  fr: "Insère un UUID version 6 triable à partir d'un horodatage et d'une adresse MAC."
  de: "Fügt eine sortierbare UUID der Version 6 aus Zeitstempel und MAC-Adresse ein."
  cy: "Mewnosod UUID fersiwn 6 trefnadwy o stamp amser a chyfeiriad MAC."
  ga: "Ionsáigh UUID leagan 6 in-sórtáilte ó stampa ama agus seoladh MAC."
  gd: "Cuir a-steach UUID tionndadh 6 a ghabhas seòrsachadh bho stampa-ama is seòladh MAC."
  pl: "Wstawia sortowalny UUID w wersji 6 ze znacznika czasu i adresu MAC."
  pt: "Insere um UUID versão 6 ordenável a partir de um carimbo de data/hora e endereço MAC."
  ru: "Вставляет сортируемый UUID версии 6 из метки времени и MAC-адреса."
  ar: "يُدرج UUID قابلًا للفرز من الإصدار 6 من طابع زمني وعنوان MAC."
  hi: "टाइमस्टैम्प और MAC पते से एक क्रमबद्ध करने योग्य संस्करण 6 UUID डालें।"
  bn: "টাইমস্ট্যাম্প ও MAC ঠিকানা থেকে একটি সাজানো-যোগ্য সংস্করণ 6 UUID সন্নিবেশ করুন।"
  zh: "根据时间戳和 MAC 地址插入可排序的版本 6 UUID。"
  ja: "タイムスタンプと MAC アドレスからソート可能なバージョン 6 の UUID を挿入します。"
menu.item.tools.insert.uuid.v7.help:
  en: "Insert a version 7 UUID from a timestamp and random bits."
  es: "Inserta un UUID versión 7 a partir de una marca de tiempo y bits aleatorios."
  fr: "Insère un UUID version 7 à partir d'un horodatage et de bits aléatoires."
  de: "Fügt eine UUID der Version 7 aus Zeitstempel und Zufallsbits ein."
  cy: "Mewnosod UUID fersiwn 7 o stamp amser a didau ar hap."
  ga: "Ionsáigh UUID leagan 7 ó stampa ama agus giotáin randamacha."
  gd: "Cuir a-steach UUID tionndadh 7 bho stampa-ama is bits air thuaiream."
  pl: "Wstawia UUID w wersji 7 ze znacznika czasu i losowych bitów."
  pt: "Insere um UUID versão 7 a partir de um carimbo de data/hora e bits aleatórios."
  ru: "Вставляет UUID версии 7 из метки времени и случайных битов."
  ar: "يُدرج UUID من الإصدار 7 من طابع زمني وبتات عشوائية."
  hi: "टाइमस्टैम्प और यादृच्छिक बिट्स से एक संस्करण 7 UUID डालें।"
  bn: "টাইমস্ট্যাম্প ও এলোমেলো বিট থেকে একটি সংস্করণ 7 UUID সন্নিবেশ করুন।"
  zh: "根据时间戳和随机位插入版本 7 的 UUID。"
  ja: "タイムスタンプとランダムビットからバージョン 7 の UUID を挿入します。"
menu.item.tools.insert.uuid.v8.help:
  en: "Insert a custom version 8 UUID placeholder."
  es: "Inserta un marcador de posición de UUID versión 8 personalizado."
  fr: "Insère un espace réservé d'UUID version 8 personnalisé."
  de: "Fügt einen benutzerdefinierten UUID-Platzhalter der Version 8 ein."
  cy: "Mewnosod deiliad lle UUID fersiwn 8 wedi'i addasu."
  ga: "Ionsáigh áitmharcóir UUID saincheaptha leagan 8."
  gd: "Cuir a-steach glacadair-àite UUID gnàthaichte tionndadh 8."
  pl: "Wstawia niestandardowy symbol zastępczy UUID w wersji 8."
  pt: "Insere um espaço reservado de UUID versão 8 personalizado."
  ru: "Вставляет пользовательский шаблон UUID версии 8."
  ar: "يُدرج عنصرًا نائبًا مخصّصًا لـ UUID من الإصدار 8."
  hi: "एक कस्टम संस्करण 8 UUID प्लेसहोल्डर डालें।"
  bn: "একটি কাস্টম সংস্করণ 8 UUID প্লেসহোল্ডার সন্নিবেশ করুন।"
  zh: "插入自定义的版本 8 UUID 占位符。"
  ja: "カスタムのバージョン 8 UUID プレースホルダーを挿入します。"
