  zh: "在当前更改之上创建一个新的空更改。"
  ja: "現在の変更の上に新しい空の変更を作成します。"
menu.item.jj.describe.help:
  en: "Set or edit the description message of the current change."
  es: "Establece o edita el mensaje de descripción del cambio actual."
  fr: "Définit ou modifie le message de description du changement actuel."
  de: "Legt die Beschreibung der aktuellen Änderung fest oder bearbeitet sie."
  cy: "Gosod neu olygu neges disgrifiad y newid cyfredol."
  ga: "Socraigh nó cuir in eagar teachtaireacht chur síos an athraithe reatha."
  gd: "Suidhich no deasaich teachdaireachd tuairisgeul an atharrachaidh làithrich."
  pl: "Ustawia lub edytuje opis bieżącej zmiany."
  pt: "Define ou edita a mensagem de descrição da alteração atual."
  ru: "Задаёт или изменяет описание текущего изменения."
  ar: "عيّن أو حرّر رسالة وصف التغيير الحالي."
  hi: "वर्तमान परिवर्तन का विवरण संदेश सेट या संपादित करें।"
  bn: "বর্তমান পরিবর্তনের বিবরণ বার্তা সেট বা সম্পাদনা করুন।"
  zh: "设置或编辑当前更改的描述信息。"
  ja: "現在の変更の説明メッセージを設定または編集します。"
menu.item.jj.commit.help:
  en: "Finalize the current change with a message and start a new one."
  es: "Finaliza el cambio actual con un mensaje e inicia uno nuevo."
  fr: "Finalise le changement actuel avec un message et en démarre un nouveau."
  de: "Schließt die aktuelle Änderung mit einer Nachricht ab und beginnt eine neue."
  cy: "Cwblhau'r newid cyfredol gyda neges a dechrau un newydd."
  ga: "Cuir bailchríoch ar an athrú reatha le teachtaireacht agus tosaigh ceann nua."
  gd: "Cuir crìoch air an atharrachadh làithreach le teachdaireachd agus tòisich fear ùr."
  pl: "Finalizuje bieżącą zmianę z komunikatem i rozpoczyna nową."
  pt: "Finaliza a alteração atual com uma mensagem e inicia uma nova."
  ru: "Завершает текущее изменение с сообщением и начинает новое."
  ar: "أنهِ التغيير الحالي برسالة وابدأ تغييرًا جديدًا."
  hi: "वर्तमान परिवर्तन को संदेश के साथ अंतिम रूप दें और नया शुरू करें।"
  bn: "একটি বার্তা সহ বর্তমান পরিবর্তন চূড়ান্ত করুন এবং একটি নতুন শুরু করুন।"
  zh: "用一条消息完成当前更改并开始一个新更改。"
  ja: "現在の変更をメッセージ付きで確定し、新しい変更を開始します。"
menu.item.jj.edit.help:
  en: "Make a chosen change the working copy to edit it."
  es: "Convierte un cambio elegido en la copia de trabajo para editarlo."
  fr: "Définit un changement choisi comme copie de travail pour le modifier."
  de: "Macht eine gewählte Änderung zur Arbeitskopie, um sie zu bearbeiten."
  cy: "Gwneud newid dewisedig yn gopi gwaith i'w olygu."
  ga: "Déan athrú roghnaithe mar an chóip oibre chun é a chur in eagar."
  gd: "Dèan atharrachadh taghte na lethbhreac-obrach gus a dheasachadh."
  pl: "Ustawia wybraną zmianę jako kopię roboczą do edycji."
  pt: "Torna uma alteração escolhida a cópia de trabalho para editá-la."
  ru: "Делает выбранное изменение рабочей копией для редактирования."
  ar: "اجعل تغييرًا مختارًا نسخة العمل لتحريره."
  hi: "किसी चुने गए परिवर्तन को संपादित करने के लिए कार्यशील प्रति बनाएं।"
  bn: "সম্পাদনার জন্য একটি নির্বাচিত পরিবর্তনকে ওয়ার্কিং কপি করুন।"
  zh: "将选定的更改设为工作副本以进行编辑。"
  ja: "選んだ変更を作業コピーにして編集できるようにします。"
menu.item.jj.squash.help:
  en: "Move the current change's contents into its parent."
  es: "Mueve el contenido del cambio actual a su padre."
  fr: "Déplace le contenu du changement actuel dans son parent."
  de: "Verschiebt den Inhalt der aktuellen Änderung in ihr Elternteil."
  cy: "Symud cynnwys y newid cyfredol i'w riant."
  ga: "Bog ábhar an athraithe reatha isteach ina thuismitheoir."
  gd: "Gluais susbaint an atharrachaidh làithrich a-steach don phàrant aige."
  pl: "Przenosi zawartość bieżącej zmiany do jej rodzica."
  pt: "Move o conteúdo da alteração atual para o seu pai."
  ru: "Переносит содержимое текущего изменения в его родителя."
  ar: "انقل محتويات التغيير الحالي إلى أصله."
  hi: "वर्तमान परिवर्तन की सामग्री को उसके मूल में ले जाएं।"
  bn: "বর্তমান পরিবর্তনের বিষয়বস্তু তার প্যারেন্টে সরান।"
  zh: "将当前更改的内容移入其父级。"
  ja: "現在の変更の内容を親に移動します。"
menu.item.jj.abandon.help:
  en: "Discard the current change and its contents."
  es: "Descarta el cambio actual y su contenido."
  fr: "Abandonne le changement actuel et son contenu."
  de: "Verwirft die aktuelle Änderung und ihren Inhalt."
  cy: "Gwaredu'r newid cyfredol a'i gynnwys."
  ga: "Tréig an t-athrú reatha agus a bhfuil ann."
  gd: "Tilg air falbh an t-atharrachadh làithreach agus na tha ann."
  pl: "Odrzuca bieżącą zmianę i jej zawartość."
  pt: "Descarta a alteração atual e o seu conteúdo."
  ru: "Отменяет текущее изменение и его содержимое."
  ar: "تجاهل التغيير الحالي ومحتوياته."
  hi: "वर्तमान परिवर्तन और उसकी सामग्री को त्यागें।"
  bn: "বর্তমান পরিবর্তন এবং এর বিষয়বস্তু বাতিল করুন।"
  zh: "放弃当前更改及其内容。"
  ja: "現在の変更とその内容を破棄します。"
menu.item.jj.restore.help:
  en: "Restore files in the working copy from another revision."
  es: "Restaura archivos en la copia de trabajo desde otra revisión."
  fr: "Restaure des fichiers de la copie de travail depuis une autre révision."
  de: "Stellt Dateien in der Arbeitskopie aus einer anderen Revision wieder her."
  cy: "Adfer ffeiliau yn y copi gwaith o adolygiad arall."
  ga: "Athchóirigh comhaid sa chóip oibre ó leagan eile."
  gd: "Aisig faidhlichean san lethbhreac-obrach bho lèirmheas eile."
  pl: "Przywraca pliki w kopii roboczej z innej rewizji."
  pt: "Restaura arquivos na cópia de trabalho a partir de outra revisão."
  ru: "Восстанавливает файлы в рабочей копии из другой ревизии."
  ar: "استعد الملفات في نسخة العمل من مراجعة أخرى."
  hi: "किसी अन्य संशोधन से कार्यशील प्रति में फ़ाइलें पुनर्स्थापित करें।"
  bn: "অন্য একটি রিভিশন থেকে ওয়ার্কিং কপিতে ফাইল পুনরুদ্ধার করুন।"
  zh: "从另一个修订版恢复工作副本中的文件。"
  ja: "作業コピーのファイルを別のリビジョンから復元します。"
menu.item.jj.rebase.help:
  en: "Move a change and its descendants onto a new parent."
  es: "Mueve un cambio y sus descendientes a un nuevo padre."
  fr: "Déplace un changement et ses descendants vers un nouveau parent."
  de: "Verschiebt eine Änderung und ihre Nachfahren auf ein neues Elternteil."
  cy: "Symud newid a'i ddisgynyddion i riant newydd."
  ga: "Bog athrú agus a shliocht go tuismitheoir nua."
  gd: "Gluais atharrachadh agus a shliochd gu pàrant ùr."
  pl: "Przenosi zmianę i jej potomków na nowego rodzica."
  pt: "Move uma alteração e os seus descendentes para um novo pai."
  ru: "Перемещает изменение и его потомков на нового родителя."
  ar: "انقل تغييرًا وسلالته إلى أصل جديد."
  hi: "किसी परिवर्तन और उसके वंशजों को नए मूल पर ले जाएं।"
  bn: "একটি পরিবর্তন এবং এর ডিসেন্ড্যান্টগুলিকে একটি নতুন প্যারেন্টে সরান।"
  zh: "将某个更改及其后代移动到新的父级上。"
  ja: "変更とその子孫を新しい親へ移動します。"
menu.item.jj.undo.help:
  en: "Undo the most recent Jujutsu operation."
  es: "Deshace la operación de Jujutsu más reciente."
  fr: "Annule la dernière opération Jujutsu."
  de: "Macht die letzte Jujutsu-Operation rückgängig."
  cy: "Dadwneud gweithred Jujutsu ddiweddaraf."
  ga: "Cealaigh an oibríocht Jujutsu is déanaí."
  gd: "Neo-dhèan an obrachadh Jujutsu as ùire."
  pl: "Cofa ostatnią operację Jujutsu."
  pt: "Desfaz a operação Jujutsu mais recente."
  ru: "Отменяет последнюю операцию Jujutsu."
  ar: "تراجع عن أحدث عملية Jujutsu."
  hi: "सबसे हाल की Jujutsu कार्रवाई को पूर्ववत करें।"
  bn: "সাম্প্রতিকতম Jujutsu অপারেশন পূর্বাবস্থায় ফেরান।"
  zh: "撤销最近的一次 Jujutsu 操作。"
  ja: "直近の Jujutsu 操作を取り消します。"
menu.item.jj.git.help:
  en: "Open commands to fetch, push, and sync with Git remotes."
  es: "Abre comandos para obtener, enviar y sincronizar con remotos de Git."
  fr: "Ouvre les commandes pour récupérer, pousser et synchroniser avec les distants Git."
  de: "Öffnet Befehle zum Abrufen, Pushen und Synchronisieren mit Git-Remotes."
  cy: "Agor gorchmynion i nôl, gwthio a chydweddu â phellenigion Git."
  ga: "Oscail orduithe chun tarraingt, brú agus sioncronú le cianstórtha Git."
  gd: "Fosgail àitheantan gus tarraing, putadh agus sioncronachadh le cinn-chèin Git."
  pl: "Otwiera polecenia do pobierania, wypychania i synchronizacji ze zdalnymi Git."
  pt: "Abre comandos para buscar, enviar e sincronizar com remotos do Git."
  ru: "Открывает команды для получения, отправки и синхронизации с Git."
  ar: "افتح أوامر للجلب والدفع والمزامنة مع مستودعات Git البعيدة."
  hi: "Git रिमोट के साथ फ़ेच, पुश और सिंक करने के लिए कमांड खोलें।"
  bn: "Git রিমোটের সাথে ফেচ, পুশ এবং সিঙ্ক করার কমান্ড খুলুন।"
  zh: "打开用于与 Git 远程仓库拉取、推送和同步的命令。"
  ja: "Git リモートとのフェッチ、プッシュ、同期コマンドを開きます。"
menu.item.org.promote.help:
  en: "Promote the current heading to a higher outline level."
  es: "Promueve el encabezado actual a un nivel de esquema superior."
  fr: "Promeut le titre actuel à un niveau de plan supérieur."
  de: "Stuft die aktuelle Überschrift auf eine höhere Gliederungsebene hoch."
  cy: "Dyrchafu'r pennawd cyfredol i lefel amlinell uwch."
  ga: "Ardaigh an ceannteideal reatha go leibhéal imlíne níos airde."
  gd: "Àrdaich an ceann-sgrìobhaidh làithreach gu ìre-mhìneachaidh nas àirde."
  pl: "Awansuje bieżący nagłówek na wyższy poziom konspektu."
  pt: "Promove o cabeçalho atual para um nível de estrutura superior."
  ru: "Повышает текущий заголовок на более высокий уровень структуры."
  ar: "ارفع العنوان الحالي إلى مستوى مخطط أعلى."
  hi: "वर्तमान शीर्षक को उच्च रूपरेखा स्तर पर पदोन्नत करें।"
  bn: "বর্তমান শিরোনামটিকে উচ্চতর আউটলাইন স্তরে উন্নীত করুন।"
  zh: "将当前标题提升到更高的大纲级别。"
  ja: "現在の見出しを上位のアウトラインレベルに昇格します。"
menu.item.org.demote.help:
  en: "Demote the current heading to a lower outline level."
  es: "Degrada el encabezado actual a un nivel de esquema inferior."
  fr: "Rétrograde le titre actuel à un niveau de plan inférieur."
  de: "Stuft die aktuelle Überschrift auf eine tiefere Gliederungsebene herab."
  cy: "Israddio'r pennawd cyfredol i lefel amlinell is."
  ga: "Ísligh an ceannteideal reatha go leibhéal imlíne níos ísle."
  gd: "Ìslich an ceann-sgrìobhaidh làithreach gu ìre-mhìneachaidh nas ìsle."
  pl: "Degraduje bieżący nagłówek na niższy poziom konspektu."
  pt: "Rebaixa o cabeçalho atual para um nível de estrutura inferior."
  ru: "Понижает текущий заголовок на более низкий уровень структуры."
  ar: "اخفض العنوان الحالي إلى مستوى مخطط أدنى."
  hi: "वर्तमान शीर्षक को निम्न रूपरेखा स्तर पर पदावनत करें।"
  bn: "বর্তমান শিরোনামটিকে নিম্নতর আউটলাইন স্তরে নামিয়ে দিন।"
  zh: "将当前标题降级到更低的大纲级别。"
  ja: "現在の見出しを下位のアウトラインレベルに降格します。"
menu.item.org.move_up.help:
  en: "Move the current subtree up above its previous sibling."
  es: "Mueve el subárbol actual por encima de su hermano anterior."
  fr: "Déplace le sous-arbre actuel au-dessus de son frère précédent."
  de: "Verschiebt den aktuellen Teilbaum über sein vorheriges Geschwister."
  cy: "Symud yr is-goeden gyfredol uwchben ei brawd neu chwaer flaenorol."
  ga: "Bog an fochrann reatha suas os cionn a dheartháir roimhe."
  gd: "Gluais an fho-chraobh làithreach suas os cionn an t-seòrsa roimhe."
  pl: "Przenosi bieżące poddrzewo powyżej poprzedniego elementu równorzędnego."
  pt: "Move a subárvore atual para cima do seu irmão anterior."
  ru: "Перемещает текущее поддерево выше предыдущего соседнего."
  ar: "انقل الشجرة الفرعية الحالية لأعلى فوق شقيقها السابق."
  hi: "वर्तमान उपवृक्ष को उसके पिछले सहोदर के ऊपर ले जाएं।"
  bn: "বর্তমান সাবট্রিটিকে তার পূর্ববর্তী সিবলিংয়ের উপরে সরান।"
  zh: "将当前子树上移到其前一个同级之上。"
  ja: "現在のサブツリーを前の兄弟の上に移動します。"
menu.item.org.move_down.help:
  en: "Move the current subtree down below its next sibling."
  es: "Mueve el subárbol actual por debajo de su hermano siguiente."
  fr: "Déplace le sous-arbre actuel en dessous de son frère suivant."
  de: "Verschiebt den aktuellen Teilbaum unter sein nächstes Geschwister."
  cy: "Symud yr is-goeden gyfredol o dan ei brawd neu chwaer nesaf."
  ga: "Bog an fochrann reatha síos faoina dheartháir ina dhiaidh."
  gd: "Gluais an fho-chraobh làithreach sìos fon ath-sheòrsa."
  pl: "Przenosi bieżące poddrzewo poniżej następnego elementu równorzędnego."
  pt: "Move a subárvore atual para baixo do seu irmão seguinte."
  ru: "Перемещает текущее поддерево ниже следующего соседнего."
  ar: "انقل الشجرة الفرعية الحالية لأسفل تحت شقيقها التالي."
  hi: "वर्तमान उपवृक्ष को उसके अगले सहोदर के नीचे ले जाएं।"
  bn: "বর্তমান সাবট্রিটিকে তার পরবর্তী সিবলিংয়ের নিচে সরান।"
  zh: "将当前子树下移到其后一个同级之下。"
  ja: "現在のサブツリーを次の兄弟の下に移動します。"
menu.item.org.roam.dailies_today.help:
  en: "Open today's daily note in the Org-roam journal."
  es: "Abre la nota diaria de hoy en el diario de Org-roam."
  fr: "Ouvre la note quotidienne d'aujourd'hui dans le journal Org-roam."
  de: "Öffnet die heutige Tagesnotiz im Org-roam-Journal."
  cy: "Agor nodyn dyddiol heddiw yn nyddiadur Org-roam."
  ga: "Oscail nóta laethúil an lae inniu i ndialann Org-roam."
  gd: "Fosgail nòta làitheil an-diugh ann an leabhar-latha Org-roam."
  pl: "Otwiera dzisiejszą notatkę dzienną w dzienniku Org-roam."
  pt: "Abre a nota diária de hoje no diário do Org-roam."
  ru: "Открывает сегодняшнюю ежедневную заметку в журнале Org-roam."
  ar: "افتح ملاحظة اليوم اليومية في يوميات Org-roam."
  hi: "Org-roam जर्नल में आज का दैनिक नोट खोलें।"
  bn: "Org-roam জার্নালে আজকের দৈনিক নোট খুলুন।"
  zh: "在 Org-roam 日志中打开今天的每日笔记。"
  ja: "Org-roam ジャーナルで今日のデイリーノートを開きます。"
menu.item.org.roam.dailies_capture.help:
  en: "Capture a quick note into today's Org-roam daily entry."
  es: "Captura una nota rápida en la entrada diaria de hoy de Org-roam."
  fr: "Capture une note rapide dans l'entrée quotidienne Org-roam d'aujourd'hui."
  de: "Erfasst eine schnelle Notiz im heutigen Org-roam-Tageseintrag."
  cy: "Cipio nodyn cyflym i gofnod dyddiol Org-roam heddiw."
  ga: "Gabh nóta tapa isteach in iontráil laethúil Org-roam an lae inniu."
  gd: "Glac nòta luath a-steach do chlàr làitheil Org-roam an-diugh."
  pl: "Zapisuje szybką notatkę w dzisiejszym dziennym wpisie Org-roam."
  pt: "Captura uma nota rápida na entrada diária de hoje do Org-roam."
  ru: "Быстро записывает заметку в сегодняшнюю запись Org-roam."
  ar: "التقط ملاحظة سريعة في مدخل Org-roam اليومي لهذا اليوم."
  hi: "आज की Org-roam दैनिक प्रविष्टि में एक त्वरित नोट कैप्चर करें।"
  bn: "আজকের Org-roam দৈনিক এন্ট্রিতে একটি দ্রুত নোট ক্যাপচার করুন।"
  zh: "将快速笔记捕获到今天的 Org-roam 每日条目中。"
  ja: "今日の Org-roam デイリーエントリーにクイックノートを取り込みます。"
menu.item.org.roam.dailies_date.help:
  en: "Open the Org-roam daily note for a chosen date."
  es: "Abre la nota diaria de Org-roam de una fecha elegida."
  fr: "Ouvre la note quotidienne Org-roam pour une date choisie."
  de: "Öffnet die Org-roam-Tagesnotiz für ein gewähltes Datum."
  cy: "Agor nodyn dyddiol Org-roam ar gyfer dyddiad dewisedig."
  ga: "Oscail nóta laethúil Org-roam do dháta roghnaithe."
  gd: "Fosgail nòta làitheil Org-roam airson ceann-latha taghte."
