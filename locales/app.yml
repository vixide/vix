  ga: "Cruthaigh athrú folamh nua ar bharr an chinn reatha."
  gd: "Cruthaich atharrachadh falamh ùr air muin an fhir làithrich."
  pl: "Tworzy nową pustą zmianę na szczycie bieżącej."
  pt: "Cria uma nova alteração vazia sobre a atual."
  ru: "Создаёт новое пустое изменение поверх текущего."
