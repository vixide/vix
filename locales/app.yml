  hi: "किसी दूरस्थ Jujutsu रिपॉज़िटरी को नई स्थानीय निर्देशिका में क्लोन करें।"
  bn: "একটি রিমোট Jujutsu রিপোজিটরি নতুন স্থানীয় ডিরেক্টরিতে ক্লোন করুন।"
  zh: "将远程 Jujutsu 仓库克隆到新的本地目录。"
  ja: "リモートの Jujutsu リポジトリを新しいローカルディレクトリにクローンします。"
menu.item.jj.bookmark.help:
  en: "Open commands to create, move, and delete JJ bookmarks."
  es: "Abre comandos para crear, mover y eliminar marcadores de JJ."
  fr: "Ouvre les commandes pour créer, déplacer et supprimer des signets JJ."
  de: "Öffnet Befehle zum Erstellen, Verschieben und Löschen von JJ-Lesezeichen."
  cy: "Agor gorchmynion i greu, symud a dileu nodau tudalen JJ."
  ga: "Oscail orduithe chun leabharmharcanna JJ a chruthú, a bhogadh agus a scriosadh."
  gd: "Fosgail àitheantan gus comharran-lìn JJ a chruthachadh, a ghluasad agus a sguabadh às."
  pl: "Otwiera polecenia do tworzenia, przenoszenia i usuwania zakładek JJ."
  pt: "Abre comandos para criar, mover e excluir marcadores do JJ."
  ru: "Открывает команды для создания, перемещения и удаления закладок JJ."
  ar: "افتح أوامر لإنشاء علامات JJ المرجعية ونقلها وحذفها."
  hi: "JJ बुकमार्क बनाने, स्थानांतरित करने और हटाने के लिए कमांड खोलें।"
  bn: "JJ বুকমার্ক তৈরি, সরানো এবং মুছে ফেলার কমান্ড খুলুন।"
  zh: "打开用于创建、移动和删除 JJ 书签的命令。"
  ja: "JJ ブックマークの作成、移動、削除コマンドを開きます。"
menu.item.jj.status.help:
  en: "Show the status of the working copy and current change."
  es: "Muestra el estado de la copia de trabajo y el cambio actual."
  fr: "Affiche l'état de la copie de travail et du changement actuel."
  de: "Zeigt den Status der Arbeitskopie und der aktuellen Änderung an."
  cy: "Dangos statws y copi gwaith a'r newid cyfredol."
  ga: "Taispeáin stádas an chóip oibre agus an athrú reatha."
  gd: "Seall staid an lethbhric-obrach agus an atharrachaidh làithrich."
  pl: "Wyświetla stan kopii roboczej i bieżącej zmiany."
  pt: "Mostra o status da cópia de trabalho e da alteração atual."
  ru: "Показывает состояние рабочей копии и текущего изменения."
  ar: "اعرض حالة نسخة العمل والتغيير الحالي."
  hi: "कार्यशील प्रति और वर्तमान परिवर्तन की स्थिति दिखाएं।"
  bn: "ওয়ার্কিং কপি এবং বর্তমান পরিবর্তনের অবস্থা দেখান।"
  zh: "显示工作副本和当前更改的状态。"
  ja: "作業コピーと現在の変更の状態を表示します。"
menu.item.jj.diff.help:
  en: "Show changes in the working copy compared to its parent."
  es: "Muestra los cambios en la copia de trabajo respecto a su padre."
  fr: "Affiche les modifications de la copie de travail par rapport à son parent."
  de: "Zeigt die Änderungen der Arbeitskopie gegenüber ihrem Elternteil an."
  cy: "Dangos y newidiadau yn y copi gwaith o'i gymharu â'i riant."
  ga: "Taispeáin na hathruithe sa chóip oibre i gcomparáid lena thuismitheoir."
  gd: "Seall na h-atharraichean san lethbhreac-obrach an coimeas ris a' phàrant aige."
  pl: "Wyświetla zmiany w kopii roboczej względem jej rodzica."
  pt: "Mostra as alterações na cópia de trabalho em relação ao seu pai."
  ru: "Показывает изменения в рабочей копии относительно её родителя."
  ar: "اعرض التغييرات في نسخة العمل مقارنة بأصلها."
  hi: "मूल की तुलना में कार्यशील प्रति में परिवर्तन दिखाएं।"
  bn: "প্যারেন্টের তুলনায় ওয়ার্কিং কপির পরিবর্তনগুলি দেখান।"
