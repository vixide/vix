  ga: "Taispeáin na glaoiteoirí ar an tsiombail faoin gcúrsóir."
  gd: "Seall na gairmearan air an t-samhla fon chùrsair."
  pl: "Pokazuje wywołujących symbol pod kursorem."
  pt: "Mostra quem chama o símbolo sob o cursor."
  ru: "Показывает вызывающих символ под курсором."
  ar: "يعرض من يستدعي الرمز الموجود تحت المؤشر."
  hi: "कर्सर के नीचे मौजूद प्रतीक को कॉल करने वालों को दिखाएँ।"
  bn: "কার্সরের নিচের সিম্বলকে যারা কল করে তাদের দেখান।"
  zh: "显示光标处符号的调用者。"
  ja: "カーソル位置のシンボルの呼び出し元を表示します。"
menu.item.lsp.rename.help:
  en: "Rename the symbol under the cursor across the project."
  es: "Renombra el símbolo bajo el cursor en todo el proyecto."
  fr: "Renomme le symbole sous le curseur dans tout le projet."
  de: "Benennt das Symbol unter dem Cursor im ganzen Projekt um."
  cy: "Ailenwi'r symbol o dan y cyrchwr ar draws y project."
  ga: "Athainmnigh an tsiombail faoin gcúrsóir ar fud an tionscadail."
  gd: "Ath-ainmich an samhla fon chùrsair air feadh a' phròiseict."
  pl: "Zmienia nazwę symbolu pod kursorem w całym projekcie."
  pt: "Renomeia o símbolo sob o cursor em todo o projeto."
  ru: "Переименовывает символ под курсором во всём проекте."
  ar: "يعيد تسمية الرمز الموجود تحت المؤشر في المشروع كله."
  hi: "कर्सर के नीचे मौजूद प्रतीक का नाम पूरे प्रोजेक्ट में बदलें।"
  bn: "কার্সরের নিচের সিম্বলের নাম পুরো প্রজেক্ট জুড়ে পরিবর্তন করুন।"
  zh: "在整个项目中重命名光标处的符号。"
  ja: "カーソル位置のシンボルをプロジェクト全体で名前変更します。"
menu.item.lsp.linked_edit.help:
  en: "Edit all linked ranges of the symbol at once."
  es: "Edita a la vez todos los rangos vinculados del símbolo."
  fr: "Modifie d'un coup toutes les plages liées du symbole."
  de: "Bearbeitet alle verknüpften Bereiche des Symbols gleichzeitig."
  cy: "Golygu pob amrediad cysylltiedig y symbol ar unwaith."
  ga: "Cuir in eagar gach raon nasctha den tsiombail san am céanna."
  gd: "Deasaich a h-uile raon ceangailte den t-samhla aig an aon àm."
  pl: "Edytuje jednocześnie wszystkie powiązane zakresy symbolu."
  pt: "Edita de uma vez todos os intervalos vinculados do símbolo."
  ru: "Редактирует все связанные диапазоны символа одновременно."
  ar: "يحرّر جميع النطاقات المرتبطة بالرمز دفعة واحدة."
  hi: "प्रतीक की सभी जुड़ी हुई श्रेणियों को एक साथ संपादित करें।"
  bn: "সিম্বলের সব লিঙ্কড রেঞ্জ একসাথে সম্পাদনা করুন।"
  zh: "同时编辑符号的所有关联范围。"
  ja: "シンボルのリンクされたすべての範囲を一度に編集します。"
menu.item.lsp.code_action.help:
  en: "Show available code actions and quick fixes at the cursor."
  es: "Muestra las acciones de código y correcciones rápidas en el cursor."
  fr: "Affiche les actions de code et correctifs rapides au curseur."
  de: "Zeigt verfügbare Codeaktionen und Schnellkorrekturen am Cursor."
  cy: "Dangos gweithredoedd cod a chywiriadau cyflym wrth y cyrchwr."
  ga: "Taispeáin gníomhartha cóid agus mearcheartúcháin ag an gcúrsóir."
  gd: "Seall gnìomhan còd is grad-chàraidhean aig a' chùrsair."
  pl: "Pokazuje dostępne akcje kodu i szybkie poprawki w miejscu kursora."
  pt: "Mostra ações de código e correções rápidas disponíveis no cursor."
  ru: "Показывает доступные действия с кодом и быстрые исправления у курсора."
  ar: "يعرض إجراءات الكود والإصلاحات السريعة المتاحة عند المؤشر."
  hi: "कर्सर पर उपलब्ध कोड क्रियाएँ और त्वरित सुधार दिखाएँ।"
  bn: "কার্সরে উপলব্ধ কোড অ্যাকশন ও দ্রুত সংশোধন দেখান।"
  zh: "显示光标处可用的代码操作和快速修复。"
  ja: "カーソル位置で利用できるコードアクションとクイックフィックスを表示します。"
menu.item.lsp.code_lens.help:
  en: "Show and run code lens actions for the current document."
  es: "Muestra y ejecuta acciones de code lens del documento actual."
  fr: "Affiche et exécute les actions code lens du document actuel."
  de: "Zeigt und führt Code-Lens-Aktionen für das aktuelle Dokument aus."
  cy: "Dangos a rhedeg gweithredoedd code lens ar gyfer y ddogfen gyfredol."
  ga: "Taispeáin agus rith gníomhartha code lens don doiciméad reatha."
  gd: "Seall is ruith gnìomhan code lens airson na sgrìobhainn làithreach."
  pl: "Pokazuje i uruchamia akcje code lens dla bieżącego dokumentu."
  pt: "Mostra e executa ações de code lens do documento atual."
  ru: "Показывает и запускает действия code lens для текущего документа."
  ar: "يعرض وينفّذ إجراءات code lens للمستند الحالي."
  hi: "वर्तमान दस्तावेज़ के लिए code lens क्रियाएँ दिखाएँ और चलाएँ।"
  bn: "বর্তমান ডকুমেন্টের code lens অ্যাকশন দেখান ও চালান।"
  zh: "显示并运行当前文档的 code lens 操作。"
  ja: "現在のドキュメントの code lens アクションを表示して実行します。"
menu.item.lsp.highlight.help:
  en: "Highlight all occurrences of the symbol under the cursor."
  es: "Resalta todas las apariciones del símbolo bajo el cursor."
  fr: "Met en surbrillance toutes les occurrences du symbole sous le curseur."
  de: "Hebt alle Vorkommen des Symbols unter dem Cursor hervor."
  cy: "Amlygu pob achos o'r symbol o dan y cyrchwr."
  ga: "Aibhsigh gach ásc den tsiombail faoin gcúrsóir."
  gd: "Soillsich a h-uile tachartas den t-samhla fon chùrsair."
  pl: "Podświetla wszystkie wystąpienia symbolu pod kursorem."
  pt: "Realça todas as ocorrências do símbolo sob o cursor."
  ru: "Подсвечивает все вхождения символа под курсором."
  ar: "يبرز جميع مواضع ظهور الرمز الموجود تحت المؤشر."
  hi: "कर्सर के नीचे मौजूद प्रतीक की सभी उपस्थितियाँ हाइलाइट करें।"
  bn: "কার্সরের নিচের সিম্বলের সব উপস্থিতি হাইলাইট করুন।"
  zh: "高亮显示光标处符号的所有出现位置。"
  ja: "カーソル位置のシンボルのすべての出現箇所を強調表示します。"
menu.item.lsp.expand_selection.help:
  en: "Grow the selection to the next larger syntax range."
  es: "Amplía la selección al siguiente rango de sintaxis mayor."
  fr: "Étend la sélection à la plage de syntaxe supérieure suivante."
  de: "Erweitert die Auswahl auf den nächstgrößeren Syntaxbereich."
  cy: "Ehangu'r dewisiad i'r amrediad cystrawen mwy nesaf."
  ga: "Fairsingigh an roghnú go dtí an chéad raon comhréire níos mó."
  gd: "Leudaich an taghadh gun ath raon co-chàraidh nas motha."
  pl: "Powiększa zaznaczenie do następnego większego zakresu składni."
  pt: "Amplia a seleção para o próximo intervalo de sintaxe maior."
  ru: "Расширяет выделение до следующего большего синтаксического диапазона."
  ar: "يوسّع التحديد إلى نطاق الصياغة الأكبر التالي."
  hi: "चयन को अगली बड़ी सिंटैक्स श्रेणी तक बढ़ाएँ।"
  bn: "নির্বাচনকে পরবর্তী বড় সিনট্যাক্স রেঞ্জ পর্যন্ত বাড়ান।"
  zh: "将选区扩展到下一个更大的语法范围。"
  ja: "選択範囲を次に大きい構文範囲へ広げます。"
menu.item.lsp.shrink_selection.help:
  en: "Shrink the selection to the next smaller syntax range."
  es: "Reduce la selección al siguiente rango de sintaxis menor."
  fr: "Réduit la sélection à la plage de syntaxe inférieure suivante."
  de: "Verkleinert die Auswahl auf den nächstkleineren Syntaxbereich."
  cy: "Lleihau'r dewisiad i'r amrediad cystrawen llai nesaf."
  ga: "Laghdaigh an roghnú go dtí an chéad raon comhréire níos lú."
  gd: "Lùghdaich an taghadh gun ath raon co-chàraidh nas lugha."
  pl: "Zmniejsza zaznaczenie do następnego mniejszego zakresu składni."
  pt: "Reduz a seleção para o próximo intervalo de sintaxe menor."
  ru: "Сужает выделение до следующего меньшего синтаксического диапазона."
  ar: "يقلّص التحديد إلى نطاق الصياغة الأصغر التالي."
  hi: "चयन को अगली छोटी सिंटैक्स श्रेणी तक घटाएँ।"
  bn: "নির্বাচনকে পরবর্তী ছোট সিনট্যাক্স রেঞ্জ পর্যন্ত কমান।"
  zh: "将选区收缩到下一个更小的语法范围。"
  ja: "選択範囲を次に小さい構文範囲へ狭めます。"
menu.item.lsp.format.help:
  en: "Reformat the whole document using the language formatter."
  es: "Reformatea todo el documento con el formateador del lenguaje."
  fr: "Reformate tout le document avec le formateur du langage."
  de: "Formatiert das gesamte Dokument mit dem Sprach-Formatierer neu."
  cy: "Ailfformatio'r ddogfen gyfan gan ddefnyddio fformatiwr yr iaith."
  ga: "Athfhormáidigh an doiciméad iomlán leis an bhformáiditheoir teanga."
  gd: "Ath-fhòrmataich an sgrìobhainn gu lèir leis an fhòrmatair cànain."
  pl: "Formatuje ponownie cały dokument za pomocą formatera języka."
  pt: "Reformata todo o documento usando o formatador da linguagem."
  ru: "Переформатирует весь документ с помощью форматтера языка."
  ar: "يعيد تنسيق المستند بالكامل باستخدام مُنسّق اللغة."
  hi: "भाषा फ़ॉर्मैटर से पूरे दस्तावेज़ को पुनः फ़ॉर्मैट करें।"
  bn: "ভাষার ফরম্যাটার দিয়ে পুরো ডকুমেন্ট পুনরায় ফরম্যাট করুন।"
  zh: "使用语言格式化工具重新格式化整个文档。"
  ja: "言語のフォーマッタでドキュメント全体を整形し直します。"
menu.item.lsp.hover.help:
  en: "Show documentation and type info for the symbol under the cursor."
  es: "Muestra la documentación y el tipo del símbolo bajo el cursor."
  fr: "Affiche la documentation et le type du symbole sous le curseur."
  de: "Zeigt Dokumentation und Typinfo für das Symbol unter dem Cursor."
  cy: "Dangos dogfennaeth a gwybodaeth math y symbol o dan y cyrchwr."
  ga: "Taispeáin doiciméadú agus eolas cineáil na siombaile faoin gcúrsóir."
  gd: "Seall docamaideadh is fiosrachadh seòrsa an t-samhla fon chùrsair."
  pl: "Pokazuje dokumentację i typ symbolu pod kursorem."
  pt: "Mostra a documentação e o tipo do símbolo sob o cursor."
  ru: "Показывает документацию и тип символа под курсором."
  ar: "يعرض التوثيق ومعلومات نوع الرمز الموجود تحت المؤشر."
  hi: "कर्सर के नीचे मौजूद प्रतीक का दस्तावेज़ और टाइप जानकारी दिखाएँ।"
  bn: "কার্সরের নিচের সিম্বলের ডকুমেন্টেশন ও টাইপ তথ্য দেখান।"
  zh: "显示光标处符号的文档和类型信息。"
  ja: "カーソル位置のシンボルのドキュメントと型情報を表示します。"
menu.item.lsp.signature_help.help:
  en: "Show parameter hints for the current function call."
  es: "Muestra las sugerencias de parámetros de la llamada de función actual."
  fr: "Affiche les indications de paramètres de l'appel de fonction actuel."
  de: "Zeigt Parameterhinweise für den aktuellen Funktionsaufruf."
  cy: "Dangos awgrymiadau paramedr ar gyfer yr alwad ffwythiant gyfredol."
  ga: "Taispeáin leideanna paraiméadar don ghlao feidhme reatha."
  gd: "Seall oidhirpean paramadair airson a' ghairm foincsein làithreach."
  pl: "Pokazuje podpowiedzi parametrów dla bieżącego wywołania funkcji."
  pt: "Mostra dicas de parâmetros da chamada de função atual."
  ru: "Показывает подсказки параметров для текущего вызова функции."
  ar: "يعرض تلميحات المعاملات لاستدعاء الدالة الحالي."
  hi: "वर्तमान फ़ंक्शन कॉल के लिए पैरामीटर संकेत दिखाएँ।"
  bn: "বর্তমান ফাংশন কলের জন্য প্যারামিটার ইঙ্গিত দেখান।"
  zh: "显示当前函数调用的参数提示。"
  ja: "現在の関数呼び出しのパラメータヒントを表示します。"
menu.item.lsp.complete.help:
  en: "Trigger code completion suggestions at the cursor."
  es: "Activa las sugerencias de autocompletado en el cursor."
  fr: "Déclenche les suggestions de complétion de code au curseur."
  de: "Löst Codevervollständigungsvorschläge am Cursor aus."
  cy: "Sbarduno awgrymiadau cwblhau cod wrth y cyrchwr."
  ga: "Spreag moltaí comhlánaithe cóid ag an gcúrsóir."
  gd: "Brosnaich molaidhean coileanadh còd aig a' chùrsair."
  pl: "Wyzwala podpowiedzi uzupełniania kodu w miejscu kursora."
  pt: "Aciona sugestões de conclusão de código no cursor."
  ru: "Вызывает предложения автодополнения кода у курсора."
  ar: "يشغّل اقتراحات إكمال الكود عند المؤشر."
  hi: "कर्सर पर कोड पूर्णता सुझाव सक्रिय करें।"
  bn: "কার্সরে কোড সম্পূর্ণকরণ পরামর্শ চালু করুন।"
  zh: "在光标处触发代码补全建议。"
  ja: "カーソル位置でコード補完候補を表示します。"
menu.item.lsp.document_symbols.help:
  en: "Jump to a symbol in the current document."
  es: "Salta a un símbolo del documento actual."
  fr: "Saute à un symbole du document actuel."
  de: "Springt zu einem Symbol im aktuellen Dokument."
  cy: "Neidio i symbol yn y ddogfen gyfredol."
  ga: "Léim go siombail sa doiciméad reatha."
  gd: "Leum gu samhla san sgrìobhainn làithreach."
  pl: "Przechodzi do symbolu w bieżącym dokumencie."
  pt: "Salta para um símbolo no documento atual."
  ru: "Переходит к символу в текущем документе."
  ar: "ينتقل إلى رمز في المستند الحالي."
  hi: "वर्तमान दस्तावेज़ में किसी प्रतीक पर जाएँ।"
  bn: "বর্তমান ডকুমেন্টের কোনো সিম্বলে যান।"
  zh: "跳转到当前文档中的某个符号。"
  ja: "現在のドキュメント内のシンボルへ移動します。"
menu.item.lsp.workspace_symbols.help:
  en: "Search for a symbol across the whole workspace."
  es: "Busca un símbolo en todo el espacio de trabajo."
  fr: "Recherche un symbole dans tout l'espace de travail."
  de: "Sucht ein Symbol im gesamten Arbeitsbereich."
  cy: "Chwilio am symbol ar draws y gweithle cyfan."
  ga: "Cuardaigh siombail ar fud an spáis oibre iomláin."
  gd: "Lorg samhla air feadh an àite-obrach gu lèir."
  pl: "Wyszukuje symbol w całym obszarze roboczym."
  pt: "Procura um símbolo em todo o espaço de trabalho."
  ru: "Ищет символ во всём рабочем пространстве."
  ar: "يبحث عن رمز في مساحة العمل بأكملها."
  hi: "पूरे कार्यक्षेत्र में किसी प्रतीक को खोजें।"
  bn: "পুরো ওয়ার্কস্পেস জুড়ে কোনো সিম্বল খুঁজুন।"
  zh: "在整个工作区中搜索某个符号。"
  ja: "ワークスペース全体からシンボルを検索します。"
menu.item.lsp.diagnostics.help:
  en: "Show LSP errors and warnings for the current code."
  es: "Muestra los errores y advertencias de LSP del código actual."
  fr: "Affiche les erreurs et avertissements LSP du code actuel."
  de: "Zeigt LSP-Fehler und -Warnungen für den aktuellen Code an."
  cy: "Dangos gwallau a rhybuddion LSP ar gyfer y cod cyfredol."
  ga: "Taispeáin earráidí agus rabhaidh LSP don chód reatha."
  gd: "Seall mearachdan is rabhaidhean LSP airson a' chòd làithreach."
  pl: "Pokazuje błędy i ostrzeżenia LSP dla bieżącego kodu."
  pt: "Mostra os erros e avisos do LSP para o código atual."
  ru: "Показать ошибки и предупреждения LSP для текущего кода."
  ar: "عرض أخطاء وتحذيرات LSP للكود الحالي."
  hi: "वर्तमान कोड के लिए LSP त्रुटियाँ और चेतावनियाँ दिखाएँ।"
  bn: "বর্তমান কোডের জন্য LSP ত্রুটি ও সতর্কতা দেখান।"
  zh: "显示当前代码的 LSP 错误和警告。"
  ja: "現在のコードの LSP エラーと警告を表示します。"
menu.item.ai.chat.help:
  en: "Open an AI chat to ask questions about your code."
  es: "Abre un chat de IA para hacer preguntas sobre tu código."
  fr: "Ouvre un chat IA pour poser des questions sur votre code."
  de: "Öffnet einen KI-Chat für Fragen zu Ihrem Code."
  cy: "Agor sgwrs AI i ofyn cwestiynau am eich cod."
  ga: "Oscail comhrá AI chun ceisteanna a chur faoi do chód."
  gd: "Fosgail còmhradh AI gus ceistean fhaighneachd mun chòd agad."
  pl: "Otwiera czat AI, aby zadawać pytania o Twój kod."
  pt: "Abre um chat de IA para fazer perguntas sobre o seu código."
  ru: "Открыть чат с ИИ для вопросов о вашем коде."
  ar: "افتح محادثة ذكاء اصطناعي لطرح أسئلة حول شيفرتك."
  hi: "अपने कोड के बारे में प्रश्न पूछने हेतु AI चैट खोलें।"
  bn: "আপনার কোড সম্পর্কে প্রশ্ন করতে একটি AI চ্যাট খুলুন।"
  zh: "打开 AI 聊天，就你的代码提问。"
  ja: "コードについて質問できる AI チャットを開きます。"
menu.item.ai.summarize.help:
  en: "Summarize the selected text with AI."
