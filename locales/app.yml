  ga: "Scoránaigh nótaí tráchta ar na línte roghnaithe."
  gd: "Toglaich beachdan air na loidhnichean taghte."
  pl: "Przełącz komentarze w zaznaczonych wierszach."
  pt: "Alterna os comentários nas linhas selecionadas."
  ru: "Переключить комментирование выделенных строк."
