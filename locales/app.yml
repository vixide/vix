menu.go.matching_tag.help:
  en: "Jump to the tag matching the one under the cursor."
  es: "Salta a la etiqueta que coincide con la que está bajo el cursor."
  fr: "Aller à la balise correspondant à celle sous le curseur."
  de: "Zum passenden Tag des Tags unter dem Cursor springen."
  cy: "Neidio i'r tag sy'n cyfateb i'r un o dan y cyrchwr."
  ga: "Léim chuig an gclib a mheaitseálann leis an gceann faoin gcúrsóir."
  gd: "Leum chun an taga a fhreagras ris an fhear fon chùrsair."
  pl: "Przejdź do znacznika pasującego do tego pod kursorem."
  pt: "Ir para a tag correspondente à que está sob o cursor."
  ru: "Перейти к тегу, парному тегу под курсором."
  ar: "الانتقال إلى الوسم المطابق للوسم الموجود أسفل المؤشر."
  hi: "कर्सर के नीचे वाले टैग से मेल खाते टैग पर जाएँ।"
  bn: "কার্সারের নিচের ট্যাগের সাথে মিলে যাওয়া ট্যাগে যান।"
  zh: "跳转到与光标下标签匹配的标签。"
  ja: "カーソル位置のタグに対応するタグに移動します。"
menu.go.percent.help:
  en: "Jump to a position by percentage through the file."
  es: "Salta a una posición según un porcentaje del archivo."
  fr: "Aller à une position selon un pourcentage du fichier."
  de: "Zu einer Position nach Prozentanteil der Datei springen."
  cy: "Neidio i safle yn ôl canran drwy'r ffeil."
  ga: "Léim chuig suíomh de réir céatadáin tríd an gcomhad."
  gd: "Leum gu ionad a rèir ceudad tron fhaidhle."
  pl: "Przejdź do pozycji według procentu pliku."
  pt: "Ir para uma posição por porcentagem do arquivo."
  ru: "Перейти к позиции по проценту от файла."
  ar: "الانتقال إلى موضع بحسب نسبة مئوية من الملف."
  hi: "फ़ाइल में प्रतिशत के अनुसार किसी स्थान पर जाएँ।"
  bn: "ফাইলের শতাংশ অনুসারে কোনো অবস্থানে যান।"
  zh: "按文件百分比跳转到某个位置。"
  ja: "ファイル内の割合を指定して位置に移動します。"
menu.go.byte.help:
  en: "Jump to a specific byte offset in the file."
  es: "Salta a un desplazamiento de bytes específico del archivo."
  fr: "Aller à un décalage d'octet précis dans le fichier."
  de: "Zu einem bestimmten Byte-Offset in der Datei springen."
  cy: "Neidio i offset beit penodol yn y ffeil."
  ga: "Léim chuig fritháireamh beart ar leith sa chomhad."
  gd: "Leum gu offset baidht sònraichte san fhaidhle."
  pl: "Przejdź do określonego przesunięcia bajtowego w pliku."
  pt: "Ir para um deslocamento de byte específico no arquivo."
  ru: "Перейти к определённому байтовому смещению в файле."
  ar: "الانتقال إلى إزاحة بايت محددة في الملف."
  hi: "फ़ाइल में किसी विशिष्ट बाइट ऑफ़सेट पर जाएँ।"
  bn: "ফাইলের নির্দিষ্ট বাইট অফসেটে যান।"
  zh: "跳转到文件中的指定字节偏移。"
  ja: "ファイル内の指定したバイト位置に移動します。"
menu.item.edit.move_up.help:
  en: "Move the current line up above the previous line."
  es: "Mueve la línea actual por encima de la anterior."
  fr: "Déplacer la ligne actuelle au-dessus de la précédente."
  de: "Aktuelle Zeile über die vorherige Zeile verschieben."
  cy: "Symud y llinell gyfredol uwchben y llinell flaenorol."
  ga: "Bog an líne reatha os cionn na líne roimhe."
  gd: "Gluais an loidhne làithreach os cionn na loidhne roimhe."
  pl: "Przenieś bieżący wiersz nad poprzedni."
  pt: "Mover a linha atual acima da linha anterior."
  ru: "Переместить текущую строку выше предыдущей."
  ar: "نقل السطر الحالي إلى أعلى السطر السابق."
  hi: "वर्तमान पंक्ति को पिछली पंक्ति के ऊपर ले जाएँ।"
  bn: "বর্তমান লাইনটি আগের লাইনের উপরে সরান।"
  zh: "将当前行上移到上一行之上。"
  ja: "現在の行を前の行より上に移動します。"
menu.item.edit.move_down.help:
  en: "Move the current line down below the next line."
  es: "Mueve la línea actual por debajo de la siguiente."
  fr: "Déplacer la ligne actuelle sous la suivante."
  de: "Aktuelle Zeile unter die nächste Zeile verschieben."
  cy: "Symud y llinell gyfredol o dan y llinell nesaf."
  ga: "Bog an líne reatha faoin gcéad líne eile."
  gd: "Gluais an loidhne làithreach fon ath loidhne."
  pl: "Przenieś bieżący wiersz pod następny."
  pt: "Mover a linha atual abaixo da próxima linha."
  ru: "Переместить текущую строку ниже следующей."
  ar: "نقل السطر الحالي إلى أسفل السطر التالي."
  hi: "वर्तमान पंक्ति को अगली पंक्ति के नीचे ले जाएँ।"
  bn: "বর্তমান লাইনটি পরের লাইনের নিচে সরান।"
  zh: "将当前行下移到下一行之下。"
  ja: "現在の行を次の行より下に移動します。"
menu.item.edit.duplicate.help:
  en: "Duplicate the current line below itself."
  es: "Duplica la línea actual justo debajo."
  fr: "Dupliquer la ligne actuelle juste en dessous."
  de: "Aktuelle Zeile darunter duplizieren."
  cy: "Dyblygu'r llinell gyfredol oddi tani."
  ga: "Cóipeáil an líne reatha díreach faoina bun."
  gd: "Dùblaich an loidhne làithreach foidhpe."
  pl: "Powiel bieżący wiersz poniżej."
  pt: "Duplicar a linha atual logo abaixo."
  ru: "Продублировать текущую строку под ней."
  ar: "تكرار السطر الحالي أسفله."
  hi: "वर्तमान पंक्ति को उसके नीचे डुप्लिकेट करें।"
  bn: "বর্তমান লাইনটি তার নিচে ডুপ্লিকেট করুন।"
  zh: "在当前行下方复制该行。"
  ja: "現在の行をその下に複製します。"
menu.item.edit.join.help:
  en: "Join the selected lines into a single line."
  es: "Une las líneas seleccionadas en una sola línea."
  fr: "Fusionner les lignes sélectionnées en une seule ligne."
  de: "Ausgewählte Zeilen zu einer einzigen Zeile zusammenführen."
  cy: "Uno'r llinellau a ddewiswyd yn un llinell."
  ga: "Ceangail na línte roghnaithe in aon líne amháin."
  gd: "Ceangail na loidhnichean taghte na aon loidhne."
  pl: "Połącz zaznaczone wiersze w jeden wiersz."
  pt: "Juntar as linhas selecionadas em uma única linha."
  ru: "Объединить выделенные строки в одну строку."
  ar: "دمج الأسطر المحددة في سطر واحد."
  hi: "चयनित पंक्तियों को एक ही पंक्ति में जोड़ें।"
  bn: "নির্বাচিত লাইনগুলি একটি লাইনে যুক্ত করুন।"
  zh: "将选中的行合并为一行。"
  ja: "選択した行を一行に結合します。"
menu.item.edit.sort.help:
  en: "Sort the selected lines alphabetically."
  es: "Ordena alfabéticamente las líneas seleccionadas."
  fr: "Trier les lignes sélectionnées par ordre alphabétique."
  de: "Ausgewählte Zeilen alphabetisch sortieren."
  cy: "Trefnu'r llinellau a ddewiswyd yn nhrefn yr wyddor."
  ga: "Sórtáil na línte roghnaithe in ord aibítre."
  gd: "Seòrsaich na loidhnichean taghte a rèir na h-aibidil."
  pl: "Posortuj zaznaczone wiersze alfabetycznie."
  pt: "Ordenar as linhas selecionadas em ordem alfabética."
  ru: "Отсортировать выделенные строки по алфавиту."
  ar: "فرز الأسطر المحددة أبجديًا."
  hi: "चयनित पंक्तियों को वर्णानुक्रम में क्रमबद्ध करें।"
  bn: "নির্বাচিত লাইনগুলি বর্ণানুক্রমে সাজান।"
  zh: "按字母顺序排序选中的行。"
  ja: "選択した行をアルファベット順に並べ替えます。"
menu.item.edit.sort_unique.help:
  en: "Sort selected lines and remove duplicates."
  es: "Ordena las líneas seleccionadas y elimina duplicados."
  fr: "Trier les lignes sélectionnées et supprimer les doublons."
  de: "Ausgewählte Zeilen sortieren und Duplikate entfernen."
  cy: "Trefnu'r llinellau a ddewiswyd a dileu dyblygiadau."
  ga: "Sórtáil na línte roghnaithe agus bain macasamhla."
  gd: "Seòrsaich na loidhnichean taghte is thoir air falbh dùblachaidhean."
  pl: "Posortuj zaznaczone wiersze i usuń duplikaty."
  pt: "Ordenar as linhas selecionadas e remover duplicatas."
  ru: "Отсортировать выделенные строки и удалить дубликаты."
  ar: "فرز الأسطر المحددة وإزالة التكرارات."
  hi: "चयनित पंक्तियों को क्रमबद्ध करें और डुप्लिकेट हटाएँ।"
  bn: "নির্বাচিত লাইনগুলি সাজান ও ডুপ্লিকেট মুছুন।"
  zh: "排序选中的行并删除重复项。"
  ja: "選択した行を並べ替えて重複を削除します。"
menu.item.edit.shuffle.help:
  en: "Randomly reorder the selected lines."
  es: "Reordena aleatoriamente las líneas seleccionadas."
  fr: "Réorganiser aléatoirement les lignes sélectionnées."
  de: "Ausgewählte Zeilen zufällig neu anordnen."
  cy: "Aildrefnu'r llinellau a ddewiswyd ar hap."
  ga: "Athordaigh na línte roghnaithe go randamach."
  gd: "Ath-òrdaich na loidhnichean taghte gu tuaireamach."
  pl: "Losowo zmień kolejność zaznaczonych wierszy."
  pt: "Reordenar aleatoriamente as linhas selecionadas."
  ru: "Случайно переупорядочить выделенные строки."
  ar: "إعادة ترتيب الأسطر المحددة عشوائيًا."
  hi: "चयनित पंक्तियों को यादृच्छिक रूप से पुनः क्रमित करें।"
  bn: "নির্বাচিত লাইনগুলি এলোমেলোভাবে পুনর্বিন্যাস করুন।"
  zh: "随机重新排列选中的行。"
  ja: "選択した行をランダムに並べ替えます。"
menu.item.edit.reverse.help:
  en: "Reverse the order of the selected lines."
  es: "Invierte el orden de las líneas seleccionadas."
  fr: "Inverse l'ordre des lignes sélectionnées."
  de: "Kehrt die Reihenfolge der ausgewählten Zeilen um."
  cy: "Gwrthdroi trefn y llinellau a ddewiswyd."
  ga: "Aisiompaigh ord na línte roghnaithe."
  gd: "Cuir air ais òrdugh nan loidhnichean a thagh thu."
  pl: "Odwraca kolejność zaznaczonych wierszy."
  pt: "Inverte a ordem das linhas selecionadas."
  ru: "Меняет порядок выделенных строк на обратный."
  ar: "يعكس ترتيب الأسطر المحددة."
  hi: "चयनित पंक्तियों का क्रम उलट देता है।"
  bn: "নির্বাচিত লাইনগুলির ক্রম উল্টে দেয়।"
  zh: "反转所选行的顺序。"
  ja: "選択した行の順序を反転します。"
menu.item.edit.dedupe.help:
  en: "Remove duplicate lines from the selection."
  es: "Elimina las líneas duplicadas de la selección."
  fr: "Supprime les lignes en double de la sélection."
  de: "Entfernt doppelte Zeilen aus der Auswahl."
  cy: "Dileu llinellau dyblyg o'r dewis."
  ga: "Bain línte dúblacha as an roghnúchán."
  gd: "Thoir air falbh loidhnichean dùblaichte bhon taghadh."
  pl: "Usuwa zduplikowane wiersze z zaznaczenia."
  pt: "Remove as linhas duplicadas da seleção."
  ru: "Удаляет повторяющиеся строки из выделения."
  ar: "يزيل الأسطر المكررة من التحديد."
  hi: "चयन से डुप्लिकेट पंक्तियाँ हटाता है।"
  bn: "নির্বাচন থেকে সদৃশ লাইনগুলি সরিয়ে দেয়।"
  zh: "从所选内容中删除重复行。"
  ja: "選択範囲から重複した行を削除します。"
menu.item.edit.squeeze_blank_lines.help:
  en: "Collapse consecutive blank lines into a single one."
  es: "Reduce las líneas en blanco consecutivas a una sola."
  fr: "Réduit les lignes vides consécutives à une seule."
  de: "Fasst aufeinanderfolgende Leerzeilen zu einer zusammen."
  cy: "Cyfuno llinellau gwag olynol yn un."
  ga: "Cumaisc línte bána i ndiaidh a chéile in aon líne amháin."
  gd: "Co-theannaich loidhnichean bàna leantainneach gu aon."
  pl: "Łączy kolejne puste wiersze w jeden."
  pt: "Reduz as linhas em branco consecutivas a uma só."
  ru: "Сжимает подряд идущие пустые строки в одну."
  ar: "يدمج الأسطر الفارغة المتتالية في سطر واحد."
  hi: "लगातार खाली पंक्तियों को एक में समेटता है।"
  bn: "পরপর ফাঁকা লাইনগুলিকে একটিতে সংকুচিত করে।"
  zh: "将连续的空行合并为一行。"
  ja: "連続する空行を1行にまとめます。"
menu.item.edit.trim.help:
  en: "Remove trailing whitespace from each line."
  es: "Elimina los espacios en blanco al final de cada línea."
  fr: "Supprime les espaces en fin de chaque ligne."
  de: "Entfernt nachgestellte Leerzeichen aus jeder Zeile."
  cy: "Dileu bylchau dilynol o bob llinell."
  ga: "Bain spás bán ó dheireadh gach líne."
  gd: "Thoir air falbh àite bàn air deireadh gach loidhne."
  pl: "Usuwa końcowe białe znaki z każdego wiersza."
  pt: "Remove os espaços em branco no final de cada linha."
  ru: "Удаляет пробелы в конце каждой строки."
  ar: "يزيل المسافات البيضاء من نهاية كل سطر."
  hi: "प्रत्येक पंक्ति के अंत से रिक्त स्थान हटाता है।"
  bn: "প্রতিটি লাইনের শেষ থেকে ফাঁকা স্থান সরিয়ে দেয়।"
  zh: "删除每行末尾的空白字符。"
  ja: "各行の末尾の空白を削除します。"
menu.item.edit.eol_menu.help:
  en: "Choose the line-ending style for the file."
  es: "Elige el estilo de fin de línea del archivo."
  fr: "Choisit le style de fin de ligne du fichier."
  de: "Wählt den Zeilenendstil für die Datei."
  cy: "Dewis arddull diwedd llinell y ffeil."
  ga: "Roghnaigh stíl chríoch líne an chomhaid."
  gd: "Tagh stoidhle deireadh loidhne an fhaidhle."
  pl: "Wybiera styl zakończenia wierszy pliku."
  pt: "Escolhe o estilo de fim de linha do arquivo."
  ru: "Выбор стиля окончания строк для файла."
  ar: "يختار نمط نهاية السطر للملف."
  hi: "फ़ाइल के लिए पंक्ति-अंत शैली चुनें।"
  bn: "ফাইলের জন্য লাইন-শেষের ধরন বেছে নিন।"
  zh: "选择文件的行尾样式。"
  ja: "ファイルの改行コードのスタイルを選択します。"
menu.item.edit.eol_lf.help:
  en: "Convert line endings to LF (Unix)."
  es: "Convierte los finales de línea a LF (Unix)."
  fr: "Convertit les fins de ligne en LF (Unix)."
  de: "Wandelt die Zeilenenden in LF (Unix) um."
  cy: "Trosi diweddau llinell i LF (Unix)."
  ga: "Tiontaigh críocha líne go LF (Unix)."
  gd: "Tionndaidh deireadh loidhne gu LF (Unix)."
  pl: "Konwertuje zakończenia wierszy na LF (Unix)."
  pt: "Converte os fins de linha para LF (Unix)."
  ru: "Преобразует окончания строк в LF (Unix)."
  ar: "يحوّل نهايات الأسطر إلى LF (Unix)."
  hi: "पंक्ति-अंत को LF (Unix) में बदलता है।"
  bn: "লাইন-শেষ LF (Unix) এ রূপান্তর করে।"
  zh: "将行尾转换为 LF (Unix)。"
  ja: "改行コードを LF (Unix) に変換します。"
menu.item.edit.eol_crlf.help:
  en: "Convert line endings to CRLF (Windows)."
  es: "Convierte los finales de línea a CRLF (Windows)."
  fr: "Convertit les fins de ligne en CRLF (Windows)."
  de: "Wandelt die Zeilenenden in CRLF (Windows) um."
  cy: "Trosi diweddau llinell i CRLF (Windows)."
  ga: "Tiontaigh críocha líne go CRLF (Windows)."
  gd: "Tionndaidh deireadh loidhne gu CRLF (Windows)."
  pl: "Konwertuje zakończenia wierszy na CRLF (Windows)."
  pt: "Converte os fins de linha para CRLF (Windows)."
  ru: "Преобразует окончания строк в CRLF (Windows)."
  ar: "يحوّل نهايات الأسطر إلى CRLF (Windows)."
  hi: "पंक्ति-अंत को CRLF (Windows) में बदलता है।"
  bn: "লাইন-শেষ CRLF (Windows) এ রূপান্তর করে।"
  zh: "将行尾转换为 CRLF (Windows)。"
  ja: "改行コードを CRLF (Windows) に変換します。"
menu.item.edit.select_more.help:
  en: "Expand the selection to the next larger syntax scope."
  es: "Amplía la selección al siguiente ámbito sintáctico mayor."
  fr: "Étend la sélection à la portée syntaxique supérieure."
  de: "Erweitert die Auswahl auf den nächstgrößeren Syntaxbereich."
  cy: "Ehangu'r dewis i'r cwmpas cystrawen mwy nesaf."
  ga: "Leathnaigh an roghnúchán go dtí an chéad raon comhréire níos mó."
  gd: "Leudaich an taghadh don ath sgòp co-chàradh nas motha."
  pl: "Rozszerza zaznaczenie do większego zakresu składni."
  pt: "Amplia a seleção para o próximo escopo sintático maior."
  ru: "Расширяет выделение до следующей большей синтаксической области."
  ar: "يوسّع التحديد إلى النطاق النحوي الأكبر التالي."
  hi: "चयन को अगले बड़े सिंटैक्स दायरे तक बढ़ाता है।"
  bn: "নির্বাচনটি পরবর্তী বৃহত্তর সিনট্যাক্স পরিসরে প্রসারিত করে।"
  zh: "将选区扩展到下一个更大的语法范围。"
  ja: "選択範囲を次に大きい構文スコープに拡張します。"
menu.item.edit.select_less.help:
  en: "Shrink the selection to the next smaller syntax scope."
  es: "Reduce la selección al siguiente ámbito sintáctico menor."
  fr: "Réduit la sélection à la portée syntaxique inférieure."
  de: "Verkleinert die Auswahl auf den nächstkleineren Syntaxbereich."
  cy: "Lleihau'r dewis i'r cwmpas cystrawen llai nesaf."
  ga: "Laghdaigh an roghnúchán go dtí an chéad raon comhréire níos lú."
  gd: "Lùghdaich an taghadh don ath sgòp co-chàradh nas lugha."
  pl: "Zmniejsza zaznaczenie do mniejszego zakresu składni."
  pt: "Reduz a seleção para o próximo escopo sintático menor."
  ru: "Сужает выделение до следующей меньшей синтаксической области."
  ar: "يقلّص التحديد إلى النطاق النحوي الأصغر التالي."
  hi: "चयन को अगले छोटे सिंटैक्स दायरे तक घटाता है।"
  bn: "নির্বাচনটি পরবর্তী ছোট সিনট্যাক্স পরিসরে সংকুচিত করে।"
  zh: "将选区缩小到下一个更小的语法范围。"
  ja: "選択範囲を次に小さい構文スコープに縮小します。"
menu.item.edit.select_line.help:
  en: "Select the entire current line."
  es: "Selecciona toda la línea actual."
  fr: "Sélectionne la ligne actuelle entière."
  de: "Wählt die gesamte aktuelle Zeile aus."
  cy: "Dewis y llinell gyfredol gyfan."
  ga: "Roghnaigh an líne reatha iomlán."
  gd: "Tagh an loidhne làithreach gu lèir."
  pl: "Zaznacza cały bieżący wiersz."
  pt: "Seleciona toda a linha atual."
  ru: "Выделяет всю текущую строку."
  ar: "يحدد السطر الحالي بأكمله."
  hi: "संपूर्ण वर्तमान पंक्ति का चयन करता है।"
  bn: "সম্পূর্ণ বর্তমান লাইন নির্বাচন করে।"
  zh: "选择整个当前行。"
  ja: "現在の行全体を選択します。"
menu.item.edit.select_paragraph.help:
  en: "Select the paragraph around the cursor."
  es: "Selecciona el párrafo que rodea el cursor."
  fr: "Sélectionne le paragraphe autour du curseur."
  de: "Wählt den Absatz rund um den Cursor aus."
  cy: "Dewis y paragraff o amgylch y cyrchwr."
  ga: "Roghnaigh an t-alt timpeall an chúrsóra."
  gd: "Tagh am paragraf timcheall a' chùrsair."
  pl: "Zaznacza akapit wokół kursora."
  pt: "Seleciona o parágrafo ao redor do cursor."
  ru: "Выделяет абзац вокруг курсора."
  ar: "يحدد الفقرة المحيطة بالمؤشر."
  hi: "कर्सर के आसपास के अनुच्छेद का चयन करता है।"
  bn: "কার্সারের চারপাশের অনুচ্ছেদ নির্বাচন করে।"
  zh: "选择光标周围的段落。"
  ja: "カーソル周辺の段落を選択します。"
menu.item.edit.select_section.help:
  en: "Select the section around the cursor."
  es: "Selecciona la sección que rodea el cursor."
  fr: "Sélectionne la section autour du curseur."
  de: "Wählt den Abschnitt rund um den Cursor aus."
  cy: "Dewis yr adran o amgylch y cyrchwr."
  ga: "Roghnaigh an rannán timpeall an chúrsóra."
  gd: "Tagh an earrann timcheall a' chùrsair."
  pl: "Zaznacza sekcję wokół kursora."
  pt: "Seleciona a seção ao redor do cursor."
  ru: "Выделяет раздел вокруг курсора."
  ar: "يحدد القسم المحيط بالمؤشر."
  hi: "कर्सर के आसपास के अनुभाग का चयन करता है।"
  bn: "কার্সারের চারপাশের বিভাগ নির্বাচন করে।"
  zh: "选择光标周围的区段。"
  ja: "カーソル周辺のセクションを選択します。"
menu.item.edit.select_all_occurrences.help:
  en: "Select every occurrence of the current selection."
  es: "Selecciona todas las apariciones de la selección actual."
  fr: "Sélectionne toutes les occurrences de la sélection actuelle."
  de: "Wählt alle Vorkommen der aktuellen Auswahl aus."
  cy: "Dewis pob achos o'r dewis cyfredol."
  ga: "Roghnaigh gach ásc den roghnúchán reatha."
  gd: "Tagh gach tachartas den taghadh làithreach."
  pl: "Zaznacza wszystkie wystąpienia bieżącego zaznaczenia."
  pt: "Seleciona todas as ocorrências da seleção atual."
  ru: "Выделяет все вхождения текущего выделения."
  ar: "يحدد كل تكرارات التحديد الحالي."
  hi: "वर्तमान चयन की सभी घटनाओं का चयन करता है।"
  bn: "বর্তমান নির্বাচনের সমস্ত উপস্থিতি নির্বাচন করে।"
  zh: "选择当前所选内容的所有匹配项。"
  ja: "現在の選択内容のすべての出現箇所を選択します。"
menu.item.edit.column_select_down.help:
  en: "Extend a column selection one line downward."
  es: "Extiende una selección de columna una línea hacia abajo."
  fr: "Étend une sélection en colonne d'une ligne vers le bas."
  de: "Erweitert eine Spaltenauswahl um eine Zeile nach unten."
  cy: "Ymestyn dewis colofn un llinell i lawr."
  ga: "Leathnaigh roghnúchán colúin líne amháin síos."
  gd: "Leudaich taghadh colbh aon loidhne sìos."
  pl: "Rozszerza zaznaczenie kolumnowe o wiersz w dół."
  pt: "Estende uma seleção de coluna uma linha para baixo."
  ru: "Расширяет столбцовое выделение на строку вниз."
  ar: "يوسّع تحديد العمود سطرًا واحدًا للأسفل."
  hi: "स्तंभ चयन को एक पंक्ति नीचे बढ़ाता है।"
  bn: "কলাম নির্বাচন এক লাইন নিচে প্রসারিত করে।"
  zh: "将列选区向下扩展一行。"
  ja: "矩形選択を1行下に拡張します。"
menu.item.edit.column_select_up.help:
  en: "Extend a column selection one line upward."
  es: "Extiende una selección de columna una línea hacia arriba."
