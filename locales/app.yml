  ar: "فتح أوامر إنشاء الفروع وإدارتها."
  hi: "ब्रांच बनाने और प्रबंधित करने के आदेश खोलें।"
  bn: "ব্রাঞ্চ তৈরি ও পরিচালনার কমান্ড খুলুন।"
  zh: "打开用于创建和管理分支的命令。"
  ja: "ブランチの作成と管理のコマンドを開きます。"
menu.item.git.status.help:
  en: "Show the Git working tree status."
  es: "Muestra el estado del árbol de trabajo de Git."
  fr: "Affiche l'état de l'arbre de travail Git."
  de: "Zeigt den Status des Git-Arbeitsbaums an."
  cy: "Dangos statws coeden waith Git."
  ga: "Taispeáin stádas chrann oibre Git."
  gd: "Seall staid craobh-obrach Git."
  pl: "Pokaż stan drzewa roboczego Git."
  pt: "Mostra o estado da árvore de trabalho do Git."
  ru: "Показать состояние рабочего дерева Git."
  ar: "عرض حالة شجرة عمل Git."
  hi: "Git वर्किंग ट्री की स्थिति दिखाएँ।"
  bn: "Git ওয়ার্কিং ট্রির স্ট্যাটাস দেখান।"
  zh: "显示 Git 工作区状态。"
  ja: "Git のワーキングツリーの状態を表示します。"
menu.item.git.changes.help:
  en: "Show uncommitted changes in the working tree."
  es: "Muestra los cambios sin confirmar en el árbol de trabajo."
  fr: "Affiche les modifications non validées de l'arbre de travail."
  de: "Zeigt nicht committete Änderungen im Arbeitsbaum an."
  cy: "Dangos newidiadau heb eu hymrwymo yn y goeden waith."
  ga: "Taispeáin athruithe neamhthiomanta sa chrann oibre."
  gd: "Seall atharraichean gun chomataigeadh sa chraoibh-obrach."
  pl: "Pokaż niezatwierdzone zmiany w drzewie roboczym."
  pt: "Mostra as alterações não confirmadas na árvore de trabalho."
  ru: "Показать незафиксированные изменения в рабочем дереве."
  ar: "عرض التغييرات غير المودعة في شجرة العمل."
  hi: "वर्किंग ट्री में बिना कमिट किए बदलाव दिखाएँ।"
  bn: "ওয়ার্কিং ট্রিতে কমিট না করা পরিবর্তন দেখান।"
  zh: "显示工作区中未提交的更改。"
  ja: "ワーキングツリーの未コミットの変更を表示します。"
menu.item.git.log.help:
  en: "Open views of the commit history."
  es: "Abre vistas del historial de confirmaciones."
  fr: "Ouvre les vues de l'historique des commits."
  de: "Öffnet Ansichten des Commit-Verlaufs."
  cy: "Agor golygfeydd o hanes yr ymrwymiadau."
  ga: "Oscail amhairc ar stair na dtiomantas."
  gd: "Fosgail seallaidhean de eachdraidh nan comataidhean."
  pl: "Otwórz widoki historii commitów."
  pt: "Abre visualizações do histórico de commits."
  ru: "Открыть виды истории коммитов."
  ar: "فتح طرق عرض سجل الإيداعات."
  hi: "कमिट इतिहास के दृश्य खोलें।"
  bn: "কমিট ইতিহাসের ভিউ খুলুন।"
  zh: "打开提交历史的视图。"
  ja: "コミット履歴の表示を開きます。"
menu.item.git.grep.help:
  en: "Search tracked files with Git grep."
  es: "Busca en los archivos rastreados con Git grep."
  fr: "Recherche dans les fichiers suivis avec Git grep."
  de: "Durchsucht getrackte Dateien mit Git grep."
  cy: "Chwilio ffeiliau wedi'u tracio gyda Git grep."
  ga: "Cuardaigh comhaid rianaithe le Git grep."
  gd: "Lorg faidhlichean fo lorg le Git grep."
  pl: "Przeszukaj śledzone pliki za pomocą Git grep."
  pt: "Pesquisa nos ficheiros rastreados com Git grep."
  ru: "Искать в отслеживаемых файлах с помощью Git grep."
  ar: "البحث في الملفات المتتبَّعة باستخدام Git grep."
  hi: "Git grep से ट्रैक की गई फ़ाइलों में खोजें।"
  bn: "Git grep দিয়ে ট্র্যাক করা ফাইলে অনুসন্ধান করুন।"
  zh: "使用 Git grep 搜索已跟踪的文件。"
  ja: "Git grep で追跡対象ファイルを検索します。"
menu.item.git.blame.help:
  en: "Show Git blame for the current line."
  es: "Muestra el blame de Git de la línea actual."
  fr: "Affiche le blame Git de la ligne actuelle."
  de: "Zeigt Git-Blame für die aktuelle Zeile an."
  cy: "Dangos blame Git ar gyfer y llinell gyfredol."
  ga: "Taispeáin blame Git don líne reatha."
  gd: "Seall blame Git airson na loidhne làithreach."
  pl: "Pokaż Git blame dla bieżącej linii."
  pt: "Mostra o blame do Git para a linha atual."
  ru: "Показать Git blame для текущей строки."
  ar: "عرض Git blame للسطر الحالي."
  hi: "वर्तमान लाइन के लिए Git blame दिखाएँ।"
  bn: "বর্তমান লাইনের জন্য Git blame দেখান।"
  zh: "显示当前行的 Git blame。"
  ja: "現在の行の Git blame を表示します。"
menu.item.git.blame_inline.help:
  en: "Show or hide inline Git blame annotations for each line."
  es: "Muestra u oculta las anotaciones de Git blame en línea para cada línea."
  fr: "Affiche ou masque les annotations Git blame en ligne pour chaque ligne."
  de: "Blendet Inline-Git-blame-Anmerkungen für jede Zeile ein oder aus."
  cy: "Dangos neu guddio anodiadau Git blame mewnol ar gyfer pob llinell."
  ga: "Taispeáin nó folaigh anótálacha inlíne Git blame do gach líne."
  gd: "Seall no falaich nòtaichean Git blame am broinn na loidhne airson gach loidhne."
  pl: "Pokazuje lub ukrywa wbudowane adnotacje Git blame dla każdego wiersza."
  pt: "Mostra ou oculta as anotações Git blame em linha para cada linha."
  ru: "Показывает или скрывает встроенные аннотации Git blame для каждой строки."
  ar: "إظهار أو إخفاء تعليقات Git blame المضمّنة لكل سطر."
  hi: "प्रत्येक पंक्ति के लिए इनलाइन Git blame टिप्पणियाँ दिखाएँ या छिपाएँ।"
  bn: "প্রতিটি লাইনের জন্য ইনলাইন Git blame টীকা দেখান বা লুকান।"
  zh: "显示或隐藏每行的内联 Git blame 注释。"
  ja: "各行のインライン Git blame 注釈を表示または非表示にします。"
menu.item.git.diff_next.help:
  en: "Jump to the next changed hunk in the diff."
  es: "Salta al siguiente bloque modificado en la diferencia."
  fr: "Passe au prochain bloc modifié dans le diff."
  de: "Springt zum nächsten geänderten Block im Diff."
  cy: "Neidio i'r darn nesaf a newidiwyd yn y diff."
  ga: "Léim go dtí an chnap athraithe eile sa diff."
  gd: "Leum chun an ath bhloca atharraichte san diff."
  pl: "Przechodzi do następnego zmienionego fragmentu w różnicy."
  pt: "Salta para o próximo bloco alterado no diff."
  ru: "Переходит к следующему изменённому фрагменту в различиях."
  ar: "الانتقال إلى الكتلة المتغيّرة التالية في الفرق."
  hi: "डिफ़ में अगले बदले गए हंक पर जाएँ।"
  bn: "ডিফের পরবর্তী পরিবর্তিত অংশে যান।"
  zh: "跳转到差异中下一个更改的代码块。"
  ja: "差分内の次の変更ブロックへ移動します。"
menu.item.git.diff_prev.help:
  en: "Jump to the previous changed hunk in the diff."
  es: "Salta al bloque modificado anterior en la diferencia."
  fr: "Passe au bloc modifié précédent dans le diff."
  de: "Springt zum vorherigen geänderten Block im Diff."
  cy: "Neidio i'r darn blaenorol a newidiwyd yn y diff."
  ga: "Léim go dtí an chnap athraithe roimhe sa diff."
  gd: "Leum chun a' bhloca atharraichte roimhe san diff."
  pl: "Przechodzi do poprzedniego zmienionego fragmentu w różnicy."
  pt: "Salta para o bloco alterado anterior no diff."
  ru: "Переходит к предыдущему изменённому фрагменту в различиях."
  ar: "الانتقال إلى الكتلة المتغيّرة السابقة في الفرق."
  hi: "डिफ़ में पिछले बदले गए हंक पर जाएँ।"
  bn: "ডিফের পূর্ববর্তী পরিবর্তিত অংশে যান।"
  zh: "跳转到差异中上一个更改的代码块。"
  ja: "差分内の前の変更ブロックへ移動します。"
menu.item.git.stage_hunk.help:
  en: "Stage the hunk under the cursor for the next commit."
  es: "Prepara el bloque bajo el cursor para la próxima confirmación."
  fr: "Indexe le bloc sous le curseur pour le prochain commit."
  de: "Nimmt den Block unter dem Cursor für den nächsten Commit auf."
  cy: "Llwyfannu'r darn dan y cyrchwr ar gyfer y cyflwyniad nesaf."
  ga: "Cuir an chnap faoin gcúrsóir ar stáitse don chéad tiomantas eile."
  gd: "Cuir am bloca fon chùrsair air an àrd-ùrlar airson an ath chomataidh."
  pl: "Dodaje fragment pod kursorem do przechowalni na następny commit."
  pt: "Prepara o bloco sob o cursor para o próximo commit."
  ru: "Индексирует фрагмент под курсором для следующего коммита."
  ar: "إضافة الكتلة الموجودة تحت المؤشر إلى منطقة التجهيز للالتزام التالي."
  hi: "अगले कमिट के लिए कर्सर के नीचे वाले हंक को स्टेज करें।"
  bn: "পরবর্তী কমিটের জন্য কার্সরের নিচের অংশটি স্টেজ করুন।"
  zh: "将光标处的代码块暂存以用于下次提交。"
  ja: "カーソル位置のブロックを次のコミット用にステージします。"
menu.item.git.unstage_hunk.help:
  en: "Remove the hunk under the cursor from the staging area."
  es: "Quita el bloque bajo el cursor del área de preparación."
  fr: "Retire le bloc sous le curseur de la zone d'index."
  de: "Entfernt den Block unter dem Cursor aus dem Staging-Bereich."
  cy: "Tynnu'r darn dan y cyrchwr o'r ardal lwyfannu."
  ga: "Bain an chnap faoin gcúrsóir den limistéar stáitse."
  gd: "Thoir am bloca fon chùrsair far an àite àrd-ùrlair."
  pl: "Usuwa fragment pod kursorem z przechowalni."
  pt: "Remove o bloco sob o cursor da área de preparação."
  ru: "Удаляет фрагмент под курсором из индекса."
  ar: "إزالة الكتلة الموجودة تحت المؤشر من منطقة التجهيز."
  hi: "कर्सर के नीचे वाले हंक को स्टेजिंग क्षेत्र से हटाएँ।"
  bn: "কার্সরের নিচের অংশটি স্টেজিং এলাকা থেকে সরান।"
  zh: "将光标处的代码块从暂存区移除。"
  ja: "カーソル位置のブロックをステージング領域から外します。"
menu.item.git.revert_hunk.help:
  en: "Discard the changes in the hunk under the cursor."
  es: "Descarta los cambios del bloque bajo el cursor."
  fr: "Annule les modifications du bloc sous le curseur."
  de: "Verwirft die Änderungen im Block unter dem Cursor."
  cy: "Gwaredu'r newidiadau yn y darn dan y cyrchwr."
  ga: "Cuir i leataobh na hathruithe sa chnap faoin gcúrsóir."
  gd: "Tilg air falbh na h-atharrachaidhean sa bhloca fon chùrsair."
  pl: "Odrzuca zmiany we fragmencie pod kursorem."
  pt: "Descarta as alterações do bloco sob o cursor."
  ru: "Отменяет изменения во фрагменте под курсором."
  ar: "تجاهل التغييرات في الكتلة الموجودة تحت المؤشر."
  hi: "कर्सर के नीचे वाले हंक के परिवर्तन रद्द करें।"
  bn: "কার্সরের নিচের অংশের পরিবর্তনগুলি বাতিল করুন।"
  zh: "放弃光标处代码块中的更改。"
  ja: "カーソル位置のブロックの変更を破棄します。"
menu.item.git.conflict_next.help:
  en: "Jump to the next merge conflict in the file."
  es: "Salta al siguiente conflicto de fusión en el archivo."
  fr: "Passe au prochain conflit de fusion dans le fichier."
  de: "Springt zum nächsten Merge-Konflikt in der Datei."
  cy: "Neidio i'r gwrthdaro cyfuno nesaf yn y ffeil."
  ga: "Léim go dtí an chéad choinbhleacht chumaisc eile sa chomhad."
  gd: "Leum chun an ath chòmhstri co-aonaidh san fhaidhle."
  pl: "Przechodzi do następnego konfliktu scalania w pliku."
  pt: "Salta para o próximo conflito de mesclagem no arquivo."
  ru: "Переходит к следующему конфликту слияния в файле."
  ar: "الانتقال إلى تعارض الدمج التالي في الملف."
  hi: "फ़ाइल में अगले मर्ज संघर्ष पर जाएँ।"
  bn: "ফাইলের পরবর্তী মার্জ দ্বন্দ্বে যান।"
  zh: "跳转到文件中的下一个合并冲突。"
  ja: "ファイル内の次のマージ競合へ移動します。"
menu.item.git.resolve.help:
  en: "Open commands to resolve merge conflicts."
  es: "Abre comandos para resolver conflictos de fusión."
  fr: "Ouvre les commandes pour résoudre les conflits de fusion."
  de: "Öffnet Befehle zum Lösen von Merge-Konflikten."
  cy: "Agor gorchmynion i ddatrys gwrthdaro cyfuno."
  ga: "Oscail orduithe chun coinbhleachtaí cumaisc a réiteach."
  gd: "Fosgail àitheantan gus còmhstrithean co-aonaidh fhuasgladh."
  pl: "Otwiera polecenia do rozwiązywania konfliktów scalania."
  pt: "Abre comandos para resolver conflitos de mesclagem."
  ru: "Открывает команды для разрешения конфликтов слияния."
  ar: "فتح أوامر لحل تعارضات الدمج."
  hi: "मर्ज संघर्ष हल करने के आदेश खोलें।"
  bn: "মার্জ দ্বন্দ্ব সমাধানের কমান্ড খুলুন।"
  zh: "打开用于解决合并冲突的命令。"
  ja: "マージ競合を解決するコマンドを開きます。"
menu.item.git.amend.help:
  en: "Add the staged changes to the previous commit."
  es: "Añade los cambios preparados a la confirmación anterior."
  fr: "Ajoute les modifications indexées au commit précédent."
  de: "Fügt die bereitgestellten Änderungen dem vorherigen Commit hinzu."
  cy: "Ychwanegu'r newidiadau llwyfannu at y cyflwyniad blaenorol."
  ga: "Cuir na hathruithe stáitse leis an tiomantas roimhe."
  gd: "Cuir na h-atharrachaidhean àrd-ùrlair ris a' chomataidh roimhe."
  pl: "Dodaje przygotowane zmiany do poprzedniego commita."
  pt: "Adiciona as alterações preparadas ao commit anterior."
  ru: "Добавляет проиндексированные изменения к предыдущему коммиту."
  ar: "إضافة التغييرات المجهّزة إلى الالتزام السابق."
  hi: "स्टेज किए गए परिवर्तनों को पिछले कमिट में जोड़ें।"
  bn: "স্টেজ করা পরিবর্তনগুলি পূর্ববর্তী কমিটে যোগ করুন।"
  zh: "将暂存的更改追加到上一次提交。"
  ja: "ステージした変更を直前のコミットに追加します。"
menu.item.git.stash.help:
  en: "Save the uncommitted changes to a stash."
  es: "Guarda los cambios sin confirmar en un stash."
  fr: "Enregistre les modifications non validées dans un stash."
  de: "Speichert die nicht committeten Änderungen in einem Stash."
  cy: "Cadw'r newidiadau heb eu cyflwyno mewn stash."
  ga: "Sábháil na hathruithe neamhthiomanta i stash."
  gd: "Sàbhail na h-atharrachaidhean gun choimiteadh ann an stash."
  pl: "Zapisuje niezatwierdzone zmiany w schowku stash."
  pt: "Guarda as alterações não confirmadas num stash."
  ru: "Сохраняет незафиксированные изменения в тайник stash."
  ar: "حفظ التغييرات غير المُلتزمة في stash."
  hi: "बिना कमिट किए गए परिवर्तनों को stash में सहेजें।"
  bn: "কমিট না করা পরিবর্তনগুলি একটি stash-এ সংরক্ষণ করুন।"
  zh: "将未提交的更改保存到 stash。"
  ja: "コミットしていない変更を stash に保存します。"
menu.item.git.stash_pop.help:
  en: "Restore and remove the most recent stash."
  es: "Restaura y elimina el stash más reciente."
  fr: "Restaure et supprime le stash le plus récent."
  de: "Stellt den neuesten Stash wieder her und entfernt ihn."
  cy: "Adfer a dileu'r stash diweddaraf."
  ga: "Athchóirigh agus bain an stash is déanaí."
  gd: "Aisig agus thoir air falbh an stash as ùire."
  pl: "Przywraca i usuwa najnowszy schowek stash."
  pt: "Restaura e remove o stash mais recente."
  ru: "Восстанавливает и удаляет последний тайник stash."
  ar: "استعادة أحدث stash وإزالته."
  hi: "सबसे हाल के stash को पुनर्स्थापित करें और हटाएँ।"
  bn: "সাম্প্রতিকতম stash পুনরুদ্ধার করুন এবং সরান।"
  zh: "恢复并移除最近的 stash。"
  ja: "最新の stash を復元して削除します。"
menu.item.git.pull.help:
  en: "Open commands to pull changes from the remote."
  es: "Abre comandos para traer cambios del remoto."
  fr: "Ouvre les commandes pour récupérer les modifications du dépôt distant."
  de: "Öffnet Befehle zum Abrufen von Änderungen vom Remote."
  cy: "Agor gorchmynion i dynnu newidiadau o'r pell."
  ga: "Oscail orduithe chun athruithe a tharraingt ón gcianstór."
  gd: "Fosgail àitheantan gus atharrachaidhean a tharraing bhon chèin."
  pl: "Otwiera polecenia do pobrania zmian ze zdalnego repozytorium."
  pt: "Abre comandos para receber alterações do remoto."
  ru: "Открывает команды для получения изменений из удалённого репозитория."
  ar: "فتح أوامر لسحب التغييرات من المستودع البعيد."
  hi: "रिमोट से परिवर्तन लाने के आदेश खोलें।"
  bn: "রিমোট থেকে পরিবর্তন টানার কমান্ড খুলুন।"
  zh: "打开用于从远程拉取更改的命令。"
  ja: "リモートから変更を取り込むコマンドを開きます。"
menu.item.git.push.help:
  en: "Push local commits to the remote repository."
  es: "Envía las confirmaciones locales al repositorio remoto."
  fr: "Envoie les commits locaux vers le dépôt distant."
  de: "Überträgt lokale Commits zum Remote-Repository."
  cy: "Gwthio ymrwymiadau lleol i'r ystorfa bell."
  ga: "Brúigh tiomantais áitiúla chuig an gcianstór."
  gd: "Put na comataidhean ionadail chun an stòir chèin."
  pl: "Wypycha lokalne commity do zdalnego repozytorium."
  pt: "Envia os commits locais para o repositório remoto."
  ru: "Отправляет локальные коммиты в удалённый репозиторий."
  ar: "دفع الالتزامات المحلية إلى المستودع البعيد."
