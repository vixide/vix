  zh: "退出 Vix。"
  ja: "Vix を終了します。"
menu.item.tools.insert.uuid.v1.help:
  en: "Insert a version 1 UUID from a timestamp and MAC address."
  es: "Inserta un UUID versión 1 a partir de una marca de tiempo y una dirección MAC."
  fr: "Insère un UUID version 1 à partir d'un horodatage et d'une adresse MAC."
  de: "Fügt eine UUID der Version 1 aus Zeitstempel und MAC-Adresse ein."
  cy: "Mewnosod UUID fersiwn 1 o stamp amser a chyfeiriad MAC."
  ga: "Ionsáigh UUID leagan 1 ó stampa ama agus seoladh MAC."
  gd: "Cuir a-steach UUID tionndadh 1 bho stampa-ama is seòladh MAC."
  pl: "Wstawia UUID w wersji 1 ze znacznika czasu i adresu MAC."
  pt: "Insere um UUID versão 1 a partir de um carimbo de data/hora e endereço MAC."
  ru: "Вставляет UUID версии 1 из метки времени и MAC-адреса."
  ar: "يُدرج UUID من الإصدار 1 من طابع زمني وعنوان MAC."
  hi: "टाइमस्टैम्प और MAC पते से एक संस्करण 1 UUID डालें।"
  bn: "টাইমস্ট্যাম্প ও MAC ঠিকানা থেকে একটি সংস্করণ 1 UUID সন্নিবেশ করুন।"
  zh: "根据时间戳和 MAC 地址插入版本 1 的 UUID。"
  ja: "タイムスタンプと MAC アドレスからバージョン 1 の UUID を挿入します。"
menu.item.tools.insert.uuid.v2.help:
  en: "Insert a version 2 DCE Security UUID."
  es: "Inserta un UUID versión 2 de seguridad DCE."
  fr: "Insère un UUID version 2 de sécurité DCE."
  de: "Fügt eine UUID der Version 2 (DCE Security) ein."
  cy: "Mewnosod UUID fersiwn 2 diogelwch DCE."
  ga: "Ionsáigh UUID leagan 2 Slándáil DCE."
  gd: "Cuir a-steach UUID tionndadh 2 Tèarainteachd DCE."
  pl: "Wstawia UUID w wersji 2 (DCE Security)."
  pt: "Insere um UUID versão 2 de segurança DCE."
  ru: "Вставляет UUID версии 2 (DCE Security)."
  ar: "يُدرج UUID من الإصدار 2 لأمان DCE."
  hi: "एक संस्करण 2 DCE सुरक्षा UUID डालें।"
  bn: "একটি সংস্করণ 2 DCE Security UUID সন্নিবেশ করুন।"
  zh: "插入版本 2 的 DCE 安全 UUID。"
  ja: "バージョン 2 の DCE セキュリティ UUID を挿入します。"
menu.item.tools.insert.uuid.v3.help:
  en: "Insert a version 3 UUID hashed from a name with MD5."
  es: "Inserta un UUID versión 3 obtenido de un nombre con MD5."
  fr: "Insère un UUID version 3 haché à partir d'un nom avec MD5."
  de: "Fügt eine UUID der Version 3 ein, aus einem Namen per MD5 gehasht."
  cy: "Mewnosod UUID fersiwn 3 wedi'i stwnsio o enw gyda MD5."
  ga: "Ionsáigh UUID leagan 3 haiseáilte ó ainm le MD5."
  gd: "Cuir a-steach UUID tionndadh 3 air a hais bho ainm le MD5."
  pl: "Wstawia UUID w wersji 3 utworzony z nazwy przy użyciu MD5."
  pt: "Insere um UUID versão 3 gerado de um nome com MD5."
  ru: "Вставляет UUID версии 3, полученный из имени с помощью MD5."
  ar: "يُدرج UUID من الإصدار 3 مُجزّأ من اسم باستخدام MD5."
  hi: "MD5 से नाम को हैश करके एक संस्करण 3 UUID डालें।"
  bn: "MD5 দিয়ে একটি নাম হ্যাশ করে একটি সংস্করণ 3 UUID সন্নিবেশ করুন।"
  zh: "插入用 MD5 对名称哈希得到的版本 3 UUID。"
  ja: "MD5 で名前をハッシュしたバージョン 3 の UUID を挿入します。"
menu.item.tools.insert.uuid.v4.help:
