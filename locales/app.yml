  ja: "テキストを選択するためのコマンドを開きます。"
menu.item.edit.lines_menu.help:
  en: "Open commands for editing whole lines."
  es: "Abre comandos para editar líneas completas."
  fr: "Ouvrir les commandes d'édition de lignes entières."
  de: "Öffnet Befehle zum Bearbeiten ganzer Zeilen."
  cy: "Agor gorchmynion ar gyfer golygu llinellau cyfan."
  ga: "Oscail orduithe chun línte iomlána a chur in eagar."
  gd: "Fosgail àitheantan airson loidhnichean slàna a dheasachadh."
  pl: "Otwiera polecenia edycji całych wierszy."
  pt: "Abre comandos para editar linhas inteiras."
  ru: "Открыть команды редактирования целых строк."
  ar: "فتح أوامر تحرير الأسطر الكاملة."
  hi: "पूरी पंक्तियों को संपादित करने के लिए कमांड खोलें।"
