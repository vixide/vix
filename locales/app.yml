  ga: "Oscail eagarthóir socruithe Vix."
  gd: "Fosgail deasaiche roghainnean Vix."
  pl: "Otwiera edytor ustawień Vix."
  pt: "Abre o editor de configurações do Vix."
  ru: "Открывает редактор настроек Vix."
  ar: "يفتح محرّر إعدادات Vix."
