# vix-theme-model: the JSON theme model and the ratatui styles derived from it
# (plus theme loading). Depends only on ratatui-core (whose `Style`/`Color` are
# the same types ratatui re-exports), so the host renders with these styles
# directly. See spec/themes.md.

[package]
name = "vix-theme-model"
version = "0.1.0"
edition = "2021"
description = "JSON theme model, ratatui styles, and theme loading for Vix."
license = "Apache-2.0 OR BSD-3-Clause OR MIT OR GPL-2.0-only OR GPL-3.0-only"
repository = "https://github.com/sixarm/vix"

[lib]
name = "vix_theme_model"
path = "src/lib.rs"

[dependencies]
ratatui-core = "0.1"
serde = { version = "1", features = ["derive"] }
serde_json = "1"
