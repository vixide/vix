# vix-workspace-dashboard-panel: live workspace metrics for the dashboard overlay
# (folder name, disk usage, file count, git commit count). Pure state — the host
# computes the metrics asynchronously and updates these fields, then renders them.

[package]
name = "vix-workspace-dashboard-panel"
version = "0.1.0"
edition = "2021"
description = "Workspace dashboard metrics state for Vix."
license = "Apache-2.0 OR BSD-3-Clause OR MIT OR GPL-2.0-only OR GPL-3.0-only"
repository = "https://github.com/sixarm/vix"

[lib]
name = "vix_workspace_dashboard_panel"
path = "src/lib.rs"
