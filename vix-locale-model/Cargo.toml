# vix-locale-model: the list of available UI languages (code + endonym). Pure
# data (no dependencies); the locale chooser and the host read it.

[package]
name = "vix-locale-model"
version = "0.1.0"
edition = "2021"
description = "Available UI languages (locale code + endonym) for Vix."
license = "Apache-2.0 OR BSD-3-Clause OR MIT OR GPL-2.0-only OR GPL-3.0-only"
repository = "https://github.com/sixarm/vix"

[lib]
name = "vix_locale_model"
path = "src/lib.rs"
