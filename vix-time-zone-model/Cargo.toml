# vix-time-zone-model: all time-zone modeling for Vix. The full IANA canonical
# zone table (name, standard UTC offset, DST flag, abbreviation) plus the single
# application-wide "active time zone" state. Pure data (no dependencies); UI
# crates (vix-time-zone-chooser) and the clock panel read and set it.

[package]
name = "vix-time-zone-model"
version = "0.1.0"
edition = "2021"
description = "IANA time-zone model and active-zone state for Vix."
license = "Apache-2.0 OR BSD-3-Clause OR MIT OR GPL-2.0-only OR GPL-3.0-only"
repository = "https://github.com/sixarm/vix"

[lib]
name = "vix_time_zone_model"
path = "src/lib.rs"
