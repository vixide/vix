# vix-welcome-panel: the first-run welcome screen — friendly, novice-oriented
# text explaining what Vix is, how to start, what it can do, and how to give
# feedback — plus the panel's scroll state. Pure data (no dependencies); the host
# renders the lines with a scrollbar.

[package]
name = "vix-welcome-panel"
version = "0.1.0"
edition = "2021"
description = "First-run welcome text and scroll state for Vix."
license = "Apache-2.0 OR BSD-3-Clause OR MIT OR GPL-2.0-only OR GPL-3.0-only"
repository = "https://github.com/sixarm/vix"

[lib]
name = "vix_welcome_panel"
path = "src/lib.rs"
