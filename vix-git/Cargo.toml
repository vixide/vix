# vix-git: git integration for Vix. Shells out to the user's `git` CLI (so auth,
# credential helpers, and push/pull just work) and parses the output into typed
# data. In-editor diff gutters are computed in-process with the pure-Rust
# `similar` crate (current buffer vs. the HEAD blob).

[package]
name = "vix-git"
version = "0.1.0"
edition = "2021"
description = "Git status, diff, and staging helpers for Vix (via the git CLI)."
license = "Apache-2.0 OR BSD-3-Clause OR MIT OR GPL-2.0-only OR GPL-3.0-only"
repository = "https://github.com/sixarm/vix"

[lib]
name = "vix_git"
path = "src/lib.rs"

[dependencies]
# Pure-Rust text diffing for the editor's per-line change gutter.
similar = "2"
