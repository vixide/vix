tree-sitter-python = { workspace = true, optional = true }
tree-sitter-rust = { workspace = true, optional = true }
tree-sitter-toml-ng = { workspace = true, optional = true }
tree-sitter-typescript = { workspace = true, optional = true }
tree-sitter-yaml = { workspace = true, optional = true }

# DB workbench (crates/vix-db/spec): embedded database drivers via the `Any` runtime
# driver â€” SQLite (bundled C), and pure-Rust PostgreSQL/MySQL over rustls (no
# system OpenSSL, same rationale as ureq). Replaces shelling out to the
# sqlite3/psql/mysql CLIs and holds one persistent connection per session.
sqlx = { workspace = true }
# Minimal runtime for sqlx's async drivers; each DB session owns a
# current-thread runtime on its own worker thread (src/db/session.rs).
tokio = { workspace = true }
futures-util = { workspace = true }

# Faster allocator for the MUSL static target (glibc's allocator is fine, but
# musl's is slow). Used as the global allocator in lib.rs/main.rs under the same
# cfg, so it is only pulled in â€” and its C code only compiled â€” for musl builds.
[target.'cfg(target_env = "musl")'.dependencies]
mimalloc = { workspace = true }

[profile.release]
lto = true
strip = true
opt-level = "z"

# The profile that 'dist' will build with
[profile.dist]
inherits = "release"
lto = "thin"
