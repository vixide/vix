# `vix` is both the application package and the workspace root, so
# `cargo build`/`cargo test --workspace` cover the internal crates too, and the
# whole tree shares one lockfile and target directory.
[workspace]
members = [
    "vix-editor",
    "vix-date-time-calendar-panel",
    "vix-theme-chooser",
    "vix-locale-chooser",
    "vix-keyway-chooser",
    "vix-keyboard-shortcut-panel",
    "vix-nerd-font-palette",
    "vix-ascii-panel",
    "vix-system-information-panel",
    "vix-project-dashboard-panel",
    "vix-outline-panel",
    "vix-spellcheck",
    "vix-git",
    "vix-find-panel",
    "vix-right-dock",
    "vix-left-dock",
    "vix-status-bar-panel",
    "vix-bottom-dock",
]

[package]
name = "vix"
version = "0.1.0"
edition = "2021"
rust-version = "1.86"
description = "Vix: Simple Terminal Rust IDE — a keyboard-friendly TUI text editor"
license = "MIT OR Apache-2.0"
repository = "https://github.com/sixarm/vix"
readme = "README.md"
keywords = ["tui", "editor", "ide", "terminal", "ratatui"]
categories = ["text-editors", "command-line-utilities"]

[features]
# Which Tree-sitter grammars to compile in. Each grammar is a sizeable C parser,
# so the default is a lean set; opt into more (or all) at build time:
#   cargo build --release                                  # common grammars
#   cargo build --release --no-default-features            # no highlighting (smallest)
#   cargo build --release --no-default-features --features syntax-all
default = ["syntax-common"]
syntax-common = [
    "vix-editor/lang-rust",
    "vix-editor/lang-markdown",
    "vix-editor/lang-json",
    "vix-editor/lang-toml",
]
syntax-all = ["vix-editor/langs-all"]

[dependencies]
# Terminal UI core. The whole widget ecosystem must agree on this version.
ratatui = { version = "0.30", features = ["crossterm"] }
# Center editing widget: Vix's fully-custom Tree-sitter code editor (syntax
# highlighting, history, selection, clipboard, mouse, and soft wrap). Lives under
# vix-editor/ so the Tree-sitter grammars can be gated behind features (see
# [features]) and the renderer is theme-aware.
vix-editor = { path = "vix-editor", default-features = false, features = ["crossterm"] }
# Calendar box: date/time strings and the navigable month grid. Internal crate so
# the calendar logic stays unit-testable on its own (it owns the jiff dependency).
vix-date-time-calendar-panel = { path = "vix-date-time-calendar-panel" }
# Theme: the monochrome Dark/Light model, ratatui styles, and chooser state.
vix-theme-chooser = { path = "vix-theme-chooser" }
# Locale chooser: available UI languages + selection state.
vix-locale-chooser = { path = "vix-locale-chooser" }
# Keyway chooser: available keyboard navigation styles + selection state.
vix-keyway-chooser = { path = "vix-keyway-chooser" }
# Keyboard-shortcut help rows (key combo + i18n description key).
vix-keyboard-shortcut-panel = { path = "vix-keyboard-shortcut-panel" }
# Nerd Font palette (Tools menu): curated glyph set + character-picker grid state.
vix-nerd-font-palette = { path = "vix-nerd-font-palette" }
# ASCII panel (Tools menu): the ASCII reference table + row-selection state.
vix-ascii-panel = { path = "vix-ascii-panel" }
# System Information panel (Tools menu): host OS/CPU/memory/disk snapshot.
vix-system-information-panel = { path = "vix-system-information-panel" }
# Project Dashboard panel (Tools menu): live folder/disk/file/commit metrics.
vix-project-dashboard-panel = { path = "vix-project-dashboard-panel" }
# Outline panel: code symbol list (kind + name + line) + selection state.
vix-outline-panel = { path = "vix-outline-panel" }
# Spell checking: Hunspell-backed checker over comment/string ranges.
vix-spellcheck = { path = "vix-spellcheck" }
# Git integration: status/diff/staging via the git CLI.
vix-git = { path = "vix-git" }
# Find / find-and-replace box state (query, replacement, toggles, pattern builder).
vix-find-panel = { path = "vix-find-panel" }
# Right dock: message-drawer state (advice/notifications + selection).
vix-right-dock = { path = "vix-right-dock" }
# Left dock: file-explorer tree state (lazy expand, selection, multi-select).
vix-left-dock = { path = "vix-left-dock" }
# Status bar: formatting for the left/right segments.
vix-status-bar-panel = { path = "vix-status-bar-panel" }
# Bottom dock: scrollable line buffer (logs, output, data views).
vix-bottom-dock = { path = "vix-bottom-dock" }
# Cross-platform terminal backend. Must match the crossterm that ratatui 0.30 re-exports.
crossterm = "0.29"
# Regular expressions for find/replace.
regex = "1"
# Settings serialization (confy handles the TOML; serde derives the schema).
serde = { version = "1", features = ["derive"] }
ratatui-image = "11.0.4"
image = "0.25"
confy = "2.0.0"
clap = { version = "4.6.1", features = ["derive"] }
rust-i18n = "4.1.0"
include_dir = "0.7.4"

[profile.release]
lto = true
strip = true
opt-level = "z"
