# vix-nerd-font-picker: a curated set of Nerd Font glyphs and the character
# picker's grid-selection state. Pure data (no dependencies); the host renders
# the grid and inserts the chosen glyph into the active editor.

[package]
name = "vix-nerd-font-picker"
version = "0.1.0"
edition = "2021"
description = "Curated Nerd Font glyphs and character-picker grid state for Vix."
license = "Apache-2.0 OR BSD-3-Clause OR MIT OR GPL-2.0-only OR GPL-3.0-only"
repository = "https://github.com/sixarm/vix"

[lib]
name = "vix_nerd_font_picker"
path = "src/lib.rs"
