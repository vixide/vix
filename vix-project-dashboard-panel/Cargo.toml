# vix-project-dashboard-panel: live project metrics for the dashboard overlay
# (folder name, disk usage, file count, git commit count). Pure state — the host
# computes the metrics asynchronously and updates these fields, then renders them.

[package]
name = "vix-project-dashboard-panel"
version = "0.1.0"
edition = "2021"
description = "Project dashboard metrics state for Vix."
license = "MIT OR Apache-2.0"
repository = "https://github.com/sixarm/vix"

[lib]
name = "vix_project_dashboard_panel"
path = "src/lib.rs"
