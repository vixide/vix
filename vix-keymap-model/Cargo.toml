# vix-keymap-model: the list of available keyboard navigation styles ("keymaps").
# Pure data (no dependencies); the host persists the chosen keymap and applies its
# bindings. The View → Keymap submenu is built from this list.

[package]
name = "vix-keymap-model"
version = "0.1.0"
edition = "2021"
description = "Available keyboard navigation styles (keymaps) for Vix."
license = "Apache-2.0 OR BSD-3-Clause OR MIT OR GPL-2.0-only OR GPL-3.0-only"
repository = "https://github.com/sixarm/vix"

[lib]
name = "vix_keymap_model"
path = "src/lib.rs"
