# vix-theme-chooser: the monochrome theme model (Dark/Light), the ratatui styles
# derived from it, and the chooser's selection state. Depends only on
# ratatui-core (whose `Style`/`Color` are the same types ratatui re-exports), so
# the host renders with these styles directly. See spec/themes.md.

[package]
name = "vix-theme-chooser"
version = "0.1.0"
edition = "2021"
description = "Monochrome Dark/Light theme model, ratatui styles, and chooser state for Vix."
license = "Apache-2.0 OR BSD-3-Clause OR MIT OR GPL-2.0-only OR GPL-3.0-only"
repository = "https://github.com/sixarm/vix"

[lib]
name = "vix_theme_chooser"
path = "src/lib.rs"

[dependencies]
ratatui-core = "0.1"
serde = { version = "1", features = ["derive"] }
serde_json = "1"
