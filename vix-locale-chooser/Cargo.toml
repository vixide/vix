# vix-locale-chooser: the list of available UI languages and the chooser's
# selection state, parallel to vix-theme-chooser. Pure data (no dependencies);
# the host applies the chosen locale via rust-i18n and persists it.

[package]
name = "vix-locale-chooser"
version = "0.1.0"
edition = "2021"
description = "Available UI locales and chooser state for Vix."
license = "MIT OR Apache-2.0"
repository = "https://github.com/sixarm/vix"

[lib]
name = "vix_locale_chooser"
path = "src/lib.rs"
