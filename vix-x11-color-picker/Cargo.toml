# vix-x11-color-picker: the X11 color table (name, #RRGGBB hex, 8-bit RGB) and
# the picker's row-selection + scroll state. Pure data (no dependencies); the
# data is bundled as a TSV and parsed once on first use. The host renders the
# rows (with a color swatch) and inserts the chosen color's hex into the editor.

[package]
name = "vix-x11-color-picker"
version = "0.1.0"
edition = "2021"
description = "X11 color table and row-selection state for Vix."
license = "Apache-2.0 OR BSD-3-Clause OR MIT OR GPL-2.0-only OR GPL-3.0-only"
repository = "https://github.com/sixarm/vix"

[lib]
name = "vix_x11_color_picker"
path = "src/lib.rs"
