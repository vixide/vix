# vix-uuid-tool: generate UUIDs of every RFC 4122 / RFC 9562 version (v1–v8).
# Pure logic; the host inserts the generated UUID into the active editor
# (Tools → Generate → UUID → 1…8).

[package]
name = "vix-uuid-tool"
version = "0.1.0"
edition = "2021"
description = "UUID v1–v8 generator for Vix."
license = "Apache-2.0 OR BSD-3-Clause OR MIT OR GPL-2.0-only OR GPL-3.0-only"
repository = "https://github.com/sixarm/vix"

[lib]
name = "vix_uuid_tool"
path = "src/lib.rs"

[dependencies]
uuid = { version = "1", features = ["v1", "v3", "v4", "v5", "v6", "v7", "v8"] }
