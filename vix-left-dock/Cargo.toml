# vix-left-dock: state for the left dock — the file explorer's lazily-expanded
# directory tree, selection, multi-selection, scroll, and include/exclude regex
# filters. Reads directories (`std`) and compiles the filters (`regex`); the host
# renders it.

[package]
name = "vix-left-dock"
version = "0.1.0"
edition = "2021"
description = "Left-dock file-explorer tree state for Vix."
license = "Apache-2.0 OR BSD-3-Clause OR MIT OR GPL-2.0-only OR GPL-3.0-only"
repository = "https://github.com/sixarm/vix"

[lib]
name = "vix_left_dock"
path = "src/lib.rs"

[dependencies]
# Compile the explorer's include/exclude path filters.
regex = "1"
