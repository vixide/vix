# vix-vcard-parser: a small, dependency-free vCard 4.0 (RFC 6350) parser. It
# unfolds folded lines, splits each content line into property name / parameters /
# value, unescapes the value, and offers accessors for the common fields. Pure
# logic — no IO; the host reads the .vcf files and the panels render the result.

[package]
name = "vix-vcard-parser"
version = "0.1.0"
edition = "2021"
description = "A dependency-free vCard 4.0 (RFC 6350) parser for Vix."
license = "Apache-2.0 OR BSD-3-Clause OR MIT OR GPL-2.0-only OR GPL-3.0-only"
repository = "https://github.com/sixarm/vix"

[lib]
name = "vix_vcard_parser"
path = "src/lib.rs"
