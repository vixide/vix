# vix-unit-converter-tool: convert a number between physical units (length,
# mass, temperature, data, time). Pure logic plus the dialog's editing state;
# the host's Unit Converter dialog (Tools → Convert → Unit Converter…) renders it.

[package]
name = "vix-unit-converter-tool"
version = "0.1.0"
edition = "2021"
description = "Unit conversion (length/mass/temperature/data/time) for Vix."
license = "Apache-2.0 OR BSD-3-Clause OR MIT OR GPL-2.0-only OR GPL-3.0-only"
repository = "https://github.com/sixarm/vix"

[lib]
name = "vix_unit_converter_tool"
path = "src/lib.rs"
