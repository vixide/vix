# vix-text-information-panel: statistics about a span of text (characters,
# words, lines, sentences, paragraphs) plus the panel's row-selection state.
# Pure logic; the host gathers the text (selection or buffer) and renders the
# rows (Tools → About → Text…).

[package]
name = "vix-text-information-panel"
version = "0.1.0"
edition = "2021"
description = "Text statistics (chars/words/lines/sentences/paragraphs) for Vix."
license = "Apache-2.0 OR BSD-3-Clause OR MIT OR GPL-2.0-only OR GPL-3.0-only"
repository = "https://github.com/sixarm/vix"

[lib]
name = "vix_text_information_panel"
path = "src/lib.rs"
