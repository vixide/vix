[package]
name = "vix-db"
version.workspace = true
edition.workspace = true
rust-version.workspace = true
license.workspace = true
repository.workspace = true
description = "DB workbench: connection management, schema browsing, and SQL queries."

[dependencies]
confy = { workspace = true }
crossterm = { workspace = true }
futures-util = { workspace = true }
percent-encoding = { workspace = true }
ratatui = { workspace = true }
rust-i18n = { workspace = true }
serde = { workspace = true }
serde_json = { workspace = true }
sqlx = { workspace = true }
tokio = { workspace = true }
vix-clipboard = { path = "../vix-clipboard", version = "1.2.0" }
vix-i18n = { path = "../vix-i18n", version = "1.2.0" }
vix-theme = { path = "../vix-theme", version = "1.2.0" }

# macOS: store DB passwords through the native Security framework rather than
# shelling out to `security add-generic-password -w <password>`, which exposes
# the plaintext password as a process argument (visible in `ps`). Scoped to
# macOS so Linux/Windows builds don't pull in the backend; Linux keeps the
# already-secure `secret-tool` CLI (secret on stdin).
[target.'cfg(target_os = "macos")'.dependencies]
keyring = { version = "3", features = ["apple-native"] }
